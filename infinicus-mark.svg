<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" width="512" height="512" role="img">
  <title>INFINICUS SIMULATOR ENGINE Logo</title>

  <!-- Canvas -->
  <rect width="512" height="512" fill="#000000"/>

  <!-- Outer border -->
  <rect x="28" y="28" width="456" height="456" rx="88" ry="88"
        fill="none" stroke="#00E676" stroke-width="10" opacity="0.92"/>

  <!-- Horizontal connecting bar (behind rings) -->
  <rect x="46" y="243" width="420" height="18" fill="#00E676"/>

  <!-- Left ring -->
  <circle cx="130" cy="252" r="86" fill="#00E676"/>
  <circle cx="130" cy="252" r="52" fill="#000000"/>

  <!-- Right ring -->
  <circle cx="382" cy="252" r="86" fill="#00E676"/>
  <circle cx="382" cy="252" r="52" fill="#000000"/>

  <!-- INFINICUS wordmark -->
  <text x="256" y="394"
        text-anchor="middle"
        font-family="'Arial','Helvetica Neue',sans-serif"
        font-size="50" font-weight="300" letter-spacing="10"
        fill="#00E676">INFINICUS</text>

  <!-- SIMULATOR ENGINE tagline -->
  <text x="256" y="430"
        text-anchor="middle"
        font-family="'Arial','Helvetica Neue',sans-serif"
        font-size="15" font-weight="300" letter-spacing="7"
        fill="#7A7F9A">SIMULATOR ENGINE</text>

</svg>
