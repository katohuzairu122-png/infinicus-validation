<body>
<main>
  <h1>BI-02 — Data Source Mapping and Semantic Definition</h1>
  <p>Defines how operational data becomes canonical Business Intelligence data.</p>

  <div class="layout">
    <section class="panel">
      <form id="mappingForm">
        <textarea name="source">{
  "name":"Business Operations Sales Database",
  "sourceType":"postgresql",
  "owner":"Business Operations Layer",
  "layer":"business_operations",
  "connectionReference":"operations.sales.primary",
  "metadata":{
    "country":"Uganda",
    "refreshFrequency":"hourly"
  }
}</textarea>
        <button type="submit">Register source system</button>
      </form>
    </section>

    <section class="panel">
      <h2>Source-system record</h2>
      <pre id="output">Ready.</pre>
    </section>
  </div>
</main>
