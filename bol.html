  console.info(
    '[BOL] Block 7 ready | routes: ' + window.INFINICUS.bus.listRoutes().length +
    ' | Payments: list/get/getByOrder/summarize (read-only ledger over records Block 6 writes)'
  );

  window.INFINICUS.bus.emit('ops.payments.ready', { block: 7 });

})(); // Block7Init
</script>

<!-- ════════════════════════════════════════════════════════════════
     BLOCK 8 · CASH REGISTER
     Open/close till sessions per branch, cash movements (sale/refund
     written by the Order Manager; payout/pay-in written here),
     expected-vs-counted reconciliation at close. Per the NAV_ITEMS
     description from Block 1: "Open/close till sessions, cash
     movements, expected-vs-counted reconciliation."

     Deliberately NOT tied to Employee/Shift (Block 14/16) — a till
     session belongs to a branch, not a person, since neither Employee
     nor Shift exist yet and the spec treats "Cash register" and
     "Shift management" as two separate modules. When Block 16 lands,
     a shift can reference an open session; this module doesn't need
     to know that in advance.

     No DAL event is emitted for session open/close — none of the 21
     required operation.* events cover it. The closed session's
     `variance` field is what Block 18 (Daily Closing) will read for
     its own `cashVariance` field — storing it here is enough to make
     it queryable later; no event needed.

     One small addition to Block 6's refund() lands alongside this
     block (see inline comment at the call site): a cash refund now
     writes a matching cash-out movement against whichever session is
     open NOW, if the original payment was cash and a session happens
     to be open. Additive only — nothing removed or rewritten.

     Depends on: Block 2 (bus/security/uuid), Block 3 (ops.storage.
     cashSessions.* / cashMovements.* + by_branch/by_business/by_status/
     by_session indexes), Block 4 (workspace/audit), Block 6 (writes
     'sale' movements already; the refund patch above), Block 7
     (payments.by_order, used by the refund patch to check the
     original payment method).
════════════════════════════════════════════════════════════════ -->

<!-- ── 8A · Cash Register Manager ───────────────────────────────── -->
<script>
'use strict';

(function OperationsCashModule() {

  var bus   = window.INFINICUS.bus;
  var sec   = window.INFINICUS.security;
  var uuid  = window.INFINICUS.uuid;
  var audit = window.INFINICUS.ops.audit;

  function round2(n) { return Math.round(((+n || 0) + Number.EPSILON) * 100) / 100; }

  var cashApi = {

    getOpenSession: async function(branchId) {
      var ctx = window.INFINICUS.ops.workspace.getContext();
      var bId = branchId || ctx.branchId;
      if (!bId) return null;
      var r = await bus.call('ops.storage.cashSessions.list', { indexName: 'by_branch', keyVal: bId });
      return (r.records || []).filter(function(s) { return s.status === 'open'; })[0] || null;
    },

    openSession: async function(openingAmount, note) {
      var ctx = window.INFINICUS.ops.workspace.getContext();
      if (!ctx.businessId) return { ok: false, error: 'No active business', code: 'NO_BUSINESS' };
      if (!ctx.branchId)   return { ok: false, error: 'No active branch', code: 'NO_BRANCH' };

      var existing = await cashApi.getOpenSession(ctx.branchId);
      if (existing) return { ok: false, error: 'A till session is already open for this branch', code: 'SESSION_ALREADY_OPEN' };

      var opening;
      try { opening = sec.sanitizeNumber(openingAmount, { min: 0, decimals: 2 }); }
      catch (err) { return { ok: false, error: err.message, code: 'VALIDATION_FAILED' }; }

      var record = {
        sessionId: uuid(), businessId: ctx.businessId, branchId: ctx.branchId,
        status: 'open', openedAt: new Date().toISOString(), closedAt: null,
        openingCashAmount: opening, expectedCashAmount: null, countedCashAmount: null, variance: null,
        note: note ? sec.sanitizeString(note, 255) : ''
      };
      var r = await bus.call('ops.storage.cashSessions.put', record);
      if (!r.ok) return r;

      audit('open', 'cashSession', r.record.sessionId, null, r.record);
      bus.emit('operation.cash.session.opened', { sessionId: r.record.sessionId, branchId: ctx.branchId });
      return { ok: true, session: r.record };
    },

    getMovements: async function(sessionId) {
      var r = await bus.call('ops.storage.cashMovements.list', { indexName: 'by_session', keyVal: sessionId });
      var movements = (r.records || []).sort(function(a, b) { return (a.occurredAt || '') > (b.occurredAt || '') ? 1 : -1; });
      return { ok: true, movements: movements };
    },

    computeExpected: async function(session) {
      var mv = await cashApi.getMovements(session.sessionId);
      var total = (+session.openingCashAmount || 0);
      (mv.movements || []).forEach(function(m) { total += (+m.amount || 0); });
      return round2(total);
    },

    /** Manual drawer adjustments only (payout/pay-in). Sale and refund
     *  movements are written directly by the Order Manager (Block 6)
     *  as part of its own completion/refund logic — this function is
     *  intentionally not the only path into cashMovements. */
    recordMovement: async function(type, amount, reason) {
      if (['payout', 'payin'].indexOf(type) === -1) return { ok: false, error: 'type must be "payout" or "payin"', code: 'VALIDATION_FAILED' };
      var ctx = window.INFINICUS.ops.workspace.getContext();
      if (!ctx.branchId) return { ok: false, error: 'No active branch', code: 'NO_BRANCH' };

      var session = await cashApi.getOpenSession(ctx.branchId);
      if (!session) return { ok: false, error: 'No open till session for this branch', code: 'NO_OPEN_SESSION' };

      var amt;
      try { amt = sec.sanitizeNumber(amount, { min: 0.01, decimals: 2 }); }
      catch (err) { return { ok: false, error: err.message, code: 'VALIDATION_FAILED' }; }

      var movement = {
        movementId: uuid(), sessionId: session.sessionId, businessId: ctx.businessId,
        branchId: ctx.branchId, type: type, amount: type === 'payout' ? -amt : amt,
        reason: reason ? sec.sanitizeString(reason, 255) : '', orderId: null,
        occurredAt: new Date().toISOString()
      };
      var r = await bus.call('ops.storage.cashMovements.put', movement);
      if (!r.ok) return r;

      audit(type, 'cashMovement', r.record.movementId, null, r.record);
      bus.emit('operation.cash.movement.recorded', { movementId: r.record.movementId, sessionId: session.sessionId });
      return { ok: true, movement: r.record };
    },

    closeSession: async function(sessionId, countedAmount, note) {
      var g = await bus.call('ops.storage.cashSessions.get', { id: sessionId });
      if (!g.record) return { ok: false, error: 'Session not found', code: 'NOT_FOUND' };
      var session = g.record;
      if (session.status !== 'open') return { ok: false, error: 'Session is not open', code: 'SESSION_NOT_OPEN' };

      var ctx = window.INFINICUS.ops.workspace.getContext();
      if (session.businessId !== ctx.businessId) return { ok: false, error: 'Session does not belong to the active business', code: 'OWNERSHIP_MISMATCH' };

      var counted;
      try { counted = sec.sanitizeNumber(countedAmount, { min: 0, decimals: 2 }); }
      catch (err) { return { ok: false, error: err.message, code: 'VALIDATION_FAILED' }; }

      var expected = await cashApi.computeExpected(session);
      var variance = round2(counted - expected);

      var updated = Object.assign({}, session, {
        status: 'closed', closedAt: new Date().toISOString(),
        expectedCashAmount: expected, countedCashAmount: counted, variance: variance,
        closeNote: note ? sec.sanitizeString(note, 255) : ''
      });
      var r = await bus.call('ops.storage.cashSessions.put', updated);
      if (!r.ok) return r;

      audit('close', 'cashSession', sessionId, session, r.record);
      bus.emit('operation.cash.session.closed', { sessionId: sessionId, variance: variance });
      return { ok: true, session: r.record };
    },

    listSessions: async function(opts) {
      opts = opts || {};
      var ctx = window.INFINICUS.ops.workspace.getContext();
      var businessId = opts.businessId || ctx.businessId;
      if (!businessId) return { ok: true, sessions: [] };
      var r = await bus.call('ops.storage.cashSessions.list', { indexName: 'by_business', keyVal: businessId });
      var sessions = r.records || [];
      if (opts.branchId) sessions = sessions.filter(function(s) { return s.branchId === opts.branchId; });
      sessions.sort(function(a, b) { return (b.openedAt || '') > (a.openedAt || '') ? 1 : -1; });
      return { ok: true, sessions: sessions };
    }
  };

  window.INFINICUS.ops.cash = cashApi;

  bus.register('operations.cash.open',           function(p) { return cashApi.openSession(p.openingAmount, p.note); });
  bus.register('operations.cash.close',          function(p) { return cashApi.closeSession(p.sessionId, p.countedAmount, p.note); });
  bus.register('operations.cash.recordMovement', function(p) { return cashApi.recordMovement(p.type, p.amount, p.reason); });
  bus.register('operations.cash.getOpenSession', async function(p) { return { ok: true, session: await cashApi.getOpenSession(p && p.branchId) }; });
  bus.register('operations.cash.getMovements',   function(p) { return cashApi.getMovements(p.sessionId); });
  bus.register('operations.cash.listSessions',   function(p) { return cashApi.listSessions(p); });

})(); // OperationsCashModule
</script>

<!-- ── 8B · Cash Register View ──────────────────────────────────── -->
<script>
'use strict';

(function CashViewModule() {

  var bus = window.INFINICUS.bus;
  var esc = window.INFINICUS.esc;

  var _closingMode = false;

  var TYPE_LABEL = { sale: 'Sale', refund: 'Refund', payout: 'Payout', payin: 'Pay-in' };

  function _mount() {
    var content = document.querySelector('#view-cash .content');
    if (!content) return;
    content.innerHTML =
      '<div id="cash-no-branch" style="display:none">' +
        '<div class="placeholder"><div class="placeholder-icon">$</div>' +
          '<div class="placeholder-title">NO BRANCH SELECTED</div>' +
          '<div class="placeholder-sub">Select a business and branch on the Home screen first.</div>' +
        '</div>' +
      '</div>' +
      '<div id="cash-main" style="display:none">' +
        '<div class="card" id="cash-session-card" style="margin-bottom:16px"></div>' +
        '<div class="card">' +
          '<div class="card-hd"><div class="card-title">SESSION HISTORY</div></div>' +
          '<div class="card-body">' +
            '<div class="tbl-wrap"><table class="data-tbl"><thead><tr>' +
              '<th>OPENED</th><th>CLOSED</th><th>OPENING</th><th>EXPECTED</th><th>COUNTED</th><th style="text-align:right">VARIANCE</th>' +
            '</tr></thead><tbody id="cash-history-tbody"></tbody></table></div>' +
            '<div id="cash-history-empty" style="display:none;font-family:var(--mono);font-size:11px;color:var(--text-3);padding:16px 0;text-align:center">No closed sessions yet.</div>' +
          '</div>' +
        '</div>' +
      '</div>';
  }

  function _openFormHTML() {
    return '<div class="card-hd"><div class="card-title">TILL — NO SESSION OPEN</div></div>' +
      '<div class="card-body">' +
        '<div class="form-group"><label class="form-label">OPENING CASH AMOUNT <span class="req">*</span></label>' +
          '<input class="form-control" id="cash-open-amount" type="number" min="0" step="0.01" placeholder="0.00"></div>' +
        '<div class="form-group"><label class="form-label">NOTE</label>' +
          '<input class="form-control" id="cash-open-note" maxlength="255" placeholder="Optional"></div>' +
        '<button class="btn btn-primary" id="cash-open-btn">OPEN TILL</button>' +
        '<div id="cash-open-fb" style="font-family:var(--mono);font-size:10.5px;margin-top:8px"></div>' +
      '</div>';
  }

  function _sessionCardHTML(session, movements, expected) {
    var opened = new Date(session.openedAt);
    var openedStr = opened.toLocaleDateString() + ' ' + opened.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    var ctx = window.INFINICUS.ops.workspace.getContext();
    var cur = (ctx.business && ctx.business.currency) || '';

    var movesHTML = movements.length ? movements.map(function(m) {
      var t = new Date(m.occurredAt);
      var isNeg = (+m.amount) < 0;
      return '<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:11px">' +
        '<span style="color:var(--text-3)">' + t.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) + '</span>' +
        '<span style="color:var(--text-2)">' + esc(TYPE_LABEL[m.type] || m.type) + (m.reason ? ' — ' + esc(m.reason) : '') + '</span>' +
        '<span style="color:' + (isNeg ? 'var(--red)' : 'var(--accent)') + '">' + (isNeg ? '−' : '+') + Math.abs(+m.amount).toFixed(2) + '</span>' +
      '</div>';
    }).join('') : '<div style="font-family:var(--mono);font-size:10.5px;color:var(--text-3);padding:8px 0">No movements yet this session.</div>';

    var closeHTML = _closingMode
      ? '<div style="border-top:1px solid var(--border);margin-top:12px;padding-top:12px">' +
          '<div class="form-group"><label class="form-label">COUNTED CASH AMOUNT <span class="req">*</span></label>' +
            '<input class="form-control" id="cash-counted-amount" type="number" min="0" step="0.01" placeholder="0.00"></div>' +
          '<div id="cash-variance-preview" style="font-family:var(--mono);font-size:11px;color:var(--text-3);margin-bottom:12px">Expected ' + esc(cur) + ' ' + expected.toFixed(2) + '</div>' +
          '<div style="display:flex;gap:8px">' +
            '<button class="btn btn-danger btn-sm" id="cash-confirm-close">CONFIRM CLOSE</button>' +
            '<button class="btn btn-ghost btn-sm" id="cash-cancel-close">CANCEL</button>' +
          '</div>' +
          '<div id="cash-close-fb" style="font-family:var(--mono);font-size:10.5px;margin-top:8px"></div>' +
        '</div>'
      : '';

    return '<div class="card-hd"><div class="card-title">TILL OPEN</div><span class="badge badge-green"><span class="badge-dot"></span>SINCE ' + esc(openedStr) + '</span></div>' +
      '<div class="card-body">' +
        '<div class="stat-grid" style="margin-bottom:16px">' +
          '<div class="stat-tile"><div class="stat-label">OPENING</div><div class="stat-value">' + esc(cur) + ' ' + (+session.openingCashAmount).toFixed(2) + '</div></div>' +
          '<div class="stat-tile"><div class="stat-label">EXPECTED NOW</div><div class="stat-value c-acc">' + esc(cur) + ' ' + expected.toFixed(2) + '</div></div>' +
        '</div>' +
        '<div style="margin-bottom:14px">' + movesHTML + '</div>' +
        (_closingMode ? '' :
          '<div class="form-row-2" style="margin-bottom:10px">' +
            '<div class="form-group" style="margin-bottom:0"><input class="form-control" id="cash-move-amount" type="number" min="0.01" step="0.01" placeholder="Amount"></div>' +
            '<div class="form-group" style="margin-bottom:0"><input class="form-control" id="cash-move-reason" maxlength="255" placeholder="Reason (optional)"></div>' +
          '</div>' +
          '<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">' +
            '<button class="btn btn-secondary btn-sm" id="cash-payout-btn">− PAYOUT</button>' +
            '<button class="btn btn-secondary btn-sm" id="cash-payin-btn">+ PAY-IN</button>' +
            '<div style="flex:1"></div>' +
            '<button class="btn btn-danger btn-sm" id="cash-close-btn">CLOSE TILL</button>' +
          '</div>' +
          '<div id="cash-move-fb" style="font-family:var(--mono);font-size:10.5px"></div>'
        ) +
        closeHTML +
      '</div>';
  }

  async function _render() {
    var ctx = window.INFINICUS.ops.workspace.getContext();
    var cardEl = document.getElementById('cash-session-card');
    if (!cardEl || !ctx.branchId) return;

    var session = await window.INFINICUS.ops.cash.getOpenSession(ctx.branchId);
    if (!session) {
      _closingMode = false;
      cardEl.innerHTML = _openFormHTML();
    } else {
      var mv = await window.INFINICUS.ops.cash.getMovements(session.sessionId);
      var expected = await window.INFINICUS.ops.cash.computeExpected(session);
      cardEl.innerHTML = _sessionCardHTML(session, mv.movements || [], expected);
    }
    _wireCard(session);
    await _loadHistory();
  }

  async function _loadHistory() {
    var ctx = window.INFINICUS.ops.workspace.getContext();
    var tbody = document.getElementById('cash-history-tbody');
    var emptyEl = document.getElementById('cash-history-empty');
    if (!tbody) return;
    var r = await window.INFINICUS.ops.cash.listSessions({ branchId: ctx.branchId });
    var closed = (r.sessions || []).filter(function(s) { return s.status === 'closed'; }).slice(0, 15);
    var cur = (ctx.business && ctx.business.currency) || '';

    if (emptyEl) emptyEl.style.display = closed.length ? 'none' : 'block';
    tbody.innerHTML = closed.map(function(s) {
      var o = new Date(s.openedAt), c = new Date(s.closedAt);
      var varColor = Math.abs(s.variance) < 0.01 ? 'var(--accent)' : (s.variance < 0 ? 'var(--red)' : 'var(--amber)');
      return '<tr>' +
        '<td class="c-muted">' + esc(o.toLocaleDateString()) + ' ' + esc(o.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })) + '</td>' +
        '<td class="c-muted">' + esc(c.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })) + '</td>' +
        '<td class="c-muted">' + (+s.openingCashAmount).toFixed(2) + '</td>' +
        '<td class="c-muted">' + (+s.expectedCashAmount).toFixed(2) + '</td>' +
        '<td class="c-muted">' + (+s.countedCashAmount).toFixed(2) + '</td>' +
        '<td style="text-align:right;color:' + varColor + ';font-weight:600">' + (s.variance > 0 ? '+' : '') + (+s.variance).toFixed(2) + '</td>' +
      '</tr>';
    }).join('');
  }

  function _wireCard(session) {
    var openBtn = document.getElementById('cash-open-btn');
    if (openBtn) openBtn.addEventListener('click', async function() {
      var fb = document.getElementById('cash-open-fb');
      var amount = (document.getElementById('cash-open-amount') || {}).value || 0;
      var note = (document.getElementById('cash-open-note') || {}).value || '';
      var r = await window.INFINICUS.ops.cash.openSession(amount, note);
      if (r.ok) _render(); else if (fb) { fb.style.color = 'var(--red)'; fb.textContent = r.error; }
    });

    var payoutBtn = document.getElementById('cash-payout-btn');
    if (payoutBtn) payoutBtn.addEventListener('click', function() { _submitMovement('payout'); });
    var payinBtn = document.getElementById('cash-payin-btn');
    if (payinBtn) payinBtn.addEventListener('click', function() { _submitMovement('payin'); });

    var closeBtn = document.getElementById('cash-close-btn');
    if (closeBtn) closeBtn.addEventListener('click', function() { _closingMode = true; _render(); });

    var cancelCloseBtn = document.getElementById('cash-cancel-close');
    if (cancelCloseBtn) cancelCloseBtn.addEventListener('click', function() { _closingMode = false; _render(); });

    var countedEl = document.getElementById('cash-counted-amount');
    if (countedEl) countedEl.addEventListener('input', async function() {
      var previewEl = document.getElementById('cash-variance-preview');
      if (!previewEl || !session) return;
      var expected = await window.INFINICUS.ops.cash.computeExpected(session);
      var counted = +countedEl.value || 0;
      var variance = Math.round(((counted - expected) + Number.EPSILON) * 100) / 100;
      var ctx = window.INFINICUS.ops.workspace.getContext();
      var cur = (ctx.business && ctx.business.currency) || '';
      previewEl.innerHTML = 'Expected ' + esc(cur) + ' ' + expected.toFixed(2) +
        (countedEl.value !== '' ? ' · Variance <span style="color:' + (Math.abs(variance) < 0.01 ? 'var(--accent)' : 'var(--red)') + '">' + (variance > 0 ? '+' : '') + variance.toFixed(2) + '</span>' : '');
    });

    var confirmCloseBtn = document.getElementById('cash-confirm-close');
    if (confirmCloseBtn) confirmCloseBtn.addEventListener('click', async function() {
      var fb = document.getElementById('cash-close-fb');
      var counted = (document.getElementById('cash-counted-amount') || {}).value;
      if (counted === '' || counted == null) { if (fb) { fb.style.color = 'var(--red)'; fb.textContent = 'Enter the counted amount first'; } return; }
      var r = await window.INFINICUS.ops.cash.closeSession(session.sessionId, counted, '');
      if (r.ok) { _closingMode = false; _render(); }
      else if (fb) { fb.style.color = 'var(--red)'; fb.textContent = r.error; }
    });
  }

  async function _submitMovement(type) {
    var fb = document.getElementById('cash-move-fb');
    var amountEl = document.getElementById('cash-move-amount');
    var reasonEl = document.getElementById('cash-move-reason');
    var r = await window.INFINICUS.ops.cash.recordMovement(type, (amountEl || {}).value, (reasonEl || {}).value);
    if (r.ok) {
      if (amountEl) amountEl.value = '';
      if (reasonEl) reasonEl.value = '';
      _render();
    } else if (fb) { fb.style.color = 'var(--red)'; fb.textContent = r.error; }
  }

  function _sync() {
    var ctx = window.INFINICUS.ops.workspace.getContext();
    var noBranchEl = document.getElementById('cash-no-branch');
    var mainEl = document.getElementById('cash-main');
    if (!ctx.branchId) { if (noBranchEl) noBranchEl.style.display = 'block'; if (mainEl) mainEl.style.display = 'none'; return; }
    if (noBranchEl) noBranchEl.style.display = 'none';
    if (mainEl) mainEl.style.display = 'block';
    _render();
  }

  bus.on('dal.business.selected',     _sync);
  bus.on('ops.branch.selected',       _sync);
  bus.on('operation.order.completed', function() { if (window.INFINICUS.ops.workspace.getContext().branchId) _render(); });
  bus.on('operation.order.refunded',  function() { if (window.INFINICUS.ops.workspace.getContext().branchId) _render(); });

  window.INFINICUS.ops.cashView = { refresh: _sync };
  window.__opsCashInit = function() { _mount(); _sync(); };

})(); // CashViewModule
</script>

<!-- ════════════════════════════════════════════════════════════════
     BLOCK 9 · INVENTORY OPERATIONS
     Stock levels, the full 8-type movement ledger, low-stock alerts —
     per the NAV_ITEMS description from Block 1. Extends the ledger
     writer Block 6 front-loaded (getStock/recordMovement) rather than
     replacing it: this block adds browsing (listMovements), reporting
     (getStockLevels/getLowStockCount), and the manual-entry UI for the
     7 movement types Sell doesn't create on its own (only 'sold' is
     Sell-only/automatic).

     THREE small patches land alongside this block, all disclosed:
       • Product gets a new optional `reorderPoint` field (Block 5's
         S_CREATE/S_UPDATE schemas, create()/update(), and the Catalog
         form) — the threshold "low stock" checks against. Defaults to
         0 (flag only at a true stockout) for existing products.
       • getStock(productId, businessId, branchId) — REAL BUG FIX, not
         just an addition: stock was being summed business-wide with
         no way to scope it, so a sale at Branch B could pass its stock
         check off inventory that only physically exists at Branch A.
         Now takes an optional branchId; omit it for a business-wide
         total (Home's tile does), pass it for "what's on the shelf at
         THIS branch" (the Order Manager's stock check now does, and
         so does this block's own Stock Levels table).
       • Home's LOW STOCK ITEMS tile — was a hardcoded 0 since Block 4
         with a note that Block 9 would wire it for real. Now calls
         getLowStockCount(businessId), business-wide (Home's sibling
         tiles — sales/expenses — are business-wide too; the branch-
         scoped, actionable view is this block's own Stock Levels tab).

     KNOWN LIMITATION, not solved here: 'transferred' only records an
     OUT movement at the source branch. There's no automatic matching
     IN movement at a destination branch — the spec's 8 movement types
     don't include a branch-to-branch transfer object, and building
     one is out of this block's scope. A real transfer today means a
     manual 'transferred' out here, then switching branch context and
     manually recording a 'received' in there.

     Depends on: Block 2 (bus/security/uuid), Block 3 (inventoryMovements
     store + indexes), Block 4 (workspace/audit), Block 5 (ops.product,

<!-- ── 9A · Inventory Manager extensions ────────────────────────── -->
<script>
'use strict';

(function OperationsInventoryExtensionModule() {

  // Extends window.INFINICUS.ops.inventory (created in Block 6) —
  // getStock/recordMovement stay exactly as Block 6 built them (aside
  // from getStock's branchId patch above); nothing here replaces them.
  var bus = window.INFINICUS.bus;
  var inventoryApi = window.INFINICUS.ops.inventory;

  inventoryApi.listMovements = async function(opts) {
    opts = opts || {};
    var ctx = window.INFINICUS.ops.workspace.getContext();
    var businessId = opts.businessId || ctx.businessId;
    if (!businessId) return { ok: true, movements: [] };

    var r;
    if (opts.productId) r = await bus.call('ops.storage.inventoryMovements.list', { indexName: 'by_product', keyVal: [businessId, opts.productId] });
    else if (opts.branchId) r = await bus.call('ops.storage.inventoryMovements.list', { indexName: 'by_branch', keyVal: opts.branchId });
    else r = await bus.call('ops.storage.inventoryMovements.list', { indexName: 'by_business', keyVal: businessId });

    var movements = r.records || [];
    if (opts.type) movements = movements.filter(function(m) { return m.type === opts.type; });
    movements.sort(function(a, b) { return (b.occurredAt || '') > (a.occurredAt || '') ? 1 : -1; });
    return { ok: true, movements: movements };
  };

  /** Stock + reorder status for every stock-tracked, non-archived
   *  product — the shared source for both this block's Stock Levels
   *  table and Home's LOW STOCK ITEMS tile. branchId omitted =
   *  business-wide (matches getStock's own contract exactly). */
  inventoryApi.getStockLevels = async function(businessId, branchId) {
    var ctx = window.INFINICUS.ops.workspace.getContext();
    var bizId = businessId || ctx.businessId;
    if (!bizId) return { ok: true, levels: [] };

    var prodR = await window.INFINICUS.ops.product.list(bizId);
    var tracked = (prodR.products || []).filter(function(p) { return p.stockTracked && p.status !== 'archived'; });

    var levels = [];
    for (var i = 0; i < tracked.length; i++) {
      var p = tracked[i];
      var stock = await inventoryApi.getStock(p.productId, bizId, branchId);
      var reorderPoint = +p.reorderPoint || 0;
      levels.push({ productId: p.productId, name: p.name, sku: p.sku, category: p.category, stock: stock, reorderPoint: reorderPoint, isLow: stock <= reorderPoint });
    }
    levels.sort(function(a, b) { return a.name.localeCompare(b.name); });
    return { ok: true, levels: levels };
  };

  inventoryApi.getLowStockCount = async function(businessId, branchId) {
    var r = await inventoryApi.getStockLevels(businessId, branchId);
    return (r.levels || []).filter(function(l) { return l.isLow; }).length;
  };

  bus.register('operations.inventory.listMovements',  function(p) { return inventoryApi.listMovements(p); });
  bus.register('operations.inventory.getStockLevels', function(p) { return inventoryApi.getStockLevels(p && p.businessId, p && p.branchId); });

})(); // OperationsInventoryExtensionModule
</script>

<!-- ── 9B · Inventory View ──────────────────────────────────────── -->
<script>
'use strict';

(function InventoryViewModule() {

  var bus = window.INFINICUS.bus;
  var esc = window.INFINICUS.esc;

  var _levelsSearch = '';
  var _ledgerType = '';

  var TYPE_SIGN  = { received: 1, returned: 1, consumed: -1, wasted: -1, damaged: -1, transferred: -1 };
  var TYPE_BADGE = { received: 'blue', sold: 'green', consumed: 'muted', wasted: 'red', damaged: 'red', transferred: 'purple', returned: 'amber', adjusted: 'muted' };

  function _mount() {
    var content = document.querySelector('#view-inventory .content');
    if (!content) return;
    content.innerHTML =
      '<div id="inv-no-branch" style="display:none">' +
        '<div class="placeholder"><div class="placeholder-icon">▤</div>' +
          '<div class="placeholder-title">NO BRANCH SELECTED</div>' +
          '<div class="placeholder-sub">Select a business and branch on the Home screen first.</div>' +
        '</div>' +
      '</div>' +
      '<div id="inv-main" style="display:none">' +
        '<div class="stat-grid" id="inv-stats"></div>' +

        '<div class="card" style="margin-bottom:16px">' +
          '<div class="card-hd"><div class="card-title">RECORD MOVEMENT</div>' +
            '<button class="btn btn-ghost btn-sm" id="inv-entry-toggle">+ NEW MOVEMENT</button>' +
          '</div>' +
          '<div id="inv-entry-body" style="display:none"><div class="card-body">' +
            '<div class="form-row-2">' +
              '<div class="form-group"><label class="form-label">PRODUCT <span class="req">*</span></label>' +
                '<select class="form-control" id="inv-e-product"><option value="">— Select —</option></select></div>' +
              '<div class="form-group"><label class="form-label">TYPE <span class="req">*</span></label>' +
                '<select class="form-control" id="inv-e-type">' +
                  '<option value="received">Received (stock in)</option>' +
                  '<option value="returned">Returned by customer (stock in)</option>' +
                  '<option value="consumed">Consumed / used internally (stock out)</option>' +
                  '<option value="wasted">Wasted (stock out)</option>' +
                  '<option value="damaged">Damaged (stock out)</option>' +
                  '<option value="transferred">Transferred out (stock out)</option>' +
                  '<option value="adjusted">Stock count correction</option>' +
                '</select></div>' +
            '</div>' +
            '<div class="form-group">' +
              '<label class="form-label" id="inv-e-qty-label">QUANTITY <span class="req">*</span></label>' +
              '<input class="form-control" id="inv-e-qty" type="number" min="0" step="1" placeholder="0">' +
              '<div class="form-hint" id="inv-e-qty-hint"></div>' +
            '</div>' +
            '<div class="form-group"><label class="form-label">REASON / NOTE</label>' +
              '<input class="form-control" id="inv-e-reason" maxlength="255" placeholder="Optional"></div>' +
            '<button class="btn btn-primary btn-sm" id="inv-e-save">SAVE MOVEMENT</button>' +
            '<div id="inv-e-fb" style="font-family:var(--mono);font-size:10.5px;margin-top:8px"></div>' +
          '</div></div>' +
        '</div>' +

        '<div class="tab-bar">' +
          '<button class="tab-btn active" data-tab="levels">STOCK LEVELS</button>' +
          '<button class="tab-btn" data-tab="ledger">MOVEMENT LEDGER</button>' +
        '</div>' +

        '<div class="tab-panel active" id="inv-tab-levels">' +
          '<input class="form-control" id="inv-levels-search" placeholder="Search products…" style="margin-bottom:12px">' +
          '<div class="tbl-wrap"><table class="data-tbl"><thead><tr>' +
            '<th>PRODUCT</th><th>SKU</th><th>CATEGORY</th><th>REORDER AT</th><th style="text-align:right">STOCK</th><th></th>' +
          '</tr></thead><tbody id="inv-levels-tbody"></tbody></table></div>' +
          '<div id="inv-levels-empty" style="display:none;font-family:var(--mono);font-size:11px;color:var(--text-3);padding:16px 0;text-align:center">No stock-tracked products. Enable "Track stock quantity" on a product in the Catalog.</div>' +
        '</div>' +

        '<div class="tab-panel" id="inv-tab-ledger">' +
          '<div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap">' +
            '<select class="form-control" id="inv-ledger-type" style="max-width:200px">' +
              '<option value="">— All movement types —</option>' +
              '<option value="received">Received</option><option value="sold">Sold</option>' +
              '<option value="consumed">Consumed</option><option value="wasted">Wasted</option>' +
              '<option value="damaged">Damaged</option><option value="transferred">Transferred</option>' +
              '<option value="returned">Returned</option><option value="adjusted">Adjusted</option>' +
            '</select>' +
            '<div style="flex:1"></div>' +
            '<button class="btn btn-ghost btn-sm" id="inv-ledger-refresh">↻ REFRESH</button>' +
          '</div>' +
          '<div class="tbl-wrap"><table class="data-tbl"><thead><tr>' +
            '<th>DATE</th><th>PRODUCT</th><th>TYPE</th><th>REASON</th><th style="text-align:right">QUANTITY</th>' +
          '</tr></thead><tbody id="inv-ledger-tbody"></tbody></table></div>' +
          '<div id="inv-ledger-empty" style="display:none;font-family:var(--mono);font-size:11px;color:var(--text-3);padding:16px 0;text-align:center">No movements yet.</div>' +
        '</div>' +
      '</div>';
  }

  async function _loadProductOptions() {
    var ctx = window.INFINICUS.ops.workspace.getContext();
    var sel = document.getElementById('inv-e-product');
    if (!sel || !ctx.businessId) return;
    var r = await window.INFINICUS.ops.product.list(ctx.businessId);
    var tracked = (r.products || []).filter(function(p) { return p.stockTracked && p.status !== 'archived'; });
    sel.innerHTML = '<option value="">— Select —</option>' + tracked.map(function(p) {
      return '<option value="' + esc(p.productId) + '">' + esc(p.name) + (p.sku ? ' (' + esc(p.sku) + ')' : '') + '</option>';
    }).join('');
  }

  async function _updateQtyLabel() {
    var typeEl = document.getElementById('inv-e-type');
    var prodEl = document.getElementById('inv-e-product');
    var labelEl = document.getElementById('inv-e-qty-label');
    var hintEl = document.getElementById('inv-e-qty-hint');
    if (!typeEl || !labelEl) return;
    var ctx = window.INFINICUS.ops.workspace.getContext();

    if (typeEl.value === 'adjusted') {
      labelEl.innerHTML = 'NEW COUNTED STOCK <span class="req">*</span>';
      if (prodEl.value) {
        var current = await window.INFINICUS.ops.inventory.getStock(prodEl.value, ctx.businessId, ctx.branchId);
        hintEl.textContent = 'Current stock at this branch: ' + current + ' — enter what you actually counted, not the delta.';
      } else {
        hintEl.textContent = 'Select a product to see current stock.';
      }
    } else {
      labelEl.innerHTML = 'QUANTITY <span class="req">*</span>';
      hintEl.textContent = '';
    }
  }

  function _levelRow(l) {
    return '<tr>' +
      '<td class="c-text">' + esc(l.name) + '</td>' +
      '<td class="c-muted">' + esc(l.sku || '—') + '</td>' +
      '<td class="c-muted">' + esc(l.category || '—') + '</td>' +
      '<td class="c-muted">' + l.reorderPoint + '</td>' +
      '<td style="text-align:right;font-weight:600;color:' + (l.isLow ? 'var(--red)' : 'var(--text)') + '">' + l.stock + '</td>' +
      '<td>' + (l.isLow ? '<span class="badge badge-red">LOW</span>' : '') + '</td>' +
    '</tr>';
  }

  async function _loadStockLevels() {
    var ctx = window.INFINICUS.ops.workspace.getContext();
    var tbody = document.getElementById('inv-levels-tbody');
    var emptyEl = document.getElementById('inv-levels-empty');
    var statsEl = document.getElementById('inv-stats');
    if (!tbody || !ctx.businessId) return;

    var r = await window.INFINICUS.ops.inventory.getStockLevels(ctx.businessId, ctx.branchId);
    var all = r.levels || [];
    var q = _levelsSearch.toLowerCase();
    var filtered = !q ? all : all.filter(function(l) { return l.name.toLowerCase().indexOf(q) !== -1 || (l.sku || '').toLowerCase().indexOf(q) !== -1; });

    if (emptyEl) emptyEl.style.display = all.length ? 'none' : 'block';
    tbody.innerHTML = filtered.map(_levelRow).join('');

    if (statsEl) {
      var lowCount = all.filter(function(l) { return l.isLow; }).length;
      statsEl.innerHTML = [
        { l: 'TRACKED PRODUCTS', v: all.length, c: 'c-blue' },
        { l: 'LOW STOCK',        v: lowCount,   c: lowCount > 0 ? 'c-red' : 'c-acc' }
      ].map(function(t) {
        return '<div class="stat-tile"><div class="stat-label">' + esc(t.l) + '</div><div class="stat-value ' + t.c + '">' + esc(String(t.v)) + '</div></div>';
      }).join('');
    }
  }

  function _ledgerRow(m) {
    var d = m.occurredAt ? new Date(m.occurredAt) : null;
    var dateStr = d ? d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
    var isNeg = (+m.quantity) < 0;
    return '<tr>' +
      '<td class="c-muted">' + esc(dateStr) + '</td>' +
      '<td class="c-text">' + esc(m.productName || '') + '</td>' +
      '<td><span class="badge badge-' + (TYPE_BADGE[m.type] || 'muted') + '">' + esc(m.type || '') + '</span></td>' +
      '<td class="c-muted">' + esc(m.reason || '—') + '</td>' +
      '<td style="text-align:right;color:' + (isNeg ? 'var(--red)' : 'var(--accent)') + ';font-weight:600">' + (isNeg ? '' : '+') + m.quantity + '</td>' +
    '</tr>';
  }

  async function _loadLedger() {
    var ctx = window.INFINICUS.ops.workspace.getContext();
    var tbody = document.getElementById('inv-ledger-tbody');
    var emptyEl = document.getElementById('inv-ledger-empty');
    if (!tbody || !ctx.branchId) return;

    var r = await window.INFINICUS.ops.inventory.listMovements({ branchId: ctx.branchId, type: _ledgerType || undefined });
    var movements = r.movements || [];
    if (emptyEl) emptyEl.style.display = movements.length ? 'none' : 'block';
    tbody.innerHTML = movements.slice(0, 100).map(_ledgerRow).join('');
  }

  function _wireTabs() {
    var bar = document.querySelector('#view-inventory .tab-bar');
    if (!bar) return;
    bar.addEventListener('click', function(e) {
      var btn = e.target.closest('.tab-btn');
      if (!btn) return;
      bar.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      document.querySelectorAll('#view-inventory .tab-panel').forEach(function(p) { p.classList.remove('active'); });
      var panel = document.getElementById('inv-tab-' + btn.dataset.tab);
      if (panel) panel.classList.add('active');
    });
  }

  function _wireEntry() {
    var toggleBtn = document.getElementById('inv-entry-toggle');
    if (toggleBtn) toggleBtn.addEventListener('click', async function() {
      var body = document.getElementById('inv-entry-body');
      var open = body.style.display !== 'none';
      if (open) { body.style.display = 'none'; toggleBtn.textContent = '+ NEW MOVEMENT'; }
      else { body.style.display = 'block'; toggleBtn.textContent = '− CANCEL'; await _loadProductOptions(); _updateQtyLabel(); }
    });

    var typeEl = document.getElementById('inv-e-type');
    if (typeEl) typeEl.addEventListener('change', _updateQtyLabel);
    var prodEl = document.getElementById('inv-e-product');
    if (prodEl) prodEl.addEventListener('change', _updateQtyLabel);

    var saveBtn = document.getElementById('inv-e-save');
    if (saveBtn) saveBtn.addEventListener('click', async function() {
      var fb = document.getElementById('inv-e-fb');
      var productId = (document.getElementById('inv-e-product') || {}).value;
      var type = (document.getElementById('inv-e-type') || {}).value;
      var qtyRaw = (document.getElementById('inv-e-qty') || {}).value;
      var reason = (document.getElementById('inv-e-reason') || {}).value;

      if (!productId) { fb.style.color = 'var(--red)'; fb.textContent = 'Select a product'; return; }
      if (qtyRaw === '' || qtyRaw == null) { fb.style.color = 'var(--red)'; fb.textContent = 'Enter a value'; return; }

      var prodR = await window.INFINICUS.ops.product.get(productId);
      if (!prodR.product) { fb.style.color = 'var(--red)'; fb.textContent = 'Product not found'; return; }

      var signedQty;
      if (type === 'adjusted') {
        var ctx = window.INFINICUS.ops.workspace.getContext();
        var current = await window.INFINICUS.ops.inventory.getStock(productId, ctx.businessId, ctx.branchId);
        signedQty = (+qtyRaw) - current;
        if (signedQty === 0) { fb.style.color = 'var(--amber)'; fb.textContent = 'No change — counted stock already matches'; return; }
      } else {
        signedQty = (TYPE_SIGN[type] || 1) * Math.abs(+qtyRaw || 0);
        if (signedQty === 0) { fb.style.color = 'var(--red)'; fb.textContent = 'Quantity must be non-zero'; return; }
      }

      var r = await window.INFINICUS.ops.inventory.recordMovement({
        productId: productId, productName: prodR.product.name, type: type, quantity: signedQty, reason: reason
      });
      if (r.ok) {
        fb.style.color = 'var(--accent)'; fb.textContent = '✓ Movement recorded';
        document.getElementById('inv-e-qty').value = '';
        document.getElementById('inv-e-reason').value = '';
        _loadStockLevels();
        _loadLedger();
      } else {
        fb.style.color = 'var(--red)'; fb.textContent = r.error || 'Could not record movement';
      }
    });
  }

  function _wire() {
    _wireTabs();
    _wireEntry();

    var searchEl = document.getElementById('inv-levels-search');
    if (searchEl) searchEl.addEventListener('input', function() { _levelsSearch = searchEl.value; _loadStockLevels(); });

    var ledgerTypeEl = document.getElementById('inv-ledger-type');
    if (ledgerTypeEl) ledgerTypeEl.addEventListener('change', function() { _ledgerType = ledgerTypeEl.value; _loadLedger(); });

    var refreshBtn = document.getElementById('inv-ledger-refresh');
    if (refreshBtn) refreshBtn.addEventListener('click', _loadLedger);
  }

  function _sync() {
    var ctx = window.INFINICUS.ops.workspace.getContext();
    var noBranchEl = document.getElementById('inv-no-branch');
    var mainEl = document.getElementById('inv-main');
    if (!ctx.branchId) { if (noBranchEl) noBranchEl.style.display = 'block'; if (mainEl) mainEl.style.display = 'none'; return; }
    if (noBranchEl) noBranchEl.style.display = 'none';
    if (mainEl) mainEl.style.display = 'block';
    _loadStockLevels();
    _loadLedger();
  }

  bus.on('dal.business.selected',       _sync);
  bus.on('ops.branch.selected',         _sync);
  bus.on('ops.product.created',         _loadStockLevels);
  bus.on('ops.product.updated',         _loadStockLevels);
  bus.on('operation.order.completed',   _sync);
  bus.on('operation.inventory.received',_sync);
  bus.on('operation.inventory.consumed',_sync);

  window.INFINICUS.ops.inventoryView = { refresh: _sync };
  window.__opsInventoryInit = function() { _mount(); _wire(); _sync(); };

})(); // InventoryViewModule
</script>

     Expense entry with category, vendor, and an approval workflow —
     per the NAV_ITEMS description from Block 1. "Approval" is a UX/
     operational-discipline gate, not a real security boundary — same
     honest framing as the permission model in the architecture doc,
     since there's no Employee/Role/auth yet (Blocks 14/15) to enforce
     who's allowed to approve.

     DAL wiring: expense.recorded fires at CREATION (matches Home's
     existing TODAY'S EXPENSES tile, which has summed expense.recorded
     since Block 4 — a pending expense should already count as spend,
     not wait on an approval nobody can meaningfully perform yet).
     expense.approved fires at approval, referencing the original
     event via `originalEventId` — this requires capturing the eventId
     that data.event.ingest returns at creation time and storing it on
     the ops-side record; approve() reads it back. Reject has no DAL
     event — it's not in the spec's 21-event list, so it stays
     ops-local (status + audit trail only), matching how cash-session
     open/close and order-draft edits were already handled.

     Depends on: Block 2 (bus/security/uuid, the expense.recorded and
     expense.approved DAL schemas — the latter registered back in
     Block 2C), Block 3 (ops.storage.expenses.* + by_business/by_branch/
     by_status indexes), Block 4 (workspace/audit/biz).
════════════════════════════════════════════════════════════════ -->

<!-- ── 10A · Expense Manager ────────────────────────────────────── -->
<script>
'use strict';

(function OperationsExpenseModule() {

  var bus   = window.INFINICUS.bus;
  var sec   = window.INFINICUS.security;
  var uuid  = window.INFINICUS.uuid;
  var audit = window.INFINICUS.ops.audit;

  function ingestOps(eventType, businessId, payload) {
    return bus.call('data.event.ingest', {
      eventType: eventType, businessId: businessId, source: 'ops',
      occurredAt: new Date().toISOString(), payload: payload
    });
  }

  async function _getOwned(expenseId) {
    var r = await bus.call('ops.storage.expenses.get', { id: expenseId });
    if (!r.record) return { ok: false, error: 'Expense not found', code: 'NOT_FOUND' };
    var ctx = window.INFINICUS.ops.workspace.getContext();
    if (r.record.businessId !== ctx.businessId) return { ok: false, error: 'Expense does not belong to the active business', code: 'OWNERSHIP_MISMATCH' };
    return { ok: true, expense: r.record };
  }

  var expenseApi = {

    create: async function(fields) {
      fields = fields || {};
      var ctx = window.INFINICUS.ops.workspace.getContext();
      if (!ctx.businessId) return { ok: false, error: 'No active business', code: 'NO_BUSINESS' };

      try {
        var category = sec.sanitizeString(fields.category || '', 100);
        if (!category) return { ok: false, error: 'Category is required', code: 'VALIDATION_FAILED' };
        var amount = sec.sanitizeNumber(fields.amount, { min: 0.01, decimals: 2 });
        var vendorName = fields.vendorName ? sec.sanitizeString(fields.vendorName, 255) : '';
        var description = fields.description ? sec.sanitizeString(fields.description, 500) : '';
        var isRecurring = !!fields.isRecurring;

        var payload = { amount: amount, category: category };
        if (description) payload.description = description;
        if (vendorName)   payload.vendorName = vendorName;
        if (isRecurring)  payload.isRecurring = true;

        // Capture the DAL event id now — expense.approved needs to
        // reference it later via originalEventId.
        var ingestResult = await ingestOps('expense.recorded', ctx.businessId, payload);
        var dalEventId = (ingestResult.ok && ingestResult.event) ? ingestResult.event.eventId : null;

        var record = {
          expenseId: uuid(), businessId: ctx.businessId, branchId: ctx.branchId || null,
          category: category, vendorName: vendorName, description: description,
          amount: amount, currency: (ctx.business && ctx.business.currency) || 'USD',
          status: 'pending', isRecurring: isRecurring, dalEventId: dalEventId,
          createdAt: new Date().toISOString()
        };
        var r = await bus.call('ops.storage.expenses.put', record);
        if (!r.ok) return r;

        audit('create', 'expense', r.record.expenseId, null, r.record);
        bus.emit('operation.expense.created', { expenseId: r.record.expenseId });
        return { ok: true, expense: r.record };

      } catch (err) {
        return { ok: false, error: err.message || String(err), code: err.name || 'EXPENSE_ERROR' };
      }
    },

    /** Editing is only allowed while pending — once approved or
     *  rejected, the record is treated as settled, same philosophy
     *  used for completed orders/payments elsewhere in this file. */
    update: async function(fields) {
      fields = fields || {};
      var g = await _getOwned(fields.expenseId);
      if (!g.ok) return g;
      if (g.expense.status !== 'pending') return { ok: false, error: 'Only pending expenses can be edited', code: 'NOT_EDITABLE' };

      try {
        var patch = { expenseId: fields.expenseId };
        if (fields.category !== undefined) {
          var c = sec.sanitizeString(fields.category, 100);
          if (!c) return { ok: false, error: 'Category is required', code: 'VALIDATION_FAILED' };
          patch.category = c;
        }
        if (fields.amount      !== undefined) patch.amount = sec.sanitizeNumber(fields.amount, { min: 0.01, decimals: 2 });
        if (fields.vendorName  !== undefined) patch.vendorName = sec.sanitizeString(fields.vendorName, 255);
        if (fields.description !== undefined) patch.description = sec.sanitizeString(fields.description, 500);
        if (fields.isRecurring !== undefined) patch.isRecurring = !!fields.isRecurring;

        var r = await bus.call('ops.storage.expenses.put', patch);
        if (!r.ok) return r;
        audit('update', 'expense', fields.expenseId, g.expense, r.record);
        bus.emit('operation.expense.updated', { expenseId: fields.expenseId });
        return { ok: true, expense: r.record };
      } catch (err) {
        return { ok: false, error: err.message || String(err), code: err.name || 'EXPENSE_ERROR' };
      }
    },

    approve: async function(expenseId, approvedBy) {
      var g = await _getOwned(expenseId);
      if (!g.ok) return g;
      if (g.expense.status === 'approved') return { ok: false, error: 'Already approved', code: 'ALREADY_APPROVED' };

      var updated = Object.assign({}, g.expense, {
        status: 'approved', approvedAt: new Date().toISOString(),
        approvedBy: approvedBy ? sec.sanitizeString(approvedBy, 100) : ''
      });
      var r = await bus.call('ops.storage.expenses.put', updated);
      if (!r.ok) return r;

      audit('approve', 'expense', expenseId, g.expense, r.record);

      if (g.expense.dalEventId) {
        var payload = { originalEventId: g.expense.dalEventId, amount: g.expense.amount };
        if (updated.approvedBy) payload.approvedBy = updated.approvedBy;
        ingestOps('expense.approved', g.expense.businessId, payload);
      } else {
        console.warn('[BOL] expense.approved not sent to DAL — original expense.recorded event id is missing for', expenseId);
      }

      bus.emit('operation.expense.approved', { expenseId: expenseId });
      return { ok: true, expense: r.record };
    },

    /** Ops-local only — not one of the spec's 21 required events. */
    reject: async function(expenseId, reason) {
      var g = await _getOwned(expenseId);
      if (!g.ok) return g;
      if (g.expense.status === 'approved') return { ok: false, error: 'Cannot reject an already-approved expense', code: 'ALREADY_APPROVED' };

      var updated = Object.assign({}, g.expense, {
        status: 'rejected', rejectedAt: new Date().toISOString(),
        rejectReason: reason ? sec.sanitizeString(reason, 255) : ''
      });
      var r = await bus.call('ops.storage.expenses.put', updated);
      if (!r.ok) return r;

      audit('reject', 'expense', expenseId, g.expense, r.record);
      bus.emit('operation.expense.rejected', { expenseId: expenseId });
      return { ok: true, expense: r.record };
    },

    get: async function(expenseId) {
      var r = await bus.call('ops.storage.expenses.get', { id: expenseId });
      return { ok: r.ok, expense: r.record };
    },

    list: async function(opts) {
      opts = opts || {};
      var ctx = window.INFINICUS.ops.workspace.getContext();
      var businessId = opts.businessId || ctx.businessId;
      if (!businessId) return { ok: true, expenses: [] };

      // by_status is NOT business-scoped (single-field index) — always
      // re-filter by businessId after fetching, regardless of which
      // index was used, so a status-filtered query can never leak
      // another business's expenses into the result.
      var r = opts.status
        ? await bus.call('ops.storage.expenses.list', { indexName: 'by_status', keyVal: opts.status })
        : await bus.call('ops.storage.expenses.list', { indexName: 'by_business', keyVal: businessId });

      var expenses = (r.records || []).filter(function(e) { return e.businessId === businessId; });
      if (opts.branchId) expenses = expenses.filter(function(e) { return e.branchId === opts.branchId; });
      expenses.sort(function(a, b) { return (b.createdAt || '') > (a.createdAt || '') ? 1 : -1; });
      return { ok: true, expenses: expenses };
    }
  };

  window.INFINICUS.ops.expense = expenseApi;

  bus.register('operations.expense.create',  function(p) { return expenseApi.create(p); });
  bus.register('operations.expense.update',  function(p) { return expenseApi.update(p); });
  bus.register('operations.expense.approve', function(p) { return expenseApi.approve(p.expenseId, p.approvedBy); });
  bus.register('operations.expense.reject',  function(p) { return expenseApi.reject(p.expenseId, p.reason); });
  bus.register('operations.expense.get',     function(p) { return expenseApi.get(p.expenseId); });
  bus.register('operations.expense.list',    function(p) { return expenseApi.list(p); });

})(); // OperationsExpenseModule
</script>

<!-- ── 10B · Expenses View ──────────────────────────────────────── -->
<script>
'use strict';

(function ExpensesViewModule() {

  var bus = window.INFINICUS.bus;
  var esc = window.INFINICUS.esc;
  var biz = window.INFINICUS.biz;

  var _editingId = null;
  var _filterStatus = '';

  var CATEGORIES = ['Rent', 'Utilities', 'Supplies', 'Payroll', 'Marketing', 'Software & Subscriptions', 'Travel', 'Maintenance', 'Professional Services', 'Other'];
  var STATUS_BADGE = { pending: 'badge-amber', approved: 'badge-green', rejected: 'badge-red' };

  function _mount() {
    var content = document.querySelector('#view-expenses .content');
    if (!content) return;
    content.innerHTML =
      '<div id="exp-no-biz" style="display:none">' +
        '<div class="placeholder"><div class="placeholder-icon">▤</div>' +
          '<div class="placeholder-title">NO BUSINESS SELECTED</div>' +
          '<div class="placeholder-sub">Select a business on the Home screen first.</div>' +
        '</div>' +
      '</div>' +
      '<div id="exp-main">' +
        '<div class="stat-grid" id="exp-stats"></div>' +

        '<div class="card" style="margin-bottom:16px">' +
          '<div class="card-hd"><div class="card-title">EXPENSES</div>' +
            '<button class="btn btn-ghost btn-sm" id="exp-create-toggle">+ NEW EXPENSE</button>' +
          '</div>' +
          '<div id="exp-form-body" style="display:none"><div class="card-body">' +
            '<div class="form-row-2">' +
              '<div class="form-group"><label class="form-label">CATEGORY <span class="req">*</span></label>' +
                '<select class="form-control" id="exp-f-category">' + CATEGORIES.map(function(c) { return '<option value="' + esc(c) + '">' + esc(c) + '</option>'; }).join('') + '</select></div>' +
              '<div class="form-group"><label class="form-label">AMOUNT <span class="req">*</span></label>' +
                '<input class="form-control" id="exp-f-amount" type="number" min="0.01" step="0.01" placeholder="0.00"></div>' +
            '</div>' +
            '<div class="form-row-2">' +
              '<div class="form-group"><label class="form-label">VENDOR</label>' +
                '<input class="form-control" id="exp-f-vendor" maxlength="255" placeholder="Optional"></div>' +
              '<div class="form-group" style="display:flex;align-items:flex-end;padding-bottom:9px">' +
                '<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-family:var(--mono);font-size:11px;color:var(--text-2)">' +
                  '<input type="checkbox" id="exp-f-recurring" style="accent-color:var(--accent)"> Recurring expense' +
                '</label>' +
              '</div>' +
            '</div>' +
            '<div class="form-group"><label class="form-label">DESCRIPTION</label>' +
              '<input class="form-control" id="exp-f-desc" maxlength="500" placeholder="Optional"></div>' +
            '<div style="display:flex;align-items:center;gap:10px">' +
              '<button class="btn btn-primary btn-sm" id="exp-f-save">RECORD EXPENSE</button>' +
              '<span id="exp-f-fb" style="font-family:var(--mono);font-size:10px"></span>' +
            '</div>' +
          '</div></div>' +
        '</div>' +

        '<div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap">' +
          '<select class="form-control" id="exp-f-status" style="max-width:180px">' +
            '<option value="">— All statuses —</option>' +
            '<option value="pending">Pending</option><option value="approved">Approved</option><option value="rejected">Rejected</option>' +
          '</select>' +
          '<div style="flex:1"></div>' +
        '</div>' +
        '<div id="exp-list"></div>' +
        '<div id="exp-empty" style="display:none"><div class="placeholder"><div class="placeholder-icon">▤</div>' +
          '<div class="placeholder-title">NO EXPENSES YET</div>' +
          '<div class="placeholder-sub">Record your first expense above.</div>' +
        '</div></div>' +
      '</div>';
  }

  function _openForm(prefill) {
    document.getElementById('exp-form-body').style.display = 'block';
    document.getElementById('exp-create-toggle').textContent = '− CANCEL';
    document.getElementById('exp-f-category').value = prefill ? prefill.category : CATEGORIES[0];
    document.getElementById('exp-f-amount').value = prefill ? prefill.amount : '';
    document.getElementById('exp-f-vendor').value = prefill ? prefill.vendorName || '' : '';
    document.getElementById('exp-f-recurring').checked = prefill ? !!prefill.isRecurring : false;
    document.getElementById('exp-f-desc').value = prefill ? prefill.description || '' : '';
    document.getElementById('exp-f-save').textContent = prefill ? 'SAVE CHANGES' : 'RECORD EXPENSE';
    _editingId = prefill ? prefill.expenseId : null;
  }
  function _closeForm() {
    document.getElementById('exp-form-body').style.display = 'none';
    document.getElementById('exp-create-toggle').textContent = '+ NEW EXPENSE';
    _editingId = null;
  }

  function _row(e) {
    var d = e.createdAt ? new Date(e.createdAt) : null;
    var dateStr = d ? d.toLocaleDateString() : '';
    var actions = '';
    if (e.status === 'pending') {
      actions = '<button class="btn btn-secondary btn-sm exp-edit" data-id="' + esc(e.expenseId) + '">EDIT</button>' +
        '<button class="btn btn-accent btn-sm exp-approve" data-id="' + esc(e.expenseId) + '">APPROVE</button>' +
        '<button class="btn btn-danger btn-sm exp-reject" data-id="' + esc(e.expenseId) + '">REJECT</button>';
    }
    return '<div class="card" style="margin-bottom:8px"><div class="card-body" style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:12px 16px">' +
      '<div style="flex:1;min-width:180px">' +
        '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">' +
          '<span style="font-weight:600">' + esc(e.category) + '</span>' +
          '<span class="badge ' + (STATUS_BADGE[e.status] || 'badge-muted') + '">' + esc((e.status || '').toUpperCase()) + '</span>' +
          (e.isRecurring ? '<span class="badge badge-muted">RECURRING</span>' : '') +
        '</div>' +
        '<div style="font-family:var(--mono);font-size:10.5px;color:var(--text-3);margin-top:4px">' +
          (e.vendorName ? esc(e.vendorName) + ' · ' : '') + esc(dateStr) +
          (e.description ? ' · ' + esc(e.description) : '') +
          (e.status === 'rejected' && e.rejectReason ? ' · ' + esc(e.rejectReason) : '') +
        '</div>' +
      '</div>' +
      '<div style="font-family:var(--mono);font-size:15px;font-weight:700;color:var(--text)">' + esc(e.currency || '') + ' ' + (+e.amount).toFixed(2) + '</div>' +
      (actions ? '<div style="display:flex;gap:8px;flex-wrap:wrap">' + actions + '</div>' : '') +
    '</div></div>';
  }

  async function _renderList() {
    var listEl = document.getElementById('exp-list');
    var emptyEl = document.getElementById('exp-empty');
    var statsEl = document.getElementById('exp-stats');
    if (!listEl) return;

    var r = await window.INFINICUS.ops.expense.list({ status: _filterStatus || undefined });
    var expenses = r.expenses || [];
    if (emptyEl) emptyEl.style.display = expenses.length ? 'none' : 'block';
    listEl.innerHTML = expenses.map(_row).join('');

    if (statsEl) {
      var pending = expenses.filter(function(e) { return e.status === 'pending'; });
      var thirtyDaysAgo = Date.now() - 30 * 86400000;
      var recorded30 = expenses.filter(function(e) { return e.status !== 'rejected' && new Date(e.createdAt).getTime() >= thirtyDaysAgo; });
      var ctx = window.INFINICUS.ops.workspace.getContext();
      var cur = (ctx.business && ctx.business.currency) || '';
      var pendingTotal = pending.reduce(function(s, e) { return s + (+e.amount || 0); }, 0);
      var total30 = recorded30.reduce(function(s, e) { return s + (+e.amount || 0); }, 0);
      statsEl.innerHTML = [
        { l: 'PENDING APPROVAL', v: pending.length + ' · ' + cur + ' ' + pendingTotal.toFixed(2), c: 'c-amber' },
        { l: 'RECORDED (30D)',   v: cur + ' ' + total30.toFixed(2), c: 'c-blue' }
      ].map(function(t) { return '<div class="stat-tile"><div class="stat-label">' + esc(t.l) + '</div><div class="stat-value ' + t.c + '">' + esc(String(t.v)) + '</div></div>'; }).join('');
    }
  }

  function _syncBiz() {
    var active = biz.getActiveId();
    var noBiz = document.getElementById('exp-no-biz');
    var main = document.getElementById('exp-main');
    if (noBiz) noBiz.style.display = active ? 'none' : 'block';
    if (main) main.style.display = active ? 'block' : 'none';
    if (active) _renderList();
  }

  function _wire() {
    var toggleBtn = document.getElementById('exp-create-toggle');
    if (toggleBtn) toggleBtn.addEventListener('click', function() {
      var open = document.getElementById('exp-form-body').style.display !== 'none';
      if (open) _closeForm(); else _openForm(null);
    });

    var saveBtn = document.getElementById('exp-f-save');
    if (saveBtn) saveBtn.addEventListener('click', async function() {
      var fb = document.getElementById('exp-f-fb');
      var fields = {
        category:    (document.getElementById('exp-f-category')  || {}).value || '',
        amount:      (document.getElementById('exp-f-amount')    || {}).value || 0,
        vendorName:  (document.getElementById('exp-f-vendor')    || {}).value || '',
        isRecurring: (document.getElementById('exp-f-recurring') || {}).checked,
        description: (document.getElementById('exp-f-desc')      || {}).value || ''
      };
      var r = _editingId
        ? await window.INFINICUS.ops.expense.update(Object.assign({ expenseId: _editingId }, fields))
        : await window.INFINICUS.ops.expense.create(fields);
      if (r.ok) { _closeForm(); if (fb) fb.textContent = ''; _renderList(); }
      else if (fb) { fb.style.color = 'var(--red)'; fb.textContent = r.error || 'Could not save expense'; }
    });

    var statusEl = document.getElementById('exp-f-status');
    if (statusEl) statusEl.addEventListener('change', function() { _filterStatus = statusEl.value; _renderList(); });

    var listEl = document.getElementById('exp-list');
    if (listEl) listEl.addEventListener('click', async function(e) {
      var editBtn = e.target.closest('.exp-edit');
      if (editBtn) { var r = await window.INFINICUS.ops.expense.get(editBtn.dataset.id); if (r.expense) _openForm(r.expense); return; }

      var approveBtn = e.target.closest('.exp-approve');
      if (approveBtn) { await window.INFINICUS.ops.expense.approve(approveBtn.dataset.id, ''); _renderList(); return; }

      var rejectBtn = e.target.closest('.exp-reject');
      if (rejectBtn) {
        if (!confirm('Reject this expense?')) return;
        await window.INFINICUS.ops.expense.reject(rejectBtn.dataset.id, '');
        _renderList();
      }
    });
  }

  bus.on('dal.business.selected',      _syncBiz);
  bus.on('operation.expense.created',  _renderList);
  bus.on('operation.expense.approved', _renderList);
  bus.on('operation.expense.rejected', _renderList);

  window.INFINICUS.ops.expensesView = { refresh: _renderList };
  window.__opsExpensesInit = function() { _mount(); _wire(); _syncBiz(); };

})(); // ExpensesViewModule
</script>

<!-- ── BLOCK 10 — INIT ──────────────────────────────────────────── -->
<script>
(function Block10Init() {
  'use strict';

  window.__opsExpensesInit();

  console.info(
    '[BOL] Block 10 ready | routes: ' + window.INFINICUS.bus.listRoutes().length +
    ' | Expenses: create/update/approve/reject/get/list — approval is a UX gate, not real auth'
  );

  window.INFINICUS.bus.emit('ops.expenses.ready', { block: 10 });

})(); // Block10Init
</script>
