    validatePayload: function(eventType, payload) { return this.validate('payload.' + eventType, payload); },
    validateEnvelope: function(envelope) {
      var envResult = this.validate('dal.event.envelope', envelope);
      if (!envResult.valid) return envResult;
      if (envelope && envelope.eventType && envelope.payload) {
        var payloadSchemaName = 'payload.' + envelope.eventType;
        if (_store[payloadSchemaName]) {
          var payResult = this.validate(payloadSchemaName, envelope.payload);
          if (!payResult.valid) return { valid: false, errors: payResult.errors.map(function(e) { return 'payload' + e.slice(1); }) };
        }
      }
      return { valid: true, errors: [] };
    }
  };

  SchemaRegistry.register('dal.event.envelope', ENVELOPE_SCHEMA);
  EVENT_TYPES.forEach(function(type) {
    if (PAYLOAD_SCHEMAS[type]) SchemaRegistry.register('payload.' + type, PAYLOAD_SCHEMAS[type]);
  });

  window.INFINICUS.schemas = SchemaRegistry;

  window.INFINICUS.bus.__setValidator(function busValidator(schema, payload) {
    return window.INFINICUS.validator.validate(schema, payload);
  });

})(); // SchemaRegistryModule
</script>

<!-- ── 2C · Operations Schema Extensions (NEW — additive only) ──
     Registers 14 new canonical eventTypes via the SAME registry
     used above, using only its public API (register/get + the
     shared eventTypes array reference). Does not touch dal.html.
────────────────────────────────────────────────────────────── -->
<script>
'use strict';

(function OperationsSchemaExtensionModule() {

  var schemas = window.INFINICUS.schemas;

  var NEW_EVENT_TYPES = [
    'order.created', 'order.completed', 'order.cancelled', 'order.refunded',
    'payment.completed', 'payment.refunded',
    'expense.approved',
    'purchaseOrder.created', 'purchaseOrder.received',
    'shift.started', 'shift.ended',
    'task.created', 'task.completed',
    'day.closed'
  ];

  var OPS_PAYLOAD_SCHEMAS = {

    'order.created': { type:'object', required:['orderId','branchId','itemCount'], properties:{
      orderId:{type:'string',format:'uuid'}, branchId:{type:'string',format:'uuid'},
      customerId:{type:'string',maxLength:100}, itemCount:{type:'number',minimum:0},
      status:{type:'string',enum:['draft']} } },

    'order.completed': { type:'object', required:['orderId','branchId','items','subtotal','total','paymentStatus'], properties:{
      orderId:{type:'string',format:'uuid'}, branchId:{type:'string',format:'uuid'},
      customerId:{type:'string',maxLength:100},
      items:{ type:'array', minItems:1, items:{ type:'object',
        required:['productId','name','quantity','unitPrice','lineTotal'], properties:{
          productId:{type:'string',maxLength:100}, name:{type:'string',maxLength:255},
          quantity:{type:'number',minimum:0}, unitPrice:{type:'number',minimum:0},
          lineTotal:{type:'number',minimum:0} } } },
      subtotal:{type:'number',minimum:0}, discount:{type:'number',minimum:0},
      tax:{type:'number',minimum:0}, total:{type:'number',minimum:0},
      paymentStatus:{type:'string',enum:['unpaid','partial','paid']} } },

    'order.cancelled': { type:'object', required:['orderId','branchId'], properties:{
      orderId:{type:'string',format:'uuid'}, branchId:{type:'string',format:'uuid'},
      reason:{type:'string',maxLength:255} } },

    'order.refunded': { type:'object', required:['orderId','refundId','amount'], properties:{
      orderId:{type:'string',format:'uuid'}, refundId:{type:'string',format:'uuid'},
      amount:{type:'number',minimum:0}, reason:{type:'string',maxLength:255} } },

    'payment.completed': { type:'object', required:['paymentId','orderId','amount','method'], properties:{
      paymentId:{type:'string',format:'uuid'}, orderId:{type:'string',format:'uuid'},
      amount:{type:'number',minimum:0},
      method:{type:'string',enum:['cash','card','mobile','bank_transfer','store_credit','other']},
      tenderedAmount:{type:'number',minimum:0}, changeGiven:{type:'number',minimum:0},
      reference:{type:'string',maxLength:100} } },

    'payment.refunded': { type:'object', required:['paymentId','orderId','amount','method'], properties:{
      paymentId:{type:'string',format:'uuid'}, orderId:{type:'string',format:'uuid'},
      amount:{type:'number',minimum:0},
      method:{type:'string',enum:['cash','card','mobile','bank_transfer','store_credit','other']},
      reason:{type:'string',maxLength:255} } },

    'expense.approved': { type:'object', required:['originalEventId','amount'], properties:{
      originalEventId:{type:'string',format:'uuid'}, approvedBy:{type:'string',maxLength:100},
      amount:{type:'number',minimum:0} } },

    'purchaseOrder.created': { type:'object', required:['poId','supplierId','branchId','itemCount','totalCost'], properties:{
      poId:{type:'string',format:'uuid'}, supplierId:{type:'string',maxLength:100},
      branchId:{type:'string',format:'uuid'}, itemCount:{type:'number',minimum:0},
      totalCost:{type:'number',minimum:0}, expectedAt:{type:'string',format:'date-time'} } },

    'purchaseOrder.received': { type:'object', required:['poId','supplierId','branchId','itemCount','totalReceived'], properties:{
      poId:{type:'string',format:'uuid'}, supplierId:{type:'string',maxLength:100},
      branchId:{type:'string',format:'uuid'}, itemCount:{type:'number',minimum:0},
      totalReceived:{type:'number',minimum:0} } },

    'shift.started': { type:'object', required:['shiftId','employeeId','branchId'], properties:{
      shiftId:{type:'string',format:'uuid'}, employeeId:{type:'string',format:'uuid'},
      branchId:{type:'string',format:'uuid'}, openingCashAmount:{type:'number',minimum:0} } },

    'shift.ended': { type:'object', required:['shiftId','employeeId','branchId'], properties:{
      shiftId:{type:'string',format:'uuid'}, employeeId:{type:'string',format:'uuid'},
      branchId:{type:'string',format:'uuid'}, closingCashAmount:{type:'number',minimum:0},
      expectedCashAmount:{type:'number',minimum:0}, variance:{type:'number'} } },

    'task.created': { type:'object', required:['taskId','title'], properties:{
      taskId:{type:'string',format:'uuid'}, title:{type:'string',minLength:1,maxLength:255},
      assignedTo:{type:'string',maxLength:100}, dueAt:{type:'string',format:'date-time'},
      priority:{type:'string',enum:['low','normal','high','urgent']} } },

    'task.completed': { type:'object', required:['taskId'], properties:{
      taskId:{type:'string',format:'uuid'}, completedBy:{type:'string',maxLength:100} } },

    'day.closed': { type:'object', required:['branchId','businessDate','totalSales','totalExpenses','cashVariance','orderCount'], properties:{
      branchId:{type:'string',format:'uuid'}, businessDate:{type:'string',format:'iso-date'},
      totalSales:{type:'number',minimum:0}, totalExpenses:{type:'number',minimum:0},
      cashVariance:{type:'number'}, orderCount:{type:'number',minimum:0} } }
  };

  // Register every new payload schema, then extend the SHARED eventTypes
  // array (same object referenced by dal.event.envelope AND ingest.single
  // enum checks — one push updates every validation checkpoint at once).
  NEW_EVENT_TYPES.forEach(function(type) {
    schemas.register('payload.' + type, OPS_PAYLOAD_SCHEMAS[type]);
    if (schemas.eventTypes.indexOf(type) === -1) schemas.eventTypes.push(type);
  });

  // Patch existing DAL schemas in place (schemas.get returns the live
  // reference, not a copy — mutating it here is the intended extension
  // path, not a workaround).
  var invConsumed = schemas.get('payload.inventory.consumed');
  if (invConsumed && invConsumed.properties.reason && invConsumed.properties.reason.enum.indexOf('damage') === -1) {
    invConsumed.properties.reason.enum.push('damage');
  }

  var invReceived = schemas.get('payload.inventory.received');
  if (invReceived && !invReceived.properties.reason) {
    invReceived.properties.reason = { type: 'string', enum: ['purchase','return','transfer-in','adjustment-in','other'] };
  }

  window.INFINICUS.__opsSchemaExtensions = { newEventTypes: NEW_EVENT_TYPES };

})(); // OperationsSchemaExtensionModule
</script>

<!-- ── 2D · StorageAdapter + IDB for infinicus_dal (shared with dal.html) ── -->
<script>
'use strict';

(function IDBHelpersModule() {

  var DB_NAME    = 'infinicus_dal';
  var DB_VERSION = 1;
  var _db        = null;

  function openDB() {
    if (_db) return Promise.resolve(_db);
    if (!window.indexedDB) {
      return Promise.reject(new Error('IndexedDB is not available. Private-browsing mode may be blocking it.'));
    }
    return new Promise(function(resolve, reject) {
      var req = indexedDB.open(DB_NAME, DB_VERSION);

      req.onupgradeneeded = function(e) {
        var db = e.target.result;
        var old = e.oldVersion;
        if (old < 1) {
          var evSt = db.createObjectStore('events', { keyPath: 'eventId' });
          evSt.createIndex('by_business',      'businessId',                { unique: false });
          evSt.createIndex('by_business_type', ['businessId', 'eventType'],  { unique: false });
          evSt.createIndex('by_business_date', ['businessId', 'occurredAt'], { unique: false });
          evSt.createIndex('by_checksum',      'checksum',                  { unique: true  });
          evSt.createIndex('by_occurred',      'occurredAt',                { unique: false });

          var bizSt = db.createObjectStore('businesses', { keyPath: 'businessId' });
          bizSt.createIndex('by_name',    'name',      { unique: false });
          bizSt.createIndex('by_created', 'createdAt', { unique: false });

          var impSt = db.createObjectStore('imports', { keyPath: 'importId' });
          impSt.createIndex('by_business', 'businessId', { unique: false });
          impSt.createIndex('by_started',  'startedAt',  { unique: false });
          impSt.createIndex('by_status',   'status',     { unique: false });

          var errSt = db.createObjectStore('errors', { keyPath: 'errorId' });
          errSt.createIndex('by_business', 'businessId', { unique: false });
          errSt.createIndex('by_occurred', 'occurredAt', { unique: false });
          errSt.createIndex('by_code',     'code',       { unique: false });
        }
        // NOTE: if dal.html has already created this DB at v1, this
        // callback simply never fires here — we connect to the existing
        // stores. Either page can be opened first; both converge on the
        // same schema because the definitions are byte-identical.
      };

      req.onsuccess = function() {
        _db = req.result;
        _db.onversionchange = function() {
          _db.close(); _db = null;
          console.warn('[IDB] Version change — connection closed. Reload to reconnect.');
        };
        resolve(_db);
      };
      req.onerror   = function() { reject(req.error); };
      req.onblocked = function() { reject(new Error('IDB open blocked — close other tabs running this app')); };
    });
  }

  function idbGet(store, key) {
    return openDB().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx = db.transaction([store], 'readonly');
        var req = tx.objectStore(store).get(key);
        req.onsuccess = function() { resolve(req.result || null); };
        req.onerror   = function() { reject(req.error); };
      });
    });
  }

  function idbGetAll(store) {
    return openDB().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx = db.transaction([store], 'readonly');
        var req = tx.objectStore(store).getAll();
        req.onsuccess = function() { resolve(req.result || []); };
        req.onerror   = function() { reject(req.error); };
      });
    });
  }

  function idbGetAllByIndex(store, indexName, keyVal) {
    return openDB().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx = db.transaction([store], 'readonly');
        var req = tx.objectStore(store).index(indexName).getAll(keyVal);
        req.onsuccess = function() { resolve(req.result || []); };
        req.onerror   = function() { reject(req.error); };
      });
    });
  }

  function idbCount(store, indexName, keyVal) {
    return openDB().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx  = db.transaction([store], 'readonly');
        var src = indexName ? tx.objectStore(store).index(indexName) : tx.objectStore(store);
        var req = (keyVal !== undefined) ? src.count(keyVal) : src.count();
        req.onsuccess = function() { resolve(req.result); };
        req.onerror   = function() { reject(req.error); };
      });
    });
  }

  function idbPut(store, record) {
    return openDB().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx  = db.transaction([store], 'readwrite');
        var req = tx.objectStore(store).put(record);
        req.onsuccess = function() { resolve(record); };
        req.onerror   = function() { reject(req.error); };
        tx.onerror    = function() { reject(tx.error); };
      });
    });
  }

  function idbCursor(store, indexName, opts) {
    opts = opts || {};
    var limit  = opts.limit  || 100;
    var offset = opts.offset || 0;
    return openDB().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx     = db.transaction([store], 'readonly');
        var source = indexName ? tx.objectStore(store).index(indexName) : tx.objectStore(store);
        var req    = source.openCursor(opts.range || null, opts.direction || 'next');
        var results = []; var skipped = 0;
        req.onsuccess = function() {
          var cursor = req.result;
          if (!cursor) { resolve(results); return; }
          if (skipped < offset) { skipped++; cursor.continue(); return; }
          results.push(cursor.value);
          if (results.length >= limit) { resolve(results); return; }
          cursor.continue();
        };
        req.onerror = function() { reject(req.error); };
      });
    });
  }

  window.INFINICUS._idb = { openDB, idbGet, idbGetAll, idbGetAllByIndex, idbCount, idbPut, idbCursor };

})(); // IDBHelpersModule


(function StorageAdapterModule() {

  var idb  = window.INFINICUS._idb;
  var bus  = window.INFINICUS.bus;
  var uuid = window.INFINICUS.uuid;
  var LS_NS = 'dal.settings.'; // shared prefix — intentional, see Block 2 write-up

  var storage = {

    init: function() {
      return idb.openDB().then(function(db) { return { ok: true, dbVersion: db.version }; })
        .catch(function(err) { return { ok: false, error: err.message, code: err.name }; });
    },

    putEvent: async function(envelope) {
      try {
        var record = Object.assign({}, envelope, { receivedAt: new Date().toISOString() });
        record.checksum = await window.INFINICUS.eventChecksum(record.businessId, record.eventType, record.occurredAt, record.payload);

        var db = await idb.openDB();
        var saved = await new Promise(function(resolve, reject) {
          var tx  = db.transaction(['events'], 'readwrite');
          var req = tx.objectStore('events').put(record);
          req.onsuccess = function() { resolve(record); };
          req.onerror   = function() { reject(req.error); };
          tx.onerror    = function() { reject(tx.error); };
        });

        bus.emit('dal.event.stored', { eventId: saved.eventId, eventType: saved.eventType, businessId: saved.businessId });
        return { ok: true, event: saved };
      } catch(err) {
        if (err && err.name === 'ConstraintError') return { ok: true, duplicate: true };
        console.error('[Storage] putEvent:', err);
        return { ok: false, error: err.message || String(err), code: err.name || 'STORAGE_ERROR' };
      }
    },

    getEvent: function(eventId) {
      return idb.idbGet('events', eventId).then(function(rec) { return { ok: true, event: rec }; })
        .catch(function(err) { return { ok: false, error: err.message, code: err.name }; });
    },

    queryEvents: function(businessId, opts) {
      opts = opts || {};
      var limit  = Math.min(opts.limit || 50, 500);
      var offset = opts.offset || 0;
      var from   = opts.from || '0000-01-01T00:00:00.000Z';
      var to     = opts.to   || '9999-12-31T23:59:59.999Z';
      var range  = IDBKeyRange.bound([businessId, from], [businessId, to]);

      return idb.idbCursor('events', 'by_business_date', { range: range, direction: 'prev', limit: limit, offset: offset })
        .then(function(events) {
          if (opts.eventType) events = events.filter(function(e) { return e.eventType === opts.eventType; });
          return { ok: true, events: events, count: events.length };
        }).catch(function(err) { return { ok: false, error: err.message, code: err.name }; });
    },

    countEvents: function(businessId) {
      return idb.idbCount('events', 'by_business', businessId).then(function(n) { return { ok: true, count: n }; })
        .catch(function(err) { return { ok: false, error: err.message, code: err.name }; });
    },

    putBusiness: function(profile) {
      return idb.idbGet('businesses', profile.businessId).then(function(existing) {
        var now = new Date().toISOString();
        var record = Object.assign({ createdAt: now }, existing || {}, profile, { updatedAt: now });
        return idb.idbPut('businesses', record);
      }).then(function(record) {
        bus.emit('dal.business.updated', { businessId: record.businessId, name: record.name });
        return { ok: true, business: record };
      }).catch(function(err) { return { ok: false, error: err.message, code: err.name }; });
    },

    getBusiness: function(businessId) {
      return idb.idbGet('businesses', businessId).then(function(rec) { return { ok: true, business: rec }; })
        .catch(function(err) { return { ok: false, error: err.message, code: err.name }; });
    },

    listBusinesses: function() {
      return idb.idbGetAll('businesses').then(function(all) {
        all.sort(function(a, b) { return (b.createdAt || '') > (a.createdAt || '') ? 1 : -1; });
        return { ok: true, businesses: all };
      }).catch(function(err) { return { ok: false, error: err.message, code: err.name }; });
    },

    putImport: function(job) {
      var now = new Date().toISOString();
      var record = Object.assign({ startedAt: now, status: 'pending' }, job, { updatedAt: now });
      return idb.idbPut('imports', record).then(function(r) { return { ok: true, import: r }; })
        .catch(function(err) { return { ok: false, error: err.message, code: err.name }; });
    },

    getImport: function(importId) {
      return idb.idbGet('imports', importId).then(function(rec) { return { ok: true, import: rec }; })
        .catch(function(err) { return { ok: false, error: err.message, code: err.name }; });
    },

    listImports: function(businessId) {
      return idb.idbGetAllByIndex('imports', 'by_business', businessId).then(function(all) {
        all.sort(function(a, b) { return (b.startedAt || '') > (a.startedAt || '') ? 1 : -1; });
        return { ok: true, imports: all };
      }).catch(function(err) { return { ok: false, error: err.message, code: err.name }; });
    },

    putError: function(record) {
      var now = new Date().toISOString();
      var rec = Object.assign({ errorId: uuid(), occurredAt: now, businessId: null }, record);
      return idb.idbPut('errors', rec).then(function(r) { return { ok: true, errorRecord: r }; })
        .catch(function(err) { return { ok: false, error: err.message, code: err.name }; });
    },

    queryErrors: function(opts) {
      opts = opts || {};
      var limit  = Math.min(opts.limit || 50, 200);
      var offset = opts.offset || 0;
      if (opts.businessId) {
        return idb.idbGetAllByIndex('errors', 'by_business', opts.businessId).then(function(all) {
          all.sort(function(a, b) { return (b.occurredAt || '') > (a.occurredAt || '') ? 1 : -1; });
          return { ok: true, errors: all.slice(offset, offset + limit), total: all.length };
        }).catch(function(err) { return { ok: false, error: err.message, code: err.name }; });
      }
      return idb.idbCursor('errors', 'by_occurred', { direction: 'prev', limit: limit, offset: offset })
        .then(function(errors) { return { ok: true, errors: errors, count: errors.length }; })
        .catch(function(err) { return { ok: false, error: err.message, code: err.name }; });
    },

    getSetting: function(key) {
      try { var raw = localStorage.getItem(LS_NS + key); return raw !== null ? JSON.parse(raw) : null; }
      catch(_) { return null; }
    },
    setSetting: function(key, value) {
      try { localStorage.setItem(LS_NS + key, JSON.stringify(value)); return true; }
      catch(err) { console.warn('[Storage] setSetting failed:', key, err.message); return false; }
    },
    deleteSetting: function(key) {
      try { localStorage.removeItem(LS_NS + key); return true; } catch(_) { return false; }
    }
  };

  window.INFINICUS.storage = storage;

  var envelopeSchema = window.INFINICUS.schemas.get('dal.event.envelope');

  bus.register('storage.init', function() { return storage.init(); });

  bus.register('storage.event.put',   function(p) { return storage.putEvent(p); }, envelopeSchema);
  bus.register('storage.event.get',   function(p) { return storage.getEvent(p.eventId); });
  bus.register('storage.event.query', function(p) { return storage.queryEvents(p.businessId, p); });
  bus.register('storage.event.count', function(p) { return storage.countEvents(p.businessId); });

  bus.register('storage.business.put',  function(p) { return storage.putBusiness(p); });
  bus.register('storage.business.get',  function(p) { return storage.getBusiness(p.businessId); });
  bus.register('storage.business.list', function()  { return storage.listBusinesses(); });

  bus.register('storage.import.put',  function(p) { return storage.putImport(p); });
  bus.register('storage.import.get',  function(p) { return storage.getImport(p.importId); });
  bus.register('storage.import.list', function(p) { return storage.listImports(p.businessId); });

  bus.register('storage.error.put',   function(p) { return storage.putError(p); });
  bus.register('storage.error.query', function(p) { return storage.queryErrors(p); });

  bus.register('storage.settings.get',    function(p) { return { ok: true, value: storage.getSetting(p.key) }; });
  bus.register('storage.settings.set',    function(p) { return { ok: storage.setSetting(p.key, p.value) }; });
  bus.register('storage.settings.delete', function(p) { return { ok: storage.deleteSetting(p.key) }; });

})(); // StorageAdapterModule
</script>

<!-- ── 2E · BusinessManager (manager logic only — Layer 2 builds its
     own Home/Workspace UI in a later block, not DAL's Businesses view) ── -->
<script>
'use strict';

(function BusinessManagerModule() {

  var bus     = window.INFINICUS.bus;
  var storage = window.INFINICUS.storage;
  var uuid    = window.INFINICUS.uuid;
  var sec     = window.INFINICUS.security;
  var schemas = window.INFINICUS.schemas;

  var SETTING_KEY = 'activeBusinessId';

  var _activeId      = null;
  var _activeProfile = null;

  var S_CREATE = { type:'object', required:['name'], properties:{
    name:{type:'string',minLength:1,maxLength:255}, industry:{type:'string',maxLength:100},
    country:{type:'string',minLength:2,maxLength:2}, currency:{type:'string',pattern:'^[A-Z]{3}$'},
    startedAt:{type:'string',format:'date-time'} } };

  var S_SELECT = { type:'object', required:['businessId'], properties:{ businessId:{type:'string',format:'uuid'} } };

  var S_UPDATE = { type:'object', required:['businessId'], properties:{
    businessId:{type:'string',format:'uuid'}, name:{type:'string',minLength:1,maxLength:255},
    industry:{type:'string',maxLength:100}, country:{type:'string',minLength:2,maxLength:2},
    currency:{type:'string',pattern:'^[A-Z]{3}$'} } };

  schemas.register('biz.create', S_CREATE);
  schemas.register('biz.select', S_SELECT);
  schemas.register('biz.update', S_UPDATE);

  function _setActive(profile) {
    _activeId      = profile ? profile.businessId : null;
    _activeProfile = profile || null;
    storage.setSetting(SETTING_KEY, _activeId);
    bus.emit('dal.business.selected', { businessId: _activeId, profile: _activeProfile });
  }

  var biz = {
    create: async function(fields) {
      try {
        var name = sec.sanitizeString(fields.name || '', 255);
        if (!name) return { ok: false, error: 'Business name is required', code: 'VALIDATION_FAILED' };
        var profile = {
          businessId: uuid(), name: name,
          industry:   fields.industry  ? sec.sanitizeString(fields.industry,  100) : null,
          country:    fields.country   ? sec.sanitizeString(fields.country,    2)  : null,
          currency:   fields.currency  ? sec.sanitizeString(fields.currency,   3)  : 'USD',
          startedAt:  fields.startedAt ? sec.sanitizeDate(fields.startedAt)        : null
        };
        if (profile.country)  profile.country  = profile.country.toUpperCase();
        if (profile.currency) profile.currency = profile.currency.toUpperCase();

        var result = await storage.putBusiness(profile);
        if (!result.ok) return result;
        _setActive(result.business);
        bus.emit('dal.business.created', { businessId: result.business.businessId });
        return { ok: true, business: result.business };
      } catch(err) { return { ok: false, error: err.message || String(err), code: err.name || 'BIZ_ERROR' }; }
    },

    select: async function(businessId) {
      if (!sec.isUUID(businessId)) return { ok: false, error: 'Invalid businessId', code: 'VALIDATION_FAILED' };
      var result = await storage.getBusiness(businessId);
      if (!result.ok) return result;
      if (!result.business) return { ok: false, error: 'Business not found', code: 'NOT_FOUND' };
      _setActive(result.business);
      return { ok: true, business: result.business };
    },

    deselect: function() { _setActive(null); return { ok: true }; },

    get: async function(businessId) {
      var id = businessId || _activeId;
      if (!id) return { ok: true, business: null };
      if (!sec.isUUID(id)) return { ok: false, error: 'Invalid businessId', code: 'VALIDATION_FAILED' };
      return storage.getBusiness(id);
    },

    getActive: function() { return { ok: true, business: _activeProfile, businessId: _activeId }; },
    getActiveId: function() { return _activeId; },
    list: function() { return storage.listBusinesses(); },

    update: async function(fields) {
      if (!sec.isUUID(fields.businessId)) return { ok: false, error: 'Invalid businessId', code: 'VALIDATION_FAILED' };
      try {
        var patch = { businessId: fields.businessId };
        if (fields.name     !== undefined) patch.name     = sec.sanitizeString(fields.name,     255);
        if (fields.industry !== undefined) patch.industry = sec.sanitizeString(fields.industry, 100);
        if (fields.country  !== undefined) patch.country  = sec.sanitizeString(fields.country,    2).toUpperCase();
        if (fields.currency !== undefined) patch.currency = sec.sanitizeString(fields.currency,   3).toUpperCase();

        var result = await storage.putBusiness(patch);
        if (!result.ok) return result;
        if (_activeId === fields.businessId) _activeProfile = result.business;
        bus.emit('dal.business.updated', { businessId: fields.businessId });
        return { ok: true, business: result.business };
      } catch(err) { return { ok: false, error: err.message || String(err), code: err.name || 'BIZ_ERROR' }; }
    },

    restoreActive: async function() {
      var saved = storage.getSetting(SETTING_KEY);
      if (!saved || !sec.isUUID(saved)) return false;
      var result = await storage.getBusiness(saved);
      if (result.ok && result.business) {
        _activeId = result.business.businessId; _activeProfile = result.business;
        bus.emit('dal.business.selected', { businessId: _activeId, profile: _activeProfile });
        return true;
      }
      storage.deleteSetting(SETTING_KEY);
      return false;
    }
  };

  window.INFINICUS.biz = biz;

  bus.register('data.business.create',    function(p) { return biz.create(p); },    S_CREATE);
  bus.register('data.business.select',    function(p) { return biz.select(p.businessId); }, S_SELECT);
  bus.register('data.business.deselect',  function()  { return biz.deselect(); });
  bus.register('data.business.get',       function(p) { return biz.get(p && p.businessId); });
  bus.register('data.business.getActive', function()  { return biz.getActive(); });
  bus.register('data.business.list',      function()  { return biz.list(); });
  bus.register('data.business.update',    function(p) { return biz.update(p); },    S_UPDATE);

})(); // BusinessManagerModule
</script>

<!-- ── 2F · EventIngestor (data.event.ingest / ingestBatch) ─────── -->
<script>
'use strict';

(function EventIngestorModule() {

  var bus     = window.INFINICUS.bus;
  var sec     = window.INFINICUS.security;
  var schemas = window.INFINICUS.schemas;
  var biz     = window.INFINICUS.biz;
  var uuidFn  = window.INFINICUS.uuid;

  var _stats = { ingested: 0, duplicates: 0, errors: 0, batches: 0 };
  var _beforeHooks = [];
  var _afterHooks  = [];

  var INGEST_SCHEMA = { type:'object', required:['eventType','occurredAt','payload'], properties:{
    businessId:{type:'string',format:'uuid'}, eventType:{type:'string',enum:schemas.eventTypes},
    occurredAt:{type:'string',format:'date-time'}, currency:{type:'string',pattern:'^[A-Z]{3}$'},
    source:{type:'string',maxLength:100}, payload:{type:'object'}, metadata:{type:'object'} } };
  schemas.register('ingest.single', INGEST_SCHEMA);

  function _resolveBusinessId(raw) {
    var id = raw.businessId || biz.getActiveId();
    if (!id) return { ok: false, error: 'No business selected — select a business first.', code: 'NO_BUSINESS' };
    if (!sec.isUUID(id)) return { ok: false, error: 'businessId is not a valid UUID', code: 'VALIDATION_FAILED' };
    return { ok: true, businessId: id };
  }

  function _validateEventType(eventType) {
    if (!sec.validateEnum(eventType, schemas.eventTypes)) {
      return { ok: false, error: 'Unknown eventType: "' + String(eventType) + '". Must be one of: ' + schemas.eventTypes.join(', '), code: 'INVALID_EVENT_TYPE' };
    }
    return { ok: true };
  }

  function _sanitizeOccurredAt(raw) {
    try {
      var val = String(raw).trim();
      if (/^\d{4}-\d{2}-\d{2}$/.test(val)) val = val + 'T00:00:00.000Z';
      return { ok: true, occurredAt: sec.sanitizeDate(val) };
    } catch(err) { return { ok: false, error: 'occurredAt: ' + err.message, code: 'VALIDATION_FAILED' }; }
  }

  async function _resolveCurrency(rawCurrency, businessId) {
    if (rawCurrency) {
      var c = String(rawCurrency).trim().toUpperCase();
      if (!/^[A-Z]{3}$/.test(c)) return { ok: false, error: 'currency must be 3 uppercase letters (ISO 4217), got: ' + rawCurrency, code: 'VALIDATION_FAILED' };
      return { ok: true, currency: c };
    }
    var r = await biz.get(businessId);
    if (r.ok && r.business && r.business.currency) return { ok: true, currency: r.business.currency };
    return { ok: true, currency: 'USD' };
  }

  function _validatePayload(eventType, payload) {
    if (!payload || typeof payload !== 'object' || Array.isArray(payload)) {
      return { ok: false, error: 'payload must be a non-null object', code: 'VALIDATION_FAILED' };
    }
    var vr = schemas.validatePayload(eventType, payload);
    if (!vr.valid) return { ok: false, error: 'payload validation failed: ' + vr.errors[0], errors: vr.errors, code: 'PAYLOAD_VALIDATION_FAILED' };
    return { ok: true };
  }

  function _buildEnvelope(businessId, eventType, occurredAt, currency, source, payload, metadata) {
    return {
      eventId: uuidFn(), businessId: businessId, eventType: eventType,
      source: sec.sanitizeString(source || 'manual', 100), occurredAt: occurredAt, currency: currency,
      payload: payload, metadata: (metadata && sec.isPlainObject(metadata)) ? metadata : {}
    };
  }

  async function ingest(raw) {
    try {
      if (!raw || typeof raw !== 'object') return { ok: false, error: 'ingest: raw must be an object', code: 'INVALID_INPUT' };

      var bizResult = _resolveBusinessId(raw);
      if (!bizResult.ok) { _stats.errors++; return bizResult; }
      var businessId = bizResult.businessId;

      var typeResult = _validateEventType(raw.eventType);
      if (!typeResult.ok) { _stats.errors++; return typeResult; }

      var dateResult = _sanitizeOccurredAt(raw.occurredAt);
      if (!dateResult.ok) { _stats.errors++; return dateResult; }

      var currResult = await _resolveCurrency(raw.currency, businessId);
      if (!currResult.ok) { _stats.errors++; return currResult; }

      var payloadResult = _validatePayload(raw.eventType, raw.payload);
      if (!payloadResult.ok) { _stats.errors++; return payloadResult; }

      var envelope = _buildEnvelope(businessId, raw.eventType, dateResult.occurredAt, currResult.currency, raw.source, raw.payload, raw.metadata);

      for (var i = 0; i < _beforeHooks.length; i++) {
        try { var modified = await _beforeHooks[i](envelope); if (modified && sec.isPlainObject(modified)) envelope = modified; }
        catch(hookErr) { console.warn('[Ingestor] beforeHook ' + i + ' threw:', hookErr); }
      }

      var storeResult = await bus.call('storage.event.put', envelope);

      if (storeResult.ok) {
        if (storeResult.duplicate) { _stats.duplicates++; return { ok: true, duplicate: true }; }
        _stats.ingested++;
        for (var j = 0; j < _afterHooks.length; j++) {
          try { await _afterHooks[j](storeResult.event || envelope); } catch(e) { console.warn('[Ingestor] afterHook ' + j + ' threw:', e); }
        }
        bus.emit('dal.event.ingested', { eventId: envelope.eventId, eventType: envelope.eventType, businessId: envelope.businessId, occurredAt: envelope.occurredAt, source: envelope.source });
        return { ok: true, event: storeResult.event || envelope };
      }
      _stats.errors++;
      return storeResult;
    } catch(err) {
      _stats.errors++;
      console.error('[Ingestor] pipeline error:', err);
      return { ok: false, error: err.message || String(err), code: err.name || 'INGESTOR_ERROR' };
    }
  }

  var BATCH_PROGRESS_INTERVAL = 25;

  async function ingestBatch(rawArray, opts) {
    if (!Array.isArray(rawArray)) return { ok: false, error: 'ingestBatch: first argument must be an array', code: 'INVALID_INPUT' };
    opts = opts || {};
    _stats.batches++;
    var results = []; var ingested = 0; var duplicates = 0; var errors = 0; var total = rawArray.length;
    bus.emit('dal.ingest.batch.started', { total: total, source: opts.source || 'batch' });

    for (var i = 0; i < total; i++) {
      var raw = rawArray[i];
      if (opts.source && raw && typeof raw === 'object') raw = Object.assign({}, raw, { source: opts.source });
      var result = await ingest(raw);
      results.push(result);
      if (result.ok) { if (result.duplicate) duplicates++; else ingested++; } else { errors++; }
      if ((i + 1) % BATCH_PROGRESS_INTERVAL === 0 || i === total - 1) {
        bus.emit('dal.ingest.progress', { processed: i + 1, total: total, pct: Math.round(((i + 1) / total) * 100), ingested: ingested, duplicates: duplicates, errors: errors });
      }
    }
    bus.emit('dal.ingest.batch.complete', { total: total, ingested: ingested, duplicates: duplicates, errors: errors });
    return { ok: total > 0 && errors < total, results: results, ingested: ingested, duplicates: duplicates, errors: errors, total: total };
  }

  var ingestor = {
    ingest: ingest, ingestBatch: ingestBatch,
    stats: function() { return Object.assign({}, _stats); },
    resetStats: function() { _stats = { ingested: 0, duplicates: 0, errors: 0, batches: 0 }; },
    addBeforeHook: function(fn) { if (typeof fn === 'function') _beforeHooks.push(fn); },
    addAfterHook:  function(fn) { if (typeof fn === 'function') _afterHooks.push(fn); },
    removeBeforeHook: function(fn) { _beforeHooks = _beforeHooks.filter(function(h) { return h !== fn; }); },
    removeAfterHook:  function(fn) { _afterHooks  = _afterHooks.filter(function(h)  { return h !== fn; }); }
  };

  window.INFINICUS.ingestor = ingestor;

  bus.register('data.event.ingest', function(p) { return ingest(p); }, INGEST_SCHEMA);
  bus.register('data.event.ingestBatch', function(p) {
    if (!p || !Array.isArray(p.events)) return { ok: false, error: 'ingestBatch: payload.events must be an array', code: 'INVALID_INPUT' };
    return ingestBatch(p.events, { source: p.source });
  });

})(); // EventIngestorModule
</script>

<script>
(function Block2Init() {
  'use strict';

  var schemas = window.INFINICUS.schemas;

  if (window.__OPS && typeof window.__OPS.setStatus === 'function') {
    window.__OPS.setStatus('ready', 'Core engine ready · ' + schemas.eventTypes.length + ' event types');

<!-- ════════════════════════════════════════════════════════════════
     BLOCK 3 · Operations Storage Adapter (infinicus_ops)
     Provides: window.INFINICUS.opsStorage, window.INFINICUS._opsIdb
     DB: 'infinicus_ops' v1 — 16 stores, generic CRUD (put/get/list/
     query/remove/count), 80 ops.storage.* bus routes generated from
     STORE_DEFS, ops.settings.* localStorage (prefix 'ops.settings.',
     distinct from the inherited 'dal.settings.' prefix — no collision).
════════════════════════════════════════════════════════════════ -->
<script>
'use strict';

(function OpsIDBHelpersModule() {

  var DB_NAME    = 'infinicus_ops';
  var DB_VERSION = 1;
  var _db        = null;

  // Single source of truth for every operational store — keyPath,
  // indexes [name, keyPathOrArray, unique]. Adding a 17th store later
  // means adding one entry here, not hand-writing createObjectStore calls.
  var STORE_DEFS = [
    { name: 'branches', key: 'branchId', indexes: [
        ['by_business', 'businessId', false], ['by_name', 'name', false] ] },
    { name: 'products', key: 'productId', indexes: [
        ['by_business', 'businessId', false], ['by_business_sku', ['businessId','sku'], false],
        ['by_category', 'category', false], ['by_status', 'status', false] ] },
    { name: 'orders', key: 'orderId', indexes: [
        ['by_business', 'businessId', false], ['by_branch', 'branchId', false],
        ['by_business_status', ['businessId','status'], false],
        ['by_customer', 'customerId', false], ['by_created', 'createdAt', false] ] },
    { name: 'payments', key: 'paymentId', indexes: [
        ['by_order', 'orderId', false], ['by_business', 'businessId', false] ] },
    { name: 'cashSessions', key: 'sessionId', indexes: [
        ['by_branch', 'branchId', false], ['by_business', 'businessId', false], ['by_status', 'status', false] ] },
    { name: 'cashMovements', key: 'movementId', indexes: [
        ['by_session', 'sessionId', false], ['by_business', 'businessId', false] ] },
    { name: 'inventoryMovements', key: 'movementId', indexes: [
        ['by_business', 'businessId', false], ['by_branch', 'branchId', false],
        ['by_product', ['businessId','productId'], false], ['by_occurred', 'occurredAt', false] ] },
    { name: 'expenses', key: 'expenseId', indexes: [
        ['by_business', 'businessId', false], ['by_branch', 'branchId', false], ['by_status', 'status', false] ] },
    { name: 'customers', key: 'customerId', indexes: [
        ['by_business', 'businessId', false], ['by_email', 'email', false] ] },
    { name: 'suppliers', key: 'supplierId', indexes: [
        ['by_business', 'businessId', false] ] },
    { name: 'purchaseOrders', key: 'poId', indexes: [
        ['by_business', 'businessId', false], ['by_supplier', 'supplierId', false], ['by_status', 'status', false] ] },
    { name: 'employees', key: 'employeeId', indexes: [
        ['by_business', 'businessId', false], ['by_branch', 'branchId', false], ['by_role', 'roleId', false] ] },
    { name: 'roles', key: 'roleId', indexes: [
        ['by_business', 'businessId', false] ] },
    { name: 'shifts', key: 'shiftId', indexes: [
        ['by_business', 'businessId', false], ['by_branch', 'branchId', false],
        ['by_employee', 'employeeId', false], ['by_status', 'status', false] ] },
    { name: 'tasks', key: 'taskId', indexes: [
        ['by_business', 'businessId', false], ['by_status', 'status', false], ['by_assignee', 'assignedTo', false] ] },
    { name: 'auditLog', key: 'auditId', indexes: [
        ['by_business', 'businessId', false], ['by_occurred', 'occurredAt', false],
        ['by_entity', ['entityType','entityId'], false] ] }
  ];

  function openDB() {
    if (_db) return Promise.resolve(_db);
    if (!window.indexedDB) return Promise.reject(new Error('IndexedDB is not available.'));

    return new Promise(function(resolve, reject) {
      var req = indexedDB.open(DB_NAME, DB_VERSION);

      req.onupgradeneeded = function(e) {
        var db = e.target.result;
        var old = e.oldVersion;
        if (old < 1) {
          STORE_DEFS.forEach(function(def) {
            var st = db.createObjectStore(def.name, { keyPath: def.key });
            def.indexes.forEach(function(idx) {
              st.createIndex(idx[0], idx[1], { unique: !!idx[2] });
            });
          });
        }
      };

      req.onsuccess = function() {
        _db = req.result;
        _db.onversionchange = function() { _db.close(); _db = null; console.warn('[OpsIDB] Version change — reload to reconnect.'); };
        resolve(_db);
      };
      req.onerror   = function() { reject(req.error); };
      req.onblocked = function() { reject(new Error('OpsIDB open blocked — close other tabs running this app')); };
    });
  }

  function idbGet(store, key) {
    return openDB().then(function(db) {
      return new Promise(function(resolve, reject) {
        var req = db.transaction([store], 'readonly').objectStore(store).get(key);
        req.onsuccess = function() { resolve(req.result || null); };
        req.onerror   = function() { reject(req.error); };
      });
    });
  }

  function idbGetAll(store) {
    return openDB().then(function(db) {
      return new Promise(function(resolve, reject) {
        var req = db.transaction([store], 'readonly').objectStore(store).getAll();
        req.onsuccess = function() { resolve(req.result || []); };
        req.onerror   = function() { reject(req.error); };
      });
    });
  }

  function idbGetAllByIndex(store, indexName, keyVal) {
    return openDB().then(function(db) {
      return new Promise(function(resolve, reject) {
        var req = db.transaction([store], 'readonly').objectStore(store).index(indexName).getAll(keyVal);
        req.onsuccess = function() { resolve(req.result || []); };
        req.onerror   = function() { reject(req.error); };
      });
    });
  }

  function idbCount(store, indexName, keyVal) {
    return openDB().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx  = db.transaction([store], 'readonly');
        var src = indexName ? tx.objectStore(store).index(indexName) : tx.objectStore(store);
        var req = (keyVal !== undefined) ? src.count(keyVal) : src.count();
        req.onsuccess = function() { resolve(req.result); };
        req.onerror   = function() { reject(req.error); };
      });
    });
  }

  function idbPut(store, record) {
    return openDB().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx  = db.transaction([store], 'readwrite');
        var req = tx.objectStore(store).put(record);
        req.onsuccess = function() { resolve(record); };
        req.onerror   = function() { reject(req.error); };
        tx.onerror    = function() { reject(tx.error); };
      });
    });
  }

  function idbDelete(store, key) {
    return openDB().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx  = db.transaction([store], 'readwrite');
        var req = tx.objectStore(store).delete(key);
        req.onsuccess = function() { resolve(true); };
        req.onerror   = function() { reject(req.error); };
        tx.onerror    = function() { reject(tx.error); };
      });
    });
  }

  function idbCursor(store, indexName, opts) {
    opts = opts || {};
    var limit  = opts.limit  || 100;
    var offset = opts.offset || 0;
    return openDB().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx     = db.transaction([store], 'readonly');
        var source = indexName ? tx.objectStore(store).index(indexName) : tx.objectStore(store);
        var req    = source.openCursor(opts.range || null, opts.direction || 'next');
        var results = []; var skipped = 0;
        req.onsuccess = function() {
          var cursor = req.result;
          if (!cursor) { resolve(results); return; }
          if (skipped < offset) { skipped++; cursor.continue(); return; }
          results.push(cursor.value);
          if (results.length >= limit) { resolve(results); return; }
          cursor.continue();
        };
        req.onerror = function() { reject(req.error); };
      });
    });
  }

  /** Open ONE transaction spanning multiple stores — used by later
   *  blocks (e.g. order completion) so a multi-store write is atomic:
   *  either every store's write commits, or the whole transaction
   *  aborts and none do. IndexedDB supports this natively when all
   *  target stores are named up front. */
  function multiStoreTx(storeNames, mode) {
    return openDB().then(function(db) { return db.transaction(storeNames, mode || 'readwrite'); });
  }

  window.INFINICUS._opsIdb = {
    openDB: openDB, STORE_DEFS: STORE_DEFS,
    idbGet: idbGet, idbGetAll: idbGetAll, idbGetAllByIndex: idbGetAllByIndex,
    idbCount: idbCount, idbPut: idbPut, idbDelete: idbDelete, idbCursor: idbCursor,
    multiStoreTx: multiStoreTx
  };

})(); // OpsIDBHelpersModule


(function OpsStorageAdapterModule() {

  var idb  = window.INFINICUS._opsIdb;
  var bus  = window.INFINICUS.bus;
  var LS_NS = 'ops.settings.'; // distinct from the inherited 'dal.settings.' prefix

  var opsStorage = {

    init: function() {
      return idb.openDB().then(function(db) { return { ok: true, dbVersion: db.version, stores: idb.STORE_DEFS.length }; })
        .catch(function(err) { return { ok: false, error: err.message, code: err.name }; });
    },

    /** Upsert. Preserves createdAt across updates, always stamps updatedAt. */
    put: function(storeName, record) {
      var keyField = _keyField(storeName);
      if (!keyField) return Promise.resolve({ ok: false, error: 'Unknown store: ' + storeName, code: 'UNKNOWN_STORE' });
      if (record[keyField] == null) return Promise.resolve({ ok: false, error: 'Record missing key field "' + keyField + '"', code: 'MISSING_KEY' });

      return idb.idbGet(storeName, record[keyField]).then(function(existing) {
        var now = new Date().toISOString();
        var merged = Object.assign({ createdAt: now }, existing || {}, record, { updatedAt: now });
        return idb.idbPut(storeName, merged);
      }).then(function(saved) {
        bus.emit('ops.storage.' + storeName + '.saved', { id: saved[keyField] });
        return { ok: true, record: saved };
      }).catch(function(err) { return { ok: false, error: err.message, code: err.name || 'STORAGE_ERROR' }; });
    },

    get: function(storeName, id) {
      return idb.idbGet(storeName, id).then(function(rec) { return { ok: true, record: rec }; })
        .catch(function(err) { return { ok: false, error: err.message, code: err.name }; });
    },

    /** List. opts: { indexName?, keyVal? } — omit both for the full store. */
    list: function(storeName, opts) {
      opts = opts || {};
      var p = (opts.indexName && opts.keyVal !== undefined)
        ? idb.idbGetAllByIndex(storeName, opts.indexName, opts.keyVal)
        : idb.idbGetAll(storeName);
      return p.then(function(all) { return { ok: true, records: all, count: all.length }; })
        .catch(function(err) { return { ok: false, error: err.message, code: err.name }; });
    },

    /** Paginated cursor query. opts: { indexName?, range?, direction?, limit?, offset? } */
    query: function(storeName, opts) {
      opts = opts || {};
      return idb.idbCursor(storeName, opts.indexName || null, opts)
        .then(function(records) { return { ok: true, records: records, count: records.length }; })
        .catch(function(err) { return { ok: false, error: err.message, code: err.name }; });
    },

    /** Hard delete — reserved for records that never became final/immutable
     *  (e.g. an abandoned draft order, a draft task). Completed/financial
     *  records are never deleted; see Block 1's Data Integrity notes —
     *  reversals (refunds, cancellations) are new records, not edits. */
    remove: function(storeName, id) {
      return idb.idbDelete(storeName, id).then(function() { return { ok: true }; })
        .catch(function(err) { return { ok: false, error: err.message, code: err.name }; });
    },

    count: function(storeName, indexName, keyVal) {
      return idb.idbCount(storeName, indexName, keyVal).then(function(n) { return { ok: true, count: n }; })
        .catch(function(err) { return { ok: false, error: err.message, code: err.name }; });
    },

    getSetting: function(key) {
      try { var raw = localStorage.getItem(LS_NS + key); return raw !== null ? JSON.parse(raw) : null; }
      catch(_) { return null; }
    },
    setSetting: function(key, value) {
      try { localStorage.setItem(LS_NS + key, JSON.stringify(value)); return true; }
      catch(err) { console.warn('[OpsStorage] setSetting failed:', key, err.message); return false; }
    },
    deleteSetting: function(key) {
      try { localStorage.removeItem(LS_NS + key); return true; } catch(_) { return false; }
    }
  };

  function _keyField(storeName) {
    var def = idb.STORE_DEFS.filter(function(d) { return d.name === storeName; })[0];
    return def ? def.key : null;
  }

  window.INFINICUS.opsStorage = opsStorage;

  bus.register('ops.storage.init', function() { return opsStorage.init(); });

  // Generic route family per store: put/get/list/query/remove — all
  // .get/.remove calls take { id }, regardless of the store's actual
  // keyPath field name (branchId, productId, ...), for a uniform bus API.
  idb.STORE_DEFS.forEach(function(def) {
    var n = def.name;
    bus.register('ops.storage.' + n + '.put',    function(p) { return opsStorage.put(n, p); });
    bus.register('ops.storage.' + n + '.get',    function(p) { return opsStorage.get(n, p.id); });
    bus.register('ops.storage.' + n + '.list',   function(p) { return opsStorage.list(n, p); });
    bus.register('ops.storage.' + n + '.query',  function(p) { return opsStorage.query(n, p); });
    bus.register('ops.storage.' + n + '.remove', function(p) { return opsStorage.remove(n, p.id); });
  });

  bus.register('ops.settings.get',    function(p) { return { ok: true, value: opsStorage.getSetting(p.key) }; });
  bus.register('ops.settings.set',    function(p) { return { ok: opsStorage.setSetting(p.key, p.value) }; });
  bus.register('ops.settings.delete', function(p) { return { ok: opsStorage.deleteSetting(p.key) }; });

})(); // OpsStorageAdapterModule
</script>

<!-- ── 4A · Shared ops namespace + Audit helper + Workspace + Branch managers ── -->
<script>
'use strict';

window.INFINICUS.ops = window.INFINICUS.ops || {};

/* ── AUDIT HELPER ─────────────────────────────────────────────
   One write path into infinicus_ops.auditLog, used by every
   mutating ops.* module from this block onward. The dedicated
   viewer UI lands in Block 19 — the store and the writes start
   now because both are cheap and the trail is worthless if it
   only starts partway through the build. ─────────────────────── */
(function OpsAuditHelperModule() {

  var bus  = window.INFINICUS.bus;
  var uuid = window.INFINICUS.uuid;

  function audit(action, entityType, entityId, before, after) {
    var ctx = (window.INFINICUS.ops.workspace && window.INFINICUS.ops.workspace.getContext()) || {};
    return bus.call('ops.storage.auditLog.put', {
      auditId:         uuid(),
      businessId:      ctx.businessId || null,
      branchId:        ctx.branchId   || null,
      actorEmployeeId: null, // no Employee/Shift concept until Blocks 14/16
      action:          action,
      entityType:      entityType,
      entityId:        entityId,
      before:          before != null ? before : null,
      after:           after  != null ? after  : null,
      occurredAt:      new Date().toISOString(),
      source:          'ops'
    });
  }

  window.INFINICUS.ops.audit = audit;

})(); // OpsAuditHelperModule


/* ── WORKSPACE MANAGER ────────────────────────────────────────
   Orchestrates business + branch context together. Business
   selection itself is DAL's biz.* (Block 2) — this module adds
   the branch dimension DAL has no concept of, and keeps the two
   in sync (switching business re-resolves which branch, if any,
   should become active). ─────────────────────────────────────── */
(function OperationsWorkspaceModule() {

  var bus        = window.INFINICUS.bus;
  var biz        = window.INFINICUS.biz;
  var opsStorage = window.INFINICUS.opsStorage;
  var esc        = window.INFINICUS.esc;

  var _activeBranchId = null;
  var _activeBranch   = null;

  function _setActiveBranch(branch) {
    _activeBranchId = branch ? branch.branchId : null;
    _activeBranch   = branch || null;
    opsStorage.setSetting('activeBranchId', _activeBranchId); // 'ops.settings.' prefix — direct call, internal caller
    bus.emit('ops.branch.selected', { branchId: _activeBranchId, branch: _activeBranch });
    _updateContextChip();
  }

  function _updateContextChip() {
    var bizR       = biz.getActive();
    var bizName    = (bizR.business && bizR.business.name) || null;
    var branchName = (_activeBranch && _activeBranch.name) || null;
    var text;
    if (!bizName)         text = 'No business selected';
    else if (!branchName) text = '<b>' + esc(bizName) + '</b> · no branch';
    else                  text = '<b>' + esc(bizName) + '</b> · ' + esc(branchName);
    if (window.__OPS && window.__OPS.setContext) window.__OPS.setContext(text);
  }

  /** If the current branch no longer belongs to the given business,
   *  auto-select when there's exactly one candidate, otherwise clear
   *  (forces an explicit choice rather than guessing). */
  async function _autoResolveBranchForBusiness(businessId) {
    if (_activeBranchId && _activeBranch && _activeBranch.businessId === businessId) return;
    var r = await bus.call('ops.storage.branches.list', { indexName: 'by_business', keyVal: businessId });
    var branches = (r.records || []).filter(function(b) { return b.status !== 'archived'; });
    if (branches.length === 1) _setActiveBranch(branches[0]);
    else _setActiveBranch(null);
  }

  async function restoreActiveBranch() {
    var savedId = opsStorage.getSetting('activeBranchId');
    var ctx = biz.getActive();
    if (!savedId || !ctx.businessId) { _updateContextChip(); return; }
    var r = await bus.call('ops.storage.branches.get', { id: savedId });
    if (r.record && r.record.businessId === ctx.businessId && r.record.status !== 'archived') {
      _activeBranchId = r.record.branchId;
      _activeBranch   = r.record;
      bus.emit('ops.branch.selected', { branchId: _activeBranchId, branch: _activeBranch });
    }
    _updateContextChip();
  }

  var workspace = {
    getContext: function() {
      var bizR = biz.getActive();
      return { businessId: bizR.businessId, business: bizR.business, branchId: _activeBranchId, branch: _activeBranch };
    },
    setActiveBranch:    _setActiveBranch,
    getActiveBranchId:  function() { return _activeBranchId; },
    refreshContextChip: _updateContextChip
  };

  window.INFINICUS.ops.workspace = workspace;

  bus.register('operations.workspace.init', async function() {
    await biz.restoreActive();
    await restoreActiveBranch();
    return { ok: true, context: workspace.getContext() };
  });
  bus.register('operations.workspace.getContext', function() { return { ok: true, context: workspace.getContext() }; });

  // Business changes (from this page's own UI, or restored from shared
  // localStorage on load) re-resolve branch context automatically.
  bus.on('dal.business.selected', function(d) {
    _updateContextChip();
    if (d.businessId) _autoResolveBranchForBusiness(d.businessId);
    else _setActiveBranch(null);
  });
  bus.on('dal.business.created', function(d) { _autoResolveBranchForBusiness(d.businessId); });

})(); // OperationsWorkspaceModule


/* ── BRANCH MANAGER ───────────────────────────────────────────── */
(function OperationsBranchModule() {

  var bus     = window.INFINICUS.bus;
  var biz     = window.INFINICUS.biz;
  var sec     = window.INFINICUS.security;
  var uuid    = window.INFINICUS.uuid;
  var schemas = window.INFINICUS.schemas;
  var audit   = window.INFINICUS.ops.audit;

  var S_CREATE = { type:'object', required:['name'], properties: {
    name:     { type:'string', minLength:1, maxLength:255 },
    address:  { type:'string', maxLength:500 },
    phone:    { type:'string', maxLength:30  },
    timezone: { type:'string', maxLength:100 }
  }};
  var S_UPDATE = { type:'object', required:['branchId'], properties: {
    branchId: { type:'string', format:'uuid' },
    name:     { type:'string', minLength:1, maxLength:255 },
    address:  { type:'string', maxLength:500 },
    phone:    { type:'string', maxLength:30  },
    timezone: { type:'string', maxLength:100 },
    status:   { type:'string', enum:['active','archived'] }
  }};
  var S_SELECT = { type:'object', required:['branchId'], properties: { branchId: { type:'string', format:'uuid' } } };

  schemas.register('branch.create', S_CREATE);
  schemas.register('branch.update', S_UPDATE);
  schemas.register('branch.select', S_SELECT);

  var branchApi = {

    create: async function(fields) {
      var businessId = biz.getActiveId();
      if (!businessId) return { ok:false, error:'No active business — select a business first.', code:'NO_BUSINESS' };
      try {
        var name = sec.sanitizeString(fields.name || '', 255);
        if (!name) return { ok:false, error:'Branch name is required', code:'VALIDATION_FAILED' };

        var record = {
          branchId: uuid(), businessId: businessId, name: name,
          address:  fields.address  ? sec.sanitizeString(fields.address, 500) : '',
          phone:    fields.phone    ? sec.sanitizeString(fields.phone,   30)  : '',
          timezone: fields.timezone ? sec.sanitizeString(fields.timezone, 100)
                                     : (Intl.DateTimeFormat().resolvedOptions().timeZone || ''),
          status: 'active'
        };
        var r = await bus.call('ops.storage.branches.put', record);
        if (!r.ok) return r;

        audit('create', 'branch', r.record.branchId, null, r.record);
        window.INFINICUS.ops.workspace.setActiveBranch(r.record);
        bus.emit('ops.branch.created', { branchId: r.record.branchId });
        return { ok:true, branch: r.record };
      } catch(err) { return { ok:false, error: err.message || String(err), code: err.name || 'BRANCH_ERROR' }; }
    },

    update: async function(fields) {
      if (!sec.isUUID(fields.branchId)) return { ok:false, error:'Invalid branchId', code:'VALIDATION_FAILED' };

      var activeBizId = biz.getActiveId();
      var before = await bus.call('ops.storage.branches.get', { id: fields.branchId });
      if (!before.record) return { ok:false, error:'Branch not found', code:'NOT_FOUND' };
      // Branch ownership check — reject cross-tenant writes even if a
      // stale/incorrect branchId reaches this handler from elsewhere.
      if (before.record.businessId !== activeBizId) {
        return { ok:false, error:'Branch does not belong to the active business', code:'OWNERSHIP_MISMATCH' };
      }

      try {
        var patch = { branchId: fields.branchId };
        if (fields.name     !== undefined) patch.name     = sec.sanitizeString(fields.name,     255);
        if (fields.address  !== undefined) patch.address  = sec.sanitizeString(fields.address,  500);
        if (fields.phone    !== undefined) patch.phone    = sec.sanitizeString(fields.phone,     30);
        if (fields.timezone !== undefined) patch.timezone = sec.sanitizeString(fields.timezone, 100);
        if (fields.status   !== undefined && sec.validateEnum(fields.status, ['active','archived'])) patch.status = fields.status;

        var r = await bus.call('ops.storage.branches.put', patch);
        if (!r.ok) return r;

        audit('update', 'branch', fields.branchId, before.record, r.record);

        var wctx = window.INFINICUS.ops.workspace.getContext();
        if (wctx.branchId === fields.branchId) window.INFINICUS.ops.workspace.setActiveBranch(r.record);
        bus.emit('ops.branch.updated', { branchId: fields.branchId });
        return { ok:true, branch: r.record };
      } catch(err) { return { ok:false, error: err.message || String(err), code: err.name || 'BRANCH_ERROR' }; }
    },

    select: async function(branchId) {
      if (!sec.isUUID(branchId)) return { ok:false, error:'Invalid branchId', code:'VALIDATION_FAILED' };
      var r = await bus.call('ops.storage.branches.get', { id: branchId });
      if (!r.ok) return r;
      if (!r.record) return { ok:false, error:'Branch not found', code:'NOT_FOUND' };
      if (r.record.businessId !== biz.getActiveId()) {
        return { ok:false, error:'Branch does not belong to the active business', code:'OWNERSHIP_MISMATCH' };
      }
      window.INFINICUS.ops.workspace.setActiveBranch(r.record);
      return { ok:true, branch: r.record };
    },

    list: async function(businessId) {
      var id = businessId || biz.getActiveId();
      if (!id) return { ok:true, branches: [] };
      var r = await bus.call('ops.storage.branches.list', { indexName:'by_business', keyVal:id });
      var branches = (r.records || []).sort(function(a,b){ return (b.createdAt||'') > (a.createdAt||'') ? 1 : -1; });
      return { ok:true, branches: branches };
    },

    get: async function(branchId) {
      var r = await bus.call('ops.storage.branches.get', { id: branchId });
      return { ok: r.ok, branch: r.record };
    }
  };

  window.INFINICUS.ops.branch = branchApi;

  bus.register('operations.branch.create', function(p) { return branchApi.create(p); }, S_CREATE);
  bus.register('operations.branch.update', function(p) { return branchApi.update(p); }, S_UPDATE);
  bus.register('operations.branch.select', function(p) { return branchApi.select(p.branchId); }, S_SELECT);
  bus.register('operations.branch.list',   function(p) { return branchApi.list(p && p.businessId); });
  bus.register('operations.branch.get',    function(p) { return branchApi.get(p.branchId); });

})(); // OperationsBranchModule
</script>

<!-- ── 4B · Home view + Branches view (UI) ─────────────────────── -->
<script>
'use strict';

/* ── HOME VIEW ────────────────────────────────────────────────── */
(function HomeViewModule() {

  var bus = window.INFINICUS.bus;
  var esc = window.INFINICUS.esc;
  var biz = window.INFINICUS.biz;

  function _mount() {
    var content = document.querySelector('#view-home .content');
    if (!content) return;

    content.innerHTML =
      '<div class="card" style="margin-bottom:14px">' +
        '<div class="card-body">' +
          '<div class="form-row-2">' +
            '<div class="form-group" style="margin-bottom:0">' +
              '<label class="form-label">BUSINESS</label>' +
              '<select class="form-control" id="home-biz-select"><option value="">— Select —</option></select>' +
            '</div>' +
            '<div class="form-group" style="margin-bottom:0">' +
              '<label class="form-label">BRANCH</label>' +
              '<select class="form-control" id="home-branch-select" disabled><option value="">— Select business first —</option></select>' +
            '</div>' +
          '</div>' +
          '<div id="home-new-biz" style="display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">' +
            '<div class="form-row-2">' +
              '<div class="form-group" style="margin-bottom:0"><input class="form-control" id="home-new-biz-name" placeholder="Business name" maxlength="255"></div>' +
              '<div class="form-group" style="margin-bottom:0"><input class="form-control" id="home-new-biz-currency" placeholder="Currency (USD)" maxlength="3"></div>' +
            '</div>' +
            '<div style="margin-top:10px;display:flex;align-items:center;gap:10px">' +
              '<button class="btn btn-primary btn-sm" id="home-new-biz-save">CREATE BUSINESS</button>' +
              '<span id="home-new-biz-fb" style="font-family:var(--mono);font-size:10px"></span>' +
            '</div>' +
          '</div>' +
          '<button class="btn btn-ghost btn-sm" id="home-new-biz-toggle" style="margin-top:10px">+ NEW BUSINESS</button>' +
        '</div>' +
      '</div>' +

      '<div id="home-no-branch" style="display:none">' +
        '<div class="alert alert-warn">This business has no branches yet. Create one to start operating.</div>' +
        '<div class="card" style="margin-bottom:14px"><div class="card-body">' +
          '<div class="form-row-2">' +
            '<input class="form-control" id="home-quick-branch-name" placeholder="Branch name (e.g. Main Street)" maxlength="255">' +
            '<button class="btn btn-primary btn-sm" id="home-quick-branch-save">CREATE BRANCH</button>' +
          '</div>' +
          '<div id="home-quick-branch-fb" style="font-family:var(--mono);font-size:10px;margin-top:8px"></div>' +
        '</div></div>' +
      '</div>' +

      '<div id="home-main" style="display:none">' +
        '<div class="stat-grid" id="home-stats"></div>' +
        '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px">' +
          '<button class="btn btn-primary" data-view="sell">+ NEW SALE</button>' +
          '<button class="btn btn-secondary" data-view="expenses">+ EXPENSE</button>' +
          '<button class="btn btn-secondary" data-view="orders">VIEW ORDERS</button>' +
        '</div>' +
      '</div>';
  }

  async function _loadBizSelect() {
    var sel = document.getElementById('home-biz-select');
    if (!sel) return;
    var r = await bus.call('data.business.list', {});
    var list = (r && r.businesses) || [];
    var activeId = biz.getActiveId();
    sel.innerHTML = '<option value="">— Select —</option>' +
      list.map(function(b) {
        return '<option value="' + esc(b.businessId) + '"' + (b.businessId === activeId ? ' selected' : '') + '>' + esc(b.name) + '</option>';
      }).join('');
  }

  async function _loadBranchSelect() {
    var sel = document.getElementById('home-branch-select');
    if (!sel) return;
    var activeId = biz.getActiveId();
    if (!activeId) { sel.disabled = true; sel.innerHTML = '<option value="">— Select business first —</option>'; return; }

    var r = await window.INFINICUS.ops.branch.list(activeId);
    var list = (r.branches || []).filter(function(b) { return b.status !== 'archived'; });
    var activeBranchId = window.INFINICUS.ops.workspace.getActiveBranchId();

    sel.disabled = false;
    sel.innerHTML = (list.length ? '' : '<option value="">— No branches —</option>') +
      list.map(function(b) {
        return '<option value="' + esc(b.branchId) + '"' + (b.branchId === activeBranchId ? ' selected' : '') + '>' + esc(b.name) + '</option>';
      }).join('');
  }

  async function _loadStats() {
    var ctx = window.INFINICUS.ops.workspace.getContext();
    var statsEl = document.getElementById('home-stats');
    if (!statsEl || !ctx.businessId) return;

    var startOfDay = new Date(); startOfDay.setHours(0, 0, 0, 0);
    var r = await bus.call('storage.event.query', {
      businessId: ctx.businessId, from: startOfDay.toISOString(), to: new Date().toISOString(), limit: 999
    });
    var events = (r && r.events) || [];
    var sales = 0, expenses = 0, ordersCompleted = 0;
    events.forEach(function(ev) {
      if (ev.eventType === 'sale.created')     sales    += +(ev.payload && ev.payload.amount) || 0;
      if (ev.eventType === 'expense.recorded') expenses += +(ev.payload && ev.payload.amount) || 0;
      if (ev.eventType === 'order.completed')  ordersCompleted++;
    });

    // Wired for real in Block 9 — was a hardcoded 0 until Inventory
    // Operations added reorderPoint + the stock-level computation this
    // calls. Guarded in case this ever runs before Block 9 has loaded.
    var lowStockCount = 0;
    if (window.INFINICUS.ops.inventory && typeof window.INFINICUS.ops.inventory.getLowStockCount === 'function') {
      lowStockCount = await window.INFINICUS.ops.inventory.getLowStockCount(ctx.businessId);
    }

    var cur = (ctx.business && ctx.business.currency) || 'USD';
    var tiles = [
      { l: 'TODAY’S SALES',    v: cur + ' ' + sales.toFixed(2),    c: 'c-acc'   },
      { l: 'ORDERS COMPLETED',      v: ordersCompleted,                 c: 'c-blue'  },
      { l: 'TODAY’S EXPENSES', v: cur + ' ' + expenses.toFixed(2), c: 'c-red'   },
      { l: 'ACTIVE SHIFT',          v: 'None',                          c: ''        },
      { l: 'LOW STOCK ITEMS',       v: lowStockCount,                   c: lowStockCount > 0 ? 'c-amber' : '' }
    ];
    statsEl.innerHTML = tiles.map(function(t) {
      return '<div class="stat-tile"><div class="stat-label">' + esc(t.l) + '</div>' +
        '<div class="stat-value ' + t.c + '">' + esc(String(t.v)) + '</div></div>';
    }).join('');
  }

  function _syncState() {
    var ctx = window.INFINICUS.ops.workspace.getContext();
    var noBranchEl = document.getElementById('home-no-branch');
    var mainEl     = document.getElementById('home-main');

    if (!ctx.businessId) { if (noBranchEl) noBranchEl.style.display = 'none'; if (mainEl) mainEl.style.display = 'none'; return; }
    if (!ctx.branchId)   { if (noBranchEl) noBranchEl.style.display = 'block'; if (mainEl) mainEl.style.display = 'none'; return; }
    if (noBranchEl) noBranchEl.style.display = 'none';
    if (mainEl)     mainEl.style.display     = 'block';
    _loadStats();
  }

  function _wire() {
    var bizSel = document.getElementById('home-biz-select');
    if (bizSel) bizSel.addEventListener('change', function() {
      if (bizSel.value) bus.call('data.business.select', { businessId: bizSel.value });
    });

    var branchSel = document.getElementById('home-branch-select');
    if (branchSel) branchSel.addEventListener('change', function() {
      if (branchSel.value) window.INFINICUS.ops.branch.select(branchSel.value);
    });

    var toggleBtn = document.getElementById('home-new-biz-toggle');
    var newBizEl  = document.getElementById('home-new-biz');
    if (toggleBtn) toggleBtn.addEventListener('click', function() {
      var open = newBizEl.style.display !== 'none';
      newBizEl.style.display = open ? 'none' : 'block';
      toggleBtn.textContent = open ? '+ NEW BUSINESS' : '− CANCEL';
    });

    var saveBizBtn = document.getElementById('home-new-biz-save');
    if (saveBizBtn) saveBizBtn.addEventListener('click', async function() {
      var fb = document.getElementById('home-new-biz-fb');
      var name = (document.getElementById('home-new-biz-name') || {}).value || '';
      var curr = (document.getElementById('home-new-biz-currency') || {}).value || '';
      var r = await bus.call('data.business.create', curr ? { name: name, currency: curr } : { name: name });
      if (r.ok) {
        document.getElementById('home-new-biz-name').value = '';
        document.getElementById('home-new-biz-currency').value = '';
        newBizEl.style.display = 'none';
        toggleBtn.textContent = '+ NEW BUSINESS';
        if (fb) fb.textContent = '';
      } else if (fb) { fb.style.color = 'var(--red)'; fb.textContent = r.error || 'Could not create business'; }
    });

    var quickBranchBtn = document.getElementById('home-quick-branch-save');
