(function BranchesViewModule() {

  var bus = window.INFINICUS.bus;
  var esc = window.INFINICUS.esc;
  var biz = window.INFINICUS.biz;

  var _editingId = null;

  function _mount() {
    var content = document.querySelector('#view-branches .content');
    if (!content) return;

    content.innerHTML =
      '<div id="br-no-biz" style="display:none">' +
        '<div class="placeholder"><div class="placeholder-icon">⌂</div>' +
          '<div class="placeholder-title">NO BUSINESS SELECTED</div>' +
          '<div class="placeholder-sub">Select or create a business on the Home screen first.</div>' +
        '</div>' +
      '</div>' +

      '<div id="br-main">' +
        '<div class="card" style="margin-bottom:16px">' +
          '<div class="card-hd"><div class="card-title">BRANCHES</div>' +
            '<button class="btn btn-ghost btn-sm" id="br-create-toggle">+ NEW BRANCH</button>' +
          '</div>' +
          '<div id="br-create-body" style="display:none"><div class="card-body">' +
            '<div class="form-row-2">' +
              '<div class="form-group"><label class="form-label">NAME <span class="req">*</span></label>' +
                '<input class="form-control" id="br-f-name" maxlength="255" placeholder="e.g. Main Street"></div>' +
              '<div class="form-group"><label class="form-label">PHONE</label>' +
                '<input class="form-control" id="br-f-phone" maxlength="30" placeholder="Optional"></div>' +
            '</div>' +
            '<div class="form-group"><label class="form-label">ADDRESS</label>' +
              '<input class="form-control" id="br-f-address" maxlength="500" placeholder="Optional"></div>' +
            '<div class="form-group"><label class="form-label">TIMEZONE</label>' +
              '<input class="form-control" id="br-f-timezone" maxlength="100" placeholder="Auto-detected"></div>' +
            '<div style="display:flex;align-items:center;gap:10px">' +
              '<button class="btn btn-primary btn-sm" id="br-f-save">CREATE BRANCH</button>' +
              '<span id="br-f-fb" style="font-family:var(--mono);font-size:10px"></span>' +
            '</div>' +
          '</div></div>' +
        '</div>' +

        '<div id="br-list"></div>' +
        '<div id="br-empty" style="display:none">' +
          '<div class="placeholder"><div class="placeholder-icon">⌂</div>' +
            '<div class="placeholder-title">NO BRANCHES YET</div>' +
            '<div class="placeholder-sub">Create your first branch to start recording sales and inventory.</div>' +
          '</div>' +
        '</div>' +
      '</div>';
  }

  function _openForm(prefill) {
    var body = document.getElementById('br-create-body');
    var toggleBtn = document.getElementById('br-create-toggle');
    var saveBtn = document.getElementById('br-f-save');
    body.style.display = 'block';
    toggleBtn.textContent = '− CANCEL';
    document.getElementById('br-f-name').value     = prefill ? (prefill.name     || '') : '';
    document.getElementById('br-f-phone').value    = prefill ? (prefill.phone    || '') : '';
    document.getElementById('br-f-address').value  = prefill ? (prefill.address  || '') : '';
    document.getElementById('br-f-timezone').value = prefill ? (prefill.timezone || '') : '';
    saveBtn.textContent = prefill ? 'SAVE CHANGES' : 'CREATE BRANCH';
    _editingId = prefill ? prefill.branchId : null;
  }

  function _closeForm() {
    document.getElementById('br-create-body').style.display = 'none';
    document.getElementById('br-create-toggle').textContent = '+ NEW BRANCH';
    _editingId = null;
  }

  function _card(b, activeId) {
    var isActive   = b.branchId === activeId;
    var isArchived = b.status === 'archived';
    var d = b.createdAt ? new Date(b.createdAt).toLocaleDateString() : '';
    return '<div class="card" style="margin-bottom:10px' + (isActive ? ';border-color:rgba(0,255,65,.35)' : '') + '">' +
      '<div class="card-body" style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">' +
        '<div style="flex:1;min-width:160px">' +
          '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">' +
            '<span style="font-weight:600">' + esc(b.name) + '</span>' +
            (isActive   ? '<span class="badge badge-green"><span class="badge-dot"></span>ACTIVE</span>' : '') +
            (isArchived ? '<span class="badge badge-muted">ARCHIVED</span>' : '') +
          '</div>' +
          '<div style="font-family:var(--mono);font-size:10.5px;color:var(--text-3);margin-top:4px">' +
            (b.address ? esc(b.address) + ' · ' : '') + (b.phone ? esc(b.phone) + ' · ' : '') + 'Created ' + esc(d) +
          '</div>' +
        '</div>' +
        '<div style="display:flex;gap:8px;flex-wrap:wrap">' +
          (!isActive && !isArchived ? '<button class="btn btn-primary btn-sm br-select" data-id="' + esc(b.branchId) + '">SELECT</button>' : '') +
          '<button class="btn btn-secondary btn-sm br-edit" data-id="' + esc(b.branchId) + '">EDIT</button>' +
          '<button class="btn btn-ghost btn-sm br-archive" data-id="' + esc(b.branchId) + '" data-archived="' + isArchived + '">' +
            (isArchived ? 'REACTIVATE' : 'ARCHIVE') + '</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }

  async function _renderList() {
    var listEl  = document.getElementById('br-list');
    var emptyEl = document.getElementById('br-empty');
    if (!listEl) return;
    var activeId = biz.getActiveId();
    if (!activeId) return;

    var r = await window.INFINICUS.ops.branch.list(activeId);
    var branches = r.branches || [];
    var activeBranchId = window.INFINICUS.ops.workspace.getActiveBranchId();

    if (emptyEl) emptyEl.style.display = branches.length ? 'none' : 'block';
    listEl.innerHTML = branches.map(function(b) { return _card(b, activeBranchId); }).join('');
  }

  function _syncBiz() {
    var active = biz.getActiveId();
    var noBiz = document.getElementById('br-no-biz');
    var main  = document.getElementById('br-main');
    if (noBiz) noBiz.style.display = active ? 'none'  : 'block';
    if (main)  main.style.display  = active ? 'block' : 'none';
    if (active) _renderList();
  }

  function _wire() {
    var toggleBtn = document.getElementById('br-create-toggle');
    if (toggleBtn) toggleBtn.addEventListener('click', function() {
      var open = document.getElementById('br-create-body').style.display !== 'none';
      if (open) _closeForm(); else _openForm(null);
    });

    var saveBtn = document.getElementById('br-f-save');
    if (saveBtn) saveBtn.addEventListener('click', async function() {
      var fb = document.getElementById('br-f-fb');
      var fields = {
        name:     (document.getElementById('br-f-name')     || {}).value || '',
        phone:    (document.getElementById('br-f-phone')    || {}).value || '',
        address:  (document.getElementById('br-f-address')  || {}).value || '',
        timezone: (document.getElementById('br-f-timezone') || {}).value || ''
      };
      var r = _editingId
        ? await window.INFINICUS.ops.branch.update(Object.assign({ branchId: _editingId }, fields))
        : await window.INFINICUS.ops.branch.create(fields);
      if (r.ok) { _closeForm(); if (fb) fb.textContent = ''; }
      else if (fb) { fb.style.color = 'var(--red)'; fb.textContent = r.error || 'Could not save branch'; }
    });

    var listEl = document.getElementById('br-list');
    if (listEl) listEl.addEventListener('click', async function(e) {
      var selBtn = e.target.closest('.br-select');
      if (selBtn) { await window.INFINICUS.ops.branch.select(selBtn.dataset.id); return; }

      var archBtn = e.target.closest('.br-archive');
      if (archBtn) {
        var wasArchived = archBtn.dataset.archived === 'true';
        await window.INFINICUS.ops.branch.update({ branchId: archBtn.dataset.id, status: wasArchived ? 'active' : 'archived' });
        return;
      }

      var editBtn = e.target.closest('.br-edit');
      if (editBtn) {
        var r = await window.INFINICUS.ops.branch.get(editBtn.dataset.id);
        if (r.branch) _openForm(r.branch);
      }
    });
  }

  bus.on('dal.business.selected', _syncBiz);
  bus.on('dal.business.created',  _syncBiz);
  bus.on('ops.branch.created',    _renderList);
  bus.on('ops.branch.updated',    _renderList);
  bus.on('ops.branch.selected',   _renderList);

  window.INFINICUS.ops.branchesView = { refresh: _renderList };
  window.__opsBranchesInit = function() { _mount(); _wire(); _syncBiz(); };

})(); // BranchesViewModule
</script>

<!-- ════════════════════════════════════════════════════════════════
     BLOCK 5 · PRODUCT & SERVICE CATALOG
     Product Manager (domain logic + SKU soft-dedup) and the Catalog
     view UI. Products are pure ops-local configuration — DAL has no
     canonical "product" event type, so nothing here calls
     data.event.ingest (per the architecture doc's event map).
     Depends on: Block 2 (bus/security/uuid/schemas), Block 3
     (ops.storage.products.* + by_business_sku index), Block 4
     (ops.audit, biz, workspace).
════════════════════════════════════════════════════════════════ -->

<!-- ── 5A · Product Manager ─────────────────────────────────────── -->
<script>
'use strict';

(function OperationsProductModule() {

  var bus     = window.INFINICUS.bus;
  var biz     = window.INFINICUS.biz;
  var sec     = window.INFINICUS.security;
  var uuid    = window.INFINICUS.uuid;
  var schemas = window.INFINICUS.schemas;
  var audit   = window.INFINICUS.ops.audit;

  var S_CREATE = { type: 'object', required: ['name', 'sellingPrice'], properties: {
    name:         { type: 'string',  minLength: 1, maxLength: 255 },
    type:         { type: 'string',  enum: ['product', 'service'] },
    sku:          { type: 'string',  maxLength: 60 },
    category:     { type: 'string',  maxLength: 100 },
    sellingPrice: { type: 'number',  minimum: 0 },
    costPrice:    { type: 'number',  minimum: 0 },
    stockTracked: { type: 'boolean' },
    taxRate:      { type: 'number',  minimum: 0, maximum: 100 },
    reorderPoint: { type: 'number',  minimum: 0 } // added in Block 9 — low-stock alert threshold
  } };

  var S_UPDATE = { type: 'object', required: ['productId'], properties: {
    productId:    { type: 'string',  format: 'uuid' },
    name:         { type: 'string',  minLength: 1, maxLength: 255 },
    type:         { type: 'string',  enum: ['product', 'service'] },
    sku:          { type: 'string',  maxLength: 60 },
    category:     { type: 'string',  maxLength: 100 },
    sellingPrice: { type: 'number',  minimum: 0 },
    costPrice:    { type: 'number',  minimum: 0 },
    stockTracked: { type: 'boolean' },
    taxRate:      { type: 'number',  minimum: 0, maximum: 100 },
    reorderPoint: { type: 'number',  minimum: 0 }, // added in Block 9
    status:       { type: 'string',  enum: ['active', 'archived'] }
  } };

  schemas.register('product.create', S_CREATE);
  schemas.register('product.update', S_UPDATE);

  /** Case-sensitive-free SKU lookup within a business via the
   *  by_business_sku compound index — soft-dedup only (warns, does
   *  not hard-block) since SKU is optional and real catalogs are
   *  often messy. */
  async function _findBySku(businessId, sku, excludeId) {
    if (!sku) return null;
    var r = await bus.call('ops.storage.products.list', { indexName: 'by_business_sku', keyVal: [businessId, sku] });
    var match = (r.records || []).filter(function(p) { return p.productId !== excludeId; })[0];
    return match || null;
  }

  var productApi = {

    create: async function(fields) {
      fields = fields || {};
      var businessId = biz.getActiveId();
      if (!businessId) return { ok: false, error: 'No active business', code: 'NO_BUSINESS' };

      try {
        var name = sec.sanitizeString(fields.name || '', 255);
        if (!name) return { ok: false, error: 'Product name is required', code: 'VALIDATION_FAILED' };

        var sellingPrice = sec.sanitizeNumber(fields.sellingPrice, { min: 0, decimals: 2 });
        var sku = fields.sku ? sec.sanitizeString(fields.sku, 60) : '';

        if (sku) {
          var dupe = await _findBySku(businessId, sku);
          if (dupe) return { ok: false, error: 'SKU "' + sku + '" is already used by "' + dupe.name + '"', code: 'DUPLICATE_SKU' };
        }

        var bizR = biz.getActive();
        var record = {
          productId:    uuid(),
          businessId:   businessId,
          name:         name,
          type:         sec.validateEnum(fields.type, ['product', 'service']) ? fields.type : 'product',
          sku:          sku,
          category:     fields.category ? sec.sanitizeString(fields.category, 100) : '',
          sellingPrice: sellingPrice,
          costPrice:    fields.costPrice != null ? sec.sanitizeNumber(fields.costPrice, { min: 0, decimals: 2 }) : 0,
          currency:     (bizR.business && bizR.business.currency) || 'USD',
          stockTracked: !!fields.stockTracked,
          taxRate:      fields.taxRate != null ? sec.sanitizeNumber(fields.taxRate, { min: 0, max: 100, decimals: 2 }) : 0,
          reorderPoint: fields.reorderPoint != null ? sec.sanitizeNumber(fields.reorderPoint, { min: 0, decimals: 2 }) : 0, // added in Block 9
          status:       'active'
        };

        var r = await bus.call('ops.storage.products.put', record);
        if (!r.ok) return r;

        audit('create', 'product', r.record.productId, null, r.record);
        bus.emit('ops.product.created', { productId: r.record.productId });
        return { ok: true, product: r.record };

      } catch (err) {
        return { ok: false, error: err.message || String(err), code: err.name || 'PRODUCT_ERROR' };
      }
    },

    update: async function(fields) {
      fields = fields || {};
      if (!sec.isUUID(fields.productId)) return { ok: false, error: 'Invalid productId', code: 'VALIDATION_FAILED' };

      var activeBizId = biz.getActiveId();
      var before = await bus.call('ops.storage.products.get', { id: fields.productId });
      if (!before.record) return { ok: false, error: 'Product not found', code: 'NOT_FOUND' };
      if (before.record.businessId !== activeBizId) return { ok: false, error: 'Product does not belong to the active business', code: 'OWNERSHIP_MISMATCH' };

      try {
        var patch = { productId: fields.productId };

        if (fields.name !== undefined) {
          var nm = sec.sanitizeString(fields.name, 255);
          if (!nm) return { ok: false, error: 'Product name is required', code: 'VALIDATION_FAILED' };
          patch.name = nm;
        }
        if (fields.type !== undefined && sec.validateEnum(fields.type, ['product', 'service'])) patch.type = fields.type;
        if (fields.sku !== undefined) {
          var sku2 = sec.sanitizeString(fields.sku, 60);
          if (sku2) {
            var dupe2 = await _findBySku(activeBizId, sku2, fields.productId);
            if (dupe2) return { ok: false, error: 'SKU "' + sku2 + '" is already used by "' + dupe2.name + '"', code: 'DUPLICATE_SKU' };
          }
          patch.sku = sku2;
        }
        if (fields.category     !== undefined) patch.category     = sec.sanitizeString(fields.category, 100);
        if (fields.sellingPrice !== undefined) patch.sellingPrice = sec.sanitizeNumber(fields.sellingPrice, { min: 0, decimals: 2 });
        if (fields.costPrice    !== undefined) patch.costPrice    = sec.sanitizeNumber(fields.costPrice, { min: 0, decimals: 2 });
        if (fields.stockTracked !== undefined) patch.stockTracked = !!fields.stockTracked;
        if (fields.taxRate      !== undefined) patch.taxRate      = sec.sanitizeNumber(fields.taxRate, { min: 0, max: 100, decimals: 2 });
        if (fields.reorderPoint !== undefined) patch.reorderPoint = sec.sanitizeNumber(fields.reorderPoint, { min: 0, decimals: 2 }); // added in Block 9
        if (fields.status       !== undefined && sec.validateEnum(fields.status, ['active', 'archived'])) patch.status = fields.status;

        var r = await bus.call('ops.storage.products.put', patch);
        if (!r.ok) return r;

        audit('update', 'product', fields.productId, before.record, r.record);
        bus.emit('ops.product.updated', { productId: fields.productId });
        return { ok: true, product: r.record };

      } catch (err) {
        return { ok: false, error: err.message || String(err), code: err.name || 'PRODUCT_ERROR' };
      }
    },

    list: async function(businessId) {
      var id = businessId || biz.getActiveId();
      if (!id) return { ok: true, products: [] };
      var r = await bus.call('ops.storage.products.list', { indexName: 'by_business', keyVal: id });
      var products = (r.records || []).sort(function(a, b) { return (a.name || '').localeCompare(b.name || ''); });
      return { ok: true, products: products };
    },

    get: async function(productId) {
      var r = await bus.call('ops.storage.products.get', { id: productId });
      return { ok: r.ok, product: r.record };
    },

    search: async function(businessId, query) {
      var r = await productApi.list(businessId);
      var q = (query || '').trim().toLowerCase();
      var filtered = !q ? r.products : r.products.filter(function(p) {
        return (p.name || '').toLowerCase().indexOf(q) !== -1 || (p.sku || '').toLowerCase().indexOf(q) !== -1;
      });
      return { ok: true, products: filtered };
    },

    archive: function(productId) { return productApi.update({ productId: productId, status: 'archived' }); }
  };

  window.INFINICUS.ops.product = productApi;

  bus.register('operations.product.create',  function(p) { return productApi.create(p); }, S_CREATE);
  bus.register('operations.product.update',  function(p) { return productApi.update(p); }, S_UPDATE);
  bus.register('operations.product.list',    function(p) { return productApi.list(p && p.businessId); });
  bus.register('operations.product.get',     function(p) { return productApi.get(p.productId); });
  bus.register('operations.product.archive', function(p) { return productApi.archive(p.productId); });
  bus.register('operations.product.search',  function(p) { return productApi.search(p && p.businessId, p && p.query); });

})(); // OperationsProductModule
</script>

              '<div class="form-group" style="display:flex;align-items:flex-end;padding-bottom:9px">' +

            '<div style="display:flex;align-items:center;gap:10px">' +
              '<button class="btn btn-primary btn-sm" id="cat-f-save">CREATE PRODUCT</button>' +
              '<span id="cat-f-fb" style="font-family:var(--mono);font-size:10px"></span>' +
            '</div>' +
          '</div></div>' +
        '</div>' +
        '<input class="form-control" id="cat-search" placeholder="Search catalog…" style="margin-bottom:12px">' +
        '<div id="cat-list"></div>' +
        '<div id="cat-empty" style="display:none"><div class="placeholder"><div class="placeholder-icon">▤</div>' +

  function _openForm(prefill) {
    document.getElementById('cat-form-body').style.display = 'block';
    document.getElementById('cat-create-toggle').textContent = '− CANCEL';
    document.getElementById('cat-f-name').value      = prefill ? prefill.name || '' : '';

    document.getElementById('cat-f-price').value     = prefill ? prefill.sellingPrice : '';
    document.getElementById('cat-f-cost').value      = prefill ? prefill.costPrice : '';
    document.getElementById('cat-f-tax').value       = prefill ? prefill.taxRate : '';

  function _closeForm() {
    document.getElementById('cat-form-body').style.display = 'none';
    document.getElementById('cat-create-toggle').textContent = '+ NEW PRODUCT';
    _editingId = null;
  }

  function _row(p) {
    var isArchived = p.status === 'archived';
    return '<div class="card" style="margin-bottom:8px' + (isArchived ? ';opacity:.55' : '') + '"><div class="card-body" style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:12px 16px">' +
      '<div style="flex:1;min-width:160px">' +
        '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">' +
          '<span style="font-weight:600">' + esc(p.name) + '</span>' +
          '<span class="badge badge-' + (p.type === 'service' ? 'purple' : 'blue') + '">' + esc(p.type) + '</span>' +
          (isArchived ? '<span class="badge badge-muted">ARCHIVED</span>' : '') +
          (p.stockTracked ? '<span class="badge badge-muted">STOCK TRACKED</span>' : '') +
        '</div>' +
        '<div style="font-family:var(--mono);font-size:10.5px;color:var(--text-3);margin-top:4px">' +
          (p.sku ? 'SKU ' + esc(p.sku) + ' · ' : '') + (p.category ? esc(p.category) + ' · ' : '') + 'Cost ' + (+p.costPrice || 0).toFixed(2) +
          (p.taxRate ? ' · Tax ' + p.taxRate + '%' : '') +
        '</div>' +
      '</div>' +
      '<div style="font-family:var(--mono);font-size:15px;font-weight:700;color:var(--accent)">' + esc(p.currency || '') + ' ' + (+p.sellingPrice).toFixed(2) + '</div>' +
      '<div style="display:flex;gap:8px">' +
        '<button class="btn btn-secondary btn-sm cat-edit" data-id="' + esc(p.productId) + '">EDIT</button>' +
        '<button class="btn btn-ghost btn-sm cat-archive" data-id="' + esc(p.productId) + '" data-archived="' + isArchived + '">' + (isArchived ? 'REACTIVATE' : 'ARCHIVE') + '</button>' +
      '</div>' +
    '</div></div>';
  }

  async function _renderList() {
    var listEl = document.getElementById('cat-list');
    var emptyEl = document.getElementById('cat-empty');
    if (!listEl) return;
    var r = await window.INFINICUS.ops.product.search(biz.getActiveId(), _search);
    var products = r.products || [];
    if (emptyEl) emptyEl.style.display = products.length ? 'none' : 'block';
    listEl.innerHTML = products.map(_row).join('');
  }

  function _syncBiz() {
    var active = biz.getActiveId();
    var noBiz = document.getElementById('cat-no-biz');
    var main = document.getElementById('cat-main');
    if (noBiz) noBiz.style.display = active ? 'none' : 'block';
    if (main) main.style.display = active ? 'block' : 'none';
    if (active) _renderList();
  }

  function _wire() {
    var toggleBtn = document.getElementById('cat-create-toggle');
    if (toggleBtn) toggleBtn.addEventListener('click', function() {
      var open = document.getElementById('cat-form-body').style.display !== 'none';
      if (open) _closeForm(); else _openForm(null);
    });

    var saveBtn = document.getElementById('cat-f-save');
    if (saveBtn) saveBtn.addEventListener('click', async function() {
      var fb = document.getElementById('cat-f-fb');
      var fields = {
        name:         (document.getElementById('cat-f-name')     || {}).value || '',
        type:         (document.getElementById('cat-f-type')     || {}).value || 'product',
        sku:          (document.getElementById('cat-f-sku')      || {}).value || '',
        category:     (document.getElementById('cat-f-category') || {}).value || '',
        sellingPrice: (document.getElementById('cat-f-price')    || {}).value || 0,
        costPrice:    (document.getElementById('cat-f-cost')     || {}).value || 0,
        taxRate:      (document.getElementById('cat-f-tax')      || {}).value || 0,
        stockTracked: (document.getElementById('cat-f-stock')    || {}).checked,
        reorderPoint: (document.getElementById('cat-f-reorder')  || {}).value || 0 // added in Block 9
      };
      var r = _editingId
        ? await window.INFINICUS.ops.product.update(Object.assign({ productId: _editingId }, fields))
        : await window.INFINICUS.ops.product.create(fields);
      if (r.ok) { _closeForm(); if (fb) fb.textContent = ''; }
      else if (fb) { fb.style.color = 'var(--red)'; fb.textContent = r.error || 'Could not save product'; }
    });

    var searchEl = document.getElementById('cat-search');
    if (searchEl) searchEl.addEventListener('input', function() { _search = searchEl.value; _renderList(); });

    var listEl = document.getElementById('cat-list');
    if (listEl) listEl.addEventListener('click', async function(e) {
      var editBtn = e.target.closest('.cat-edit');
      if (editBtn) { var r = await window.INFINICUS.ops.product.get(editBtn.dataset.id); if (r.product) _openForm(r.product); return; }

      var archBtn = e.target.closest('.cat-archive');
      if (archBtn) {
        var wasArchived = archBtn.dataset.archived === 'true';
        await window.INFINICUS.ops.product.update({ productId: archBtn.dataset.id, status: wasArchived ? 'active' : 'archived' });
      }
    });
  }

  bus.on('dal.business.selected', _syncBiz);
  bus.on('ops.product.created',   _renderList);
  bus.on('ops.product.updated',   _renderList);

  window.INFINICUS.ops.catalogView = { refresh: _renderList };
  window.__opsCatalogInit = function() { _mount(); _wire(); _syncBiz(); };

})(); // CatalogViewModule
</script>

<!-- ── 6A · Inventory Movement Writer + Order Manager ──────────── -->
<script>
'use strict';

/* ── INVENTORY MOVEMENT WRITER (front-loaded from Block 9) ──────
   One ledger, one rule: quantity is always SIGNED (+ = stock in,
   − = stock out). getStock() is a plain sum with no type-based
   branching, so it can never drift out of sync with how movements
   are written. 'type' is a descriptive label only — used by Block 9's
   ledger UI and to pick the right DAL inventory.* event. ─────────── */
(function OperationsInventoryModule() {

  var bus  = window.INFINICUS.bus;
  var uuid = window.INFINICUS.uuid;

  function ingestOps(eventType, businessId, payload) {
    return bus.call('data.event.ingest', {
      eventType: eventType, businessId: businessId, source: 'ops',
      occurredAt: new Date().toISOString(), payload: payload
    });
  }

  /** Maps one ops movement to its canonical DAL event. 'transferred'
   *  is intentionally not pushed to DAL — it nets to zero business-
   *  wide (see the architecture doc's event-mapping table). */
  function _ingestMovementToDal(m) {
    var absQty = Math.abs(m.quantity);
    if (m.type === 'received' || m.type === 'returned') {
      var recPayload = { itemId: m.productId, itemName: m.productName, quantity: absQty, reason: (m.type === 'returned' ? 'return' : 'purchase') };
      if (m.unitCost != null) recPayload.unitCost = m.unitCost;
      ingestOps('inventory.received', m.businessId, recPayload);
    } else if (m.type === 'adjusted') {
      var adjPayload = { itemId: m.productId, itemName: m.productName, adjustedQuantity: m.quantity };
      if (m.reason) adjPayload.reason = m.reason;
      ingestOps('inventory.adjusted', m.businessId, adjPayload);
    } else if (m.type !== 'transferred') {
      var reasonMap = { sold: 'sale', consumed: 'other', wasted: 'waste', damaged: 'damage' };
      ingestOps('inventory.consumed', m.businessId, { itemId: m.productId, itemName: m.productName, quantity: absQty, reason: reasonMap[m.type] || 'other' });
    }
  }

  var inventoryApi = {

    /** Sum every movement for a product within a business, optionally
     *  scoped to one branch. Uses the by_product compound index
     *  [businessId, productId] — branch filtering happens client-side
     *  rather than via a new compound IDB index, to avoid a schema
     *  migration on infinicus_ops for what's a modest record count
     *  locally. Omit branchId for a business-wide total (e.g. a future
     *  company-wide report); pass it for "what's actually on the shelf
     *  at THIS branch," which is what stock checks should use.
     *
     *  FIX (Block 9): before this, every caller got the business-wide
     *  total, including Block 6's stock check before completing a sale
     *  — meaning a sale at Branch B could succeed off stock that only
     *  physically exists at Branch A. That call site now passes
     *  order.branchId (see the Order Manager patch note). */
    getStock: async function(productId, businessId, branchId) {
      var ctx = window.INFINICUS.ops.workspace.getContext();
      var bizId = businessId || ctx.businessId;
      if (!bizId) return 0;
      var r = await bus.call('ops.storage.inventoryMovements.list', { indexName: 'by_product', keyVal: [bizId, productId] });
      var records = r.records || [];
      if (branchId) records = records.filter(function(m) { return m.branchId === branchId; });
      var total = 0;
      records.forEach(function(m) { total += (+m.quantity || 0); });
      return total;
    },

    /** Standalone movement write (Block 9's entry point; also usable
     *  today outside an order-completion transaction). Caller supplies
     *  the SIGNED quantity — this does not infer direction from type. */
    recordMovement: async function(fields) {
      fields = fields || {};
      var ctx = window.INFINICUS.ops.workspace.getContext();
      if (!ctx.businessId) return { ok: false, error: 'No active business', code: 'NO_BUSINESS' };
      if (!fields.productId) return { ok: false, error: 'productId is required', code: 'VALIDATION_FAILED' };

      var qty = +fields.quantity;
      if (!isFinite(qty) || qty === 0) return { ok: false, error: 'quantity must be a non-zero number', code: 'VALIDATION_FAILED' };

      var movement = {
        movementId: uuid(), businessId: ctx.businessId, branchId: ctx.branchId || null,
        productId: fields.productId, productName: fields.productName || '',
        type: fields.type || 'adjusted', quantity: qty,
        reason: fields.reason || '', orderId: fields.orderId || null,
        unitCost: fields.unitCost != null ? +fields.unitCost : null,
        occurredAt: new Date().toISOString()
      };

      var r = await bus.call('ops.storage.inventoryMovements.put', movement);
      if (!r.ok) return r;

      _ingestMovementToDal(movement);
      bus.emit('operation.inventory.' + (qty >= 0 ? 'received' : 'consumed'), { movementId: movement.movementId, productId: movement.productId });
      return { ok: true, movement: r.record };
    }
  };

  window.INFINICUS.ops.inventory = inventoryApi;
  window.INFINICUS.ops._ingestMovementToDal = _ingestMovementToDal; // reused by Order Manager's post-commit DAL phase below

  bus.register('operations.inventory.recordMovement', function(p) { return inventoryApi.recordMovement(p); });
  bus.register('operations.inventory.getStock', async function(p) { return { ok: true, stock: await inventoryApi.getStock(p.productId, p.businessId) }; });

})(); // OperationsInventoryModule


/* ── ORDER MANAGER ────────────────────────────────────────────── */
(function OperationsOrderModule() {

  var bus   = window.INFINICUS.bus;
  var sec   = window.INFINICUS.security;
  var uuid  = window.INFINICUS.uuid;
  var audit = window.INFINICUS.ops.audit;
  var idb   = window.INFINICUS._opsIdb;

  function round2(n) { return Math.round(((+n || 0) + Number.EPSILON) * 100) / 100; }

  function ingestOps(eventType, businessId, payload) {
    return bus.call('data.event.ingest', {
      eventType: eventType, businessId: businessId, source: 'ops',
      occurredAt: new Date().toISOString(), payload: payload
    });
  }

  function calcTotals(items, discount) {
    var subtotal = 0, tax = 0;
    (items || []).forEach(function(it) { subtotal += (+it.lineSubtotal || 0); tax += (+it.lineTax || 0); });
    var disc = Math.min(Math.max(0, +discount || 0), subtotal);
    return { subtotal: round2(subtotal), discount: round2(disc), tax: round2(tax), total: round2(Math.max(0, subtotal - disc + tax)) };
  }

  function _recalc(order) {
    var t = calcTotals(order.items, order.discount);
    order.subtotal = t.subtotal; order.discount = t.discount; order.tax = t.tax; order.total = t.total;
    return order;
  }

  async function _getOwned(orderId) {
    var r = await bus.call('ops.storage.orders.get', { id: orderId });
    if (!r.record) return { ok: false, error: 'Order not found', code: 'NOT_FOUND' };
    var ctx = window.INFINICUS.ops.workspace.getContext();
    if (r.record.businessId !== ctx.businessId) return { ok: false, error: 'Order does not belong to the active business', code: 'OWNERSHIP_MISMATCH' };
    return { ok: true, order: r.record };
  }

  async function _getDraftOwned(orderId) {
    var g = await _getOwned(orderId);
    if (!g.ok) return g;
    if (g.order.status !== 'draft') return { ok: false, error: 'Order is not editable (status: ' + g.order.status + ')', code: 'ORDER_NOT_DRAFT' };
    return g;
  }

  async function _saveDraft(order) {
    var r = await bus.call('ops.storage.orders.put', order);
    if (!r.ok) return r;
    bus.emit('operation.order.updated', { orderId: order.orderId }); // local-only UI reactivity, not a DAL event
    return { ok: true, order: r.record };
  }

  async function _resolveOrCreateCustomer(businessId, name) {
    var cleanName = sec.sanitizeString(name || '', 255);
    if (!cleanName) return { customerId: null, isNew: false };

    var r = await bus.call('ops.storage.customers.list', { indexName: 'by_business', keyVal: businessId });
    var match = (r.records || []).filter(function(c) { return c.name && c.name.toLowerCase() === cleanName.toLowerCase(); })[0];
    if (match) return { customerId: match.customerId, isNew: false };

    var newCust = { customerId: uuid(), businessId: businessId, name: cleanName, email: '', phone: '', totalSpend: 0, orderCount: 0, lastPurchaseAt: null };
    var putR = await bus.call('ops.storage.customers.put', newCust);
    return { customerId: putR.record.customerId, isNew: true };
  }

  /** Atomic multi-store commit for order completion — either every
   *  store's write lands, or none do. Uses the multiStoreTx helper
   *  built in Block 3 specifically for this call site. */
  async function _atomicCompleteWrite(order, payment, movements, cashMovement, customerPatch) {
    var stores = ['orders', 'payments', 'inventoryMovements'];
    if (cashMovement)  stores.push('cashMovements');
    if (customerPatch) stores.push('customers');

    var tx = await idb.multiStoreTx(stores, 'readwrite');
    return new Promise(function(resolve, reject) {
      try {
        tx.objectStore('orders').put(order);
        tx.objectStore('payments').put(payment);
        movements.forEach(function(m) { tx.objectStore('inventoryMovements').put(m); });
        if (cashMovement)  tx.objectStore('cashMovements').put(cashMovement);
        if (customerPatch) tx.objectStore('customers').put(customerPatch);
      } catch (err) { reject(err); return; }
      tx.oncomplete = function() { resolve(true); };
      tx.onerror    = function() { reject(tx.error); };
      tx.onabort    = function() { reject(tx.error || new Error('Transaction aborted')); };
    });
  }

  // In-page mutex — closes the double-submit race (a stray second call
  // while the first is still awaiting) without a real distributed lock.
  // Cross-tab races on the SAME order are a known, accepted limitation
  // of a local-first app — see the Block 6 security review.
  var _completingIds = Object.create(null);

  var orderApi = {

    create: async function() {
      var ctx = window.INFINICUS.ops.workspace.getContext();
      if (!ctx.businessId) return { ok: false, error: 'No active business', code: 'NO_BUSINESS' };
      if (!ctx.branchId)   return { ok: false, error: 'No active branch', code: 'NO_BRANCH' };

      var record = {
        orderId: uuid(), businessId: ctx.businessId, branchId: ctx.branchId,
        customerId: null, customerName: '', status: 'draft', items: [],
        subtotal: 0, discount: 0, tax: 0, total: 0,
        currency: (ctx.business && ctx.business.currency) || 'USD',
        paymentStatus: 'unpaid', createdAt: new Date().toISOString()
      };
      var r = await bus.call('ops.storage.orders.put', record);
      if (!r.ok) return r;

      ingestOps('order.created', ctx.businessId, { orderId: record.orderId, branchId: ctx.branchId, itemCount: 0, status: 'draft' });
      bus.emit('operation.order.created', { orderId: record.orderId });
      return { ok: true, order: r.record };
    },

    addItem: async function(orderId, product, quantity) {
      var g = await _getDraftOwned(orderId);
      if (!g.ok) return g;
      var order = g.order;
      if (!product || !product.productId) return { ok: false, error: 'A valid product is required', code: 'VALIDATION_FAILED' };

      var qty = Math.max(1, Math.floor(+quantity) || 1);
      var unitPrice = +product.sellingPrice || 0;
      var taxRate = +product.taxRate || 0;

      var existing = order.items.filter(function(it) { return it.productId === product.productId; })[0];
      if (existing) {
        existing.quantity     += qty;
        existing.lineSubtotal  = round2(existing.unitPrice * existing.quantity);
        existing.lineTax       = round2(existing.lineSubtotal * (existing.taxRate / 100));
        existing.lineTotal     = round2(existing.lineSubtotal + existing.lineTax);
      } else {
        var lineSubtotal = round2(unitPrice * qty);
        var lineTax = round2(lineSubtotal * (taxRate / 100));
        order.items.push({
          productId: product.productId, name: product.name, type: product.type || 'product',
          unitPrice: unitPrice, quantity: qty, taxRate: taxRate,
          lineSubtotal: lineSubtotal, lineTax: lineTax, lineTotal: round2(lineSubtotal + lineTax)
        });
      }
      _recalc(order);
      return _saveDraft(order);
    },

    removeItem: async function(orderId, productId) {
      var g = await _getDraftOwned(orderId);
      if (!g.ok) return g;
      var order = g.order;
      order.items = order.items.filter(function(it) { return it.productId !== productId; });
      _recalc(order);
      return _saveDraft(order);
    },

    updateItemQty: async function(orderId, productId, quantity) {
      var g = await _getDraftOwned(orderId);
      if (!g.ok) return g;
      var order = g.order;
      var item = order.items.filter(function(it) { return it.productId === productId; })[0];
      if (!item) return { ok: false, error: 'Line item not found', code: 'NOT_FOUND' };

      var qty = Math.floor(+quantity) || 0;
      if (qty <= 0) {
        order.items = order.items.filter(function(it) { return it.productId !== productId; });
      } else {
        item.quantity = qty;
        item.lineSubtotal = round2(item.unitPrice * qty);
        item.lineTax = round2(item.lineSubtotal * (item.taxRate / 100));
        item.lineTotal = round2(item.lineSubtotal + item.lineTax);
      }
      _recalc(order);
      return _saveDraft(order);
    },

    setCustomer: async function(orderId, customerName) {
      var g = await _getDraftOwned(orderId);
      if (!g.ok) return g;
      var order = g.order;
      order.customerName = sec.sanitizeString(customerName || '', 255);
      return _saveDraft(order);
    },

    applyDiscount: async function(orderId, discountAmount) {
      var g = await _getDraftOwned(orderId);
      if (!g.ok) return g;
      var order = g.order;
      order.discount = Math.max(0, +discountAmount || 0);
      _recalc(order);
      return _saveDraft(order);
    },

    complete: async function(orderId, paymentInfo) {
      if (_completingIds[orderId]) return { ok: false, error: 'This order is already being completed', code: 'ORDER_COMPLETING' };
      _completingIds[orderId] = true;
      try {
        return await _completeInner(orderId, paymentInfo || {});
      } finally {
        delete _completingIds[orderId];
      }
    },

    cancel: async function(orderId, reason) {
      var g = await _getDraftOwned(orderId);
      if (!g.ok) return g;
      var order = g.order;

      var updated = Object.assign({}, order, {
        status: 'cancelled', cancelledAt: new Date().toISOString(),
        cancelReason: reason ? sec.sanitizeString(reason, 255) : ''
      });
      var r = await bus.call('ops.storage.orders.put', updated);
      if (!r.ok) return r;

      audit('cancel', 'order', orderId, order, r.record);
      ingestOps('order.cancelled', order.businessId, { orderId: orderId, branchId: order.branchId, reason: updated.cancelReason });
      bus.emit('operation.order.cancelled', { orderId: orderId });
      return { ok: true, order: r.record };
    },

    refund: async function(orderId, reason, amount) {
      var g = await _getOwned(orderId);
      if (!g.ok) return g;
      var order = g.order;
      if (order.status !== 'completed') return { ok: false, error: 'Only completed orders can be refunded', code: 'INVALID_STATUS' };

      var refundAmount = amount != null ? Math.min(Math.max(0, +amount || 0), order.total) : order.total;
      var now = new Date().toISOString();
      var refundId = uuid();
      // Fixed in Block 7: this used to generate a SECOND, different uuid
      // for the DAL-facing payload than the one written to ops.storage.
      // payments — the two "same refund" records didn't share an ID.
      // One id now, used consistently on both sides.
      var refundPaymentId = uuid();
      var refundReason = reason ? sec.sanitizeString(reason, 255) : '';

      var updated = Object.assign({}, order, {
        status: 'refunded', refundedAt: now, refundReason: refundReason,
        refundAmount: refundAmount, paymentStatus: 'refunded'
      });
      var r = await bus.call('ops.storage.orders.put', updated);
      if (!r.ok) return r;

      await bus.call('ops.storage.payments.put', {
        paymentId: refundPaymentId, orderId: orderId, businessId: order.businessId,
        amount: -refundAmount, method: 'refund', isRefund: true, occurredAt: now
      });

      // Added in Block 8: if the order was originally paid in cash, cash
      // is physically leaving the till — record it against whichever
      // session is open NOW (never the original sale's session, which
      // may already be closed and reconciled). Skips gracefully if the
      // original payment wasn't cash, or no session is open — same
      // degrade-gracefully rule Block 6 already applies to sales.
      var origPayR = await bus.call('ops.storage.payments.list', { indexName: 'by_order', keyVal: orderId });
      var origPayment = (origPayR.records || []).filter(function(p) { return !p.isRefund; })[0];
      if (origPayment && origPayment.method === 'cash') {
        var refSessR = await bus.call('ops.storage.cashSessions.list', { indexName: 'by_branch', keyVal: order.branchId });
        var refOpenSession = (refSessR.records || []).filter(function(s) { return s.status === 'open'; })[0];
        if (refOpenSession) {
          await bus.call('ops.storage.cashMovements.put', {
            movementId: uuid(), sessionId: refOpenSession.sessionId, businessId: order.businessId,
            branchId: order.branchId, type: 'refund', amount: -refundAmount, orderId: orderId,
            occurredAt: now
          });
        }
      }

      audit('refund', 'order', orderId, order, r.record);
      ingestOps('order.refunded', order.businessId, { orderId: orderId, refundId: refundId, amount: refundAmount, reason: refundReason });

      var payPayload = { paymentId: refundPaymentId, orderId: orderId, amount: refundAmount, method: 'other' };
      if (refundReason) payPayload.reason = refundReason;
      ingestOps('payment.refunded', order.businessId, payPayload);

      bus.emit('operation.order.refunded', { orderId: orderId });
      // Added in Block 7: see the operation.payment.completed note above.
      bus.emit('operation.payment.refunded', { paymentId: refundPaymentId, orderId: orderId, amount: refundAmount });
      return { ok: true, order: r.record };
    },

    get: async function(orderId) {
      var r = await bus.call('ops.storage.orders.get', { id: orderId });
      return { ok: r.ok, order: r.record };
    },

    list: async function(opts) {
      opts = opts || {};
      var ctx = window.INFINICUS.ops.workspace.getContext();
      var businessId = opts.businessId || ctx.businessId;
      if (!businessId) return { ok: true, orders: [] };

      var r = opts.status
        ? await bus.call('ops.storage.orders.list', { indexName: 'by_business_status', keyVal: [businessId, opts.status] })
        : await bus.call('ops.storage.orders.list', { indexName: 'by_business', keyVal: businessId });

      var orders = r.records || [];
      if (opts.branchId) orders = orders.filter(function(o) { return o.branchId === opts.branchId; });
      orders.sort(function(a, b) { return (b.createdAt || '') > (a.createdAt || '') ? 1 : -1; });
      return { ok: true, orders: orders };
    }
  };

  /** The actual completion logic, split out from complete() so the
   *  mutex wrapper above stays trivial to read. */
  async function _completeInner(orderId, paymentInfo) {
    var g = await _getDraftOwned(orderId);
    if (!g.ok) return g;
    var order = g.order;

    if (!order.items.length) return { ok: false, error: 'Cannot complete an empty order', code: 'EMPTY_ORDER' };

    // ── Stock validation — fail before any side effects ───────────
    for (var i = 0; i < order.items.length; i++) {
      var li = order.items[i];
      var pr = await bus.call('ops.storage.products.get', { id: li.productId });
      if (pr.record && pr.record.stockTracked) {
        // Branch-scoped as of Block 9 — was business-wide before, which
        // could let a sale at this branch succeed off stock that only
        // physically exists at a different branch. See the getStock
        // comment in the Inventory Movement Writer for the full note.
        var stock = await window.INFINICUS.ops.inventory.getStock(li.productId, order.businessId, order.branchId);
        if (stock < li.quantity) {
          return { ok: false, error: 'Insufficient stock for "' + li.name + '" (have ' + stock + ' at this branch, need ' + li.quantity + ')', code: 'INSUFFICIENT_STOCK' };
        }
      }
    }

    // ── Resolve or quick-create the customer (name-only v1) ───────
    var customerId = order.customerId;
    var customerIsNew = false;
    if (!customerId && order.customerName) {
      var custR = await _resolveOrCreateCustomer(order.businessId, order.customerName);
      customerId = custR.customerId;
      customerIsNew = custR.isNew;
    }

    // ── Payment reconciliation ─────────────────────────────────────
    var method = sec.validateEnum(paymentInfo.method, ['cash', 'card', 'mobile', 'bank_transfer', 'store_credit', 'other']) ? paymentInfo.method : 'cash';
    var tendered = paymentInfo.tenderedAmount != null ? +paymentInfo.tenderedAmount : order.total;
    if (!isFinite(tendered) || tendered < 0) tendered = order.total;
    var paidAmount = tendered >= order.total ? order.total : round2(tendered);
    var changeGiven = (method === 'cash') ? Math.max(0, round2(tendered - order.total)) : 0;
    var paymentStatus = paidAmount >= order.total ? 'paid' : (paidAmount > 0 ? 'partial' : 'unpaid');

    var now = new Date().toISOString();
    var paymentId = uuid();

    var updatedOrder = Object.assign({}, order, {
      status: 'completed', completedAt: now, updatedAt: now,
      paymentStatus: paymentStatus, customerId: customerId || null
    });

    var paymentRecord = {
      paymentId: paymentId, orderId: orderId, businessId: order.businessId,
      amount: paidAmount, method: method, tenderedAmount: tendered, changeGiven: changeGiven,
      occurredAt: now, createdAt: now, updatedAt: now
    };

    // ── Inventory movements — signed, negative = stock out ────────
    var movements = [];
    for (var j = 0; j < order.items.length; j++) {
      var it = order.items[j];
      var pr2 = await bus.call('ops.storage.products.get', { id: it.productId });
      if (pr2.record && pr2.record.stockTracked) {
        movements.push({
          movementId: uuid(), businessId: order.businessId, branchId: order.branchId,
          productId: it.productId, productName: it.name, type: 'sold',
          quantity: -it.quantity, reason: 'sale', orderId: orderId,
          occurredAt: now, createdAt: now, updatedAt: now
        });
      }
    }

    // ── Cash movement — only if a cash session is already open;
    //    Cash Register itself (opening/closing tills) is Block 8 ────
    var cashMovement = null;
    if (method === 'cash') {
      var sessR = await bus.call('ops.storage.cashSessions.list', { indexName: 'by_branch', keyVal: order.branchId });
      var openSession = (sessR.records || []).filter(function(s) { return s.status === 'open'; })[0];
      if (openSession) {
        cashMovement = {
          movementId: uuid(), sessionId: openSession.sessionId, businessId: order.businessId,
          type: 'sale', amount: paidAmount, orderId: orderId,
          occurredAt: now, createdAt: now, updatedAt: now
        };
      }
    }

    // ── Customer purchase-history bump (local projection) ─────────
    var customerPatch = null;
    if (customerId) {
      var custRec = await bus.call('ops.storage.customers.get', { id: customerId });
      if (custRec.record) {
        customerPatch = Object.assign({}, custRec.record, {
          totalSpend: round2((custRec.record.totalSpend || 0) + paidAmount),
          orderCount: (custRec.record.orderCount || 0) + 1,
          lastPurchaseAt: now, updatedAt: now
        });
      }
    }

    // ── Atomic commit across every ops store this transaction touches
    try {
      await _atomicCompleteWrite(updatedOrder, paymentRecord, movements, cashMovement, customerPatch);
    } catch (err) {
      console.error('[BOL] order completion transaction failed:', err);
      return { ok: false, error: 'Could not save the completed order: ' + (err.message || err), code: 'TX_FAILED' };
    }

    audit('complete', 'order', orderId, order, updatedOrder);

    // ── Propagate to DAL — sequential, best-effort. The atomic step
    //    above is a true IndexedDB transaction (all-or-nothing) inside
    //    infinicus_ops; DAL ingestion below writes to a SEPARATE
    //    database (infinicus_dal) and cannot join that transaction —
    //    IndexedDB has no cross-database transactions. Each ingest
    //    call is itself checksum-deduped and safe to retry, but a
    //    crash between these calls could leave the order 'completed'
    //    with a partial DAL trail. Accepted limitation of a
    //    local-first, two-database design — see the security review. ──
    var completedPayload = {
      orderId: orderId, branchId: order.branchId,
      items: order.items.map(function(it) { return { productId: it.productId, name: it.name, quantity: it.quantity, unitPrice: it.unitPrice, lineTotal: it.lineTotal }; }),
      subtotal: order.subtotal, discount: order.discount, tax: order.tax, total: order.total,
      paymentStatus: paymentStatus
    };
    if (customerId) completedPayload.customerId = customerId;
    ingestOps('order.completed', order.businessId, completedPayload);

    order.items.forEach(function(it) {
      var salePayload = { amount: it.lineTotal, quantity: it.quantity, productId: it.productId, productName: it.name, channel: 'pos', orderId: orderId };
      if (customerId) salePayload.customerId = customerId;
      ingestOps('sale.created', order.businessId, salePayload);
    });

    ingestOps('payment.completed', order.businessId, {
      paymentId: paymentId, orderId: orderId, amount: paidAmount, method: method,
      tenderedAmount: tendered, changeGiven: changeGiven
    });

    movements.forEach(function(m) { window.INFINICUS.ops._ingestMovementToDal(m); });

    if (customerIsNew) ingestOps('customer.created', order.businessId, { name: order.customerName });

    bus.emit('operation.order.completed', { orderId: orderId, total: order.total });
    // Added in Block 7: this local event was missing — the spec lists
    // operation.payment.completed as its own required event, separate
    // from operation.order.completed. Payments view listens for it.
    bus.emit('operation.payment.completed', { paymentId: paymentId, orderId: orderId, amount: paidAmount, method: method });

    return { ok: true, order: updatedOrder, payment: paymentRecord };
  }

  window.INFINICUS.ops.order = orderApi;

  bus.register('operations.order.create',          function()  { return orderApi.create(); });
  bus.register('operations.order.addItem',         function(p) { return orderApi.addItem(p.orderId, p.product, p.quantity); });
  bus.register('operations.order.removeItem',      function(p) { return orderApi.removeItem(p.orderId, p.productId); });
  bus.register('operations.order.updateItem',      function(p) { return orderApi.updateItemQty(p.orderId, p.productId, p.quantity); });
  bus.register('operations.order.setCustomer',     function(p) { return orderApi.setCustomer(p.orderId, p.customerName); });
  bus.register('operations.order.applyDiscount',   function(p) { return orderApi.applyDiscount(p.orderId, p.discount); });
  bus.register('operations.order.calculateTotals', function(p) { return { ok: true, totals: calcTotals(p.items, p.discount) }; });
  bus.register('operations.order.complete',        function(p) { return orderApi.complete(p.orderId, p.payment); });
  bus.register('operations.order.cancel',          function(p) { return orderApi.cancel(p.orderId, p.reason); });
  bus.register('operations.order.refund',          function(p) { return orderApi.refund(p.orderId, p.reason, p.amount); });
  bus.register('operations.order.get',             function(p) { return orderApi.get(p.orderId); });
  bus.register('operations.order.list',            function(p) { return orderApi.list(p); });

})(); // OperationsOrderModule
</script>

<!-- ── 6B · Sell View + Orders View ────────────────────────────── -->
<script>
'use strict';

/* ── SELL VIEW — fast cart-based order entry ─────────────────── */
(function SellViewModule() {

  var bus = window.INFINICUS.bus;
  var esc = window.INFINICUS.esc;

  var _currentOrderId = null;
  var _search = '';
  var _category = '';
  var _lastOrder = null;

  function _mount() {
    var content = document.querySelector('#view-sell .content');
    if (!content) return;

    content.innerHTML =
      '<style>@media (min-width:820px){ #sell-grid-wrap{ display:grid; grid-template-columns:1fr 380px; gap:18px; align-items:start; } #sell-cart{ position:sticky; top:14px; } }</style>' +

      '<div id="sell-no-branch" style="display:none">' +
        '<div class="placeholder"><div class="placeholder-icon">$</div>' +
          '<div class="placeholder-title">NO BRANCH SELECTED</div>' +
          '<div class="placeholder-sub">Select a business and branch on the Home screen first.</div>' +
        '</div>' +
      '</div>' +

      '<div id="sell-main" style="display:none">' +
        '<div id="sell-grid-wrap">' +

          '<div id="sell-products">' +
            '<input class="form-control" id="sell-search" placeholder="Search products…" style="margin-bottom:10px">' +
            '<div id="sell-cat-chips" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px"></div>' +
            '<div id="sell-product-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px"></div>' +
            '<div id="sell-empty-products" style="display:none" class="placeholder">' +
              '<div class="placeholder-icon">▤</div><div class="placeholder-title">NO PRODUCTS YET</div>' +
              '<div class="placeholder-sub">Add products in the Catalog before selling.</div>' +
            '</div>' +
          '</div>' +

          '<div id="sell-cart" class="card">' +
            '<div class="card-hd"><div class="card-title">CURRENT SALE</div>' +
              '<button class="btn btn-ghost btn-sm" id="sell-clear-cart">CLEAR</button>' +
            '</div>' +
            '<div class="card-body">' +
              '<div id="sell-cart-items" style="margin-bottom:6px"></div>' +
              '<div id="sell-cart-empty" style="display:none;font-family:var(--mono);font-size:11px;color:var(--text-3);padding:16px 0;text-align:center">Cart is empty — tap a product to add it.</div>' +

              '<div class="form-group" style="margin-bottom:10px;margin-top:12px">' +
                '<label class="form-label">CUSTOMER (OPTIONAL)</label>' +
                '<input class="form-control" id="sell-customer" placeholder="Walk-in" maxlength="255">' +
              '</div>' +

              '<div class="form-row-2" style="margin-bottom:10px">' +
                '<div class="form-group" style="margin-bottom:0">' +
                  '<label class="form-label">DISCOUNT</label>' +
                  '<input class="form-control" id="sell-discount" type="number" min="0" step="0.01" value="0">' +
                '</div>' +
                '<div class="form-group" style="margin-bottom:0">' +
                  '<label class="form-label">PAYMENT METHOD</label>' +
                  '<select class="form-control" id="sell-method">' +
                    '<option value="cash">Cash</option><option value="card">Card</option>' +
                    '<option value="mobile">Mobile</option><option value="bank_transfer">Bank Transfer</option>' +
                    '<option value="store_credit">Store Credit</option><option value="other">Other</option>' +
                  '</select>' +
                '</div>' +
              '</div>' +

              '<div class="form-group" id="sell-tendered-wrap" style="margin-bottom:10px">' +
                '<label class="form-label">AMOUNT TENDERED</label>' +
                '<input class="form-control" id="sell-tendered" type="number" min="0" step="0.01" placeholder="Defaults to total">' +
              '</div>' +

              '<div style="border-top:1px solid var(--border);padding-top:10px;margin-bottom:14px;font-family:var(--mono);font-size:12px">' +
                '<div style="display:flex;justify-content:space-between;color:var(--text-2);margin-bottom:3px"><span>Subtotal</span><span id="sell-t-subtotal">0.00</span></div>' +
                '<div style="display:flex;justify-content:space-between;color:var(--text-2);margin-bottom:3px"><span>Discount</span><span id="sell-t-discount">−0.00</span></div>' +
                '<div style="display:flex;justify-content:space-between;color:var(--text-2);margin-bottom:8px"><span>Tax</span><span id="sell-t-tax">0.00</span></div>' +
                '<div style="display:flex;justify-content:space-between;font-size:18px;font-weight:700;color:var(--accent)"><span>TOTAL</span><span id="sell-t-total">0.00</span></div>' +
                '<div id="sell-t-change" style="display:none;justify-content:space-between;color:var(--amber);margin-top:6px"><span>Change due</span><span id="sell-t-change-val">0.00</span></div>' +
              '</div>' +

              '<button class="btn btn-primary btn-lg" id="sell-complete" style="width:100%" disabled>COMPLETE SALE</button>' +
              '<div id="sell-fb" style="font-family:var(--mono);font-size:10.5px;margin-top:8px;min-height:14px"></div>' +
            '</div>' +
          '</div>' +

        '</div>' +
      '</div>';
  }

  async function _ensureDraft() {
    var ctx = window.INFINICUS.ops.workspace.getContext();
    if (!ctx.branchId) return null;

    if (_currentOrderId) {
      var g = await window.INFINICUS.ops.order.get(_currentOrderId);
      if (g.order && g.order.status === 'draft' && g.order.branchId === ctx.branchId) return g.order;
      _currentOrderId = null;
    }
    var listR = await window.INFINICUS.ops.order.list({ status: 'draft', branchId: ctx.branchId });
    if (listR.orders && listR.orders.length) {
      _currentOrderId = listR.orders[0].orderId;
      return listR.orders[0];
    }
    var createR = await window.INFINICUS.ops.order.create();
    if (createR.ok) { _currentOrderId = createR.order.orderId; return createR.order; }
    return null;
  }

  async function _loadProducts() {
    var ctx = window.INFINICUS.ops.workspace.getContext();
    var gridEl = document.getElementById('sell-product-grid');
    var emptyEl = document.getElementById('sell-empty-products');
    var chipsEl = document.getElementById('sell-cat-chips');
    if (!gridEl || !ctx.businessId) return;

    var r = await window.INFINICUS.ops.product.list(ctx.businessId);
    var all = (r.products || []).filter(function(p) { return p.status !== 'archived'; });

    var cats = [];
    all.forEach(function(p) { if (p.category && cats.indexOf(p.category) === -1) cats.push(p.category); });
    chipsEl.innerHTML = ['<button class="btn btn-sm ' + (!_category ? 'btn-accent' : 'btn-ghost') + ' sell-cat-chip" data-cat="">ALL</button>']
      .concat(cats.map(function(c) {
        return '<button class="btn btn-sm ' + (_category === c ? 'btn-accent' : 'btn-ghost') + ' sell-cat-chip" data-cat="' + esc(c) + '">' + esc(c) + '</button>';
      })).join('');

    var q = _search.toLowerCase();
    var filtered = all.filter(function(p) {
      var matchesCat = !_category || p.category === _category;
      var matchesSearch = !q || (p.name || '').toLowerCase().indexOf(q) !== -1 || (p.sku || '').toLowerCase().indexOf(q) !== -1;
      return matchesCat && matchesSearch;
    });

    if (emptyEl) emptyEl.style.display = all.length ? 'none' : 'block';
    var cur = (ctx.business && ctx.business.currency) || '';

    gridEl.innerHTML = filtered.map(function(p) {
      return '<button class="card sell-product-btn" data-id="' + esc(p.productId) + '" style="text-align:left;padding:12px;cursor:pointer">' +
        '<div style="font-weight:600;font-size:12.5px;margin-bottom:6px;line-height:1.3">' + esc(p.name) + '</div>' +
        '<div style="font-family:var(--mono);font-size:13px;color:var(--accent);font-weight:700">' + esc(cur) + ' ' + (+p.sellingPrice).toFixed(2) + '</div>' +
        (p.category ? '<div style="font-family:var(--mono);font-size:9px;color:var(--text-3);margin-top:4px">' + esc(p.category) + '</div>' : '') +
      '</button>';
    }).join('');
  }

  function _renderCart(order) {
    _lastOrder = order;
    var itemsEl = document.getElementById('sell-cart-items');
    var emptyEl = document.getElementById('sell-cart-empty');
    var completeBtn = document.getElementById('sell-complete');
    if (!itemsEl) return;

    var hasItems = !!(order && order.items && order.items.length);
    if (emptyEl) emptyEl.style.display = hasItems ? 'none' : 'block';
    if (completeBtn) completeBtn.disabled = !hasItems;

    itemsEl.innerHTML = !hasItems ? '' : order.items.map(function(it) {
      return '<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)">' +
        '<div style="flex:1;min-width:0">' +
          '<div style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(it.name) + '</div>' +
          '<div style="font-family:var(--mono);font-size:10px;color:var(--text-3)">' + it.unitPrice.toFixed(2) + ' each</div>' +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:6px">' +
          '<button class="btn btn-ghost btn-sm sell-qty-dec" data-id="' + esc(it.productId) + '">−</button>' +
          '<span style="font-family:var(--mono);font-size:12px;min-width:18px;text-align:center">' + it.quantity + '</span>' +
          '<button class="btn btn-ghost btn-sm sell-qty-inc" data-id="' + esc(it.productId) + '">+</button>' +
        '</div>' +
        '<div style="font-family:var(--mono);font-size:12px;color:var(--accent);min-width:56px;text-align:right">' + it.lineTotal.toFixed(2) + '</div>' +
      '</div>';
    }).join('');

    document.getElementById('sell-t-subtotal').textContent = (order ? order.subtotal : 0).toFixed(2);
    document.getElementById('sell-t-discount').textContent = '−' + (order ? order.discount : 0).toFixed(2);
    document.getElementById('sell-t-tax').textContent = (order ? order.tax : 0).toFixed(2);
    document.getElementById('sell-t-total').textContent = (order ? order.total : 0).toFixed(2);

    _updateChangeDisplay();
  }

  function _updateChangeDisplay() {
    var methodEl = document.getElementById('sell-method');
    var tenderedEl = document.getElementById('sell-tendered');
    var wrapEl = document.getElementById('sell-tendered-wrap');
    var changeRow = document.getElementById('sell-t-change');
    if (!methodEl) return;
    var method = methodEl.value;
    if (wrapEl) wrapEl.style.display = method === 'cash' ? 'block' : 'none';
    if (method !== 'cash') { if (changeRow) changeRow.style.display = 'none'; return; }

    var tendered = tenderedEl ? (+tenderedEl.value || 0) : 0;
    var total = _lastOrder ? _lastOrder.total : 0;
    var change = Math.max(0, tendered - total);
    if (changeRow) {
      changeRow.style.display = tendered > 0 ? 'flex' : 'none';
      document.getElementById('sell-t-change-val').textContent = change.toFixed(2);
    }
  }

  async function _sync() {
    var ctx = window.INFINICUS.ops.workspace.getContext();
    var noBranchEl = document.getElementById('sell-no-branch');
    var mainEl = document.getElementById('sell-main');
    if (!ctx.branchId) { if (noBranchEl) noBranchEl.style.display = 'block'; if (mainEl) mainEl.style.display = 'none'; return; }
    if (noBranchEl) noBranchEl.style.display = 'none';
    if (mainEl) mainEl.style.display = 'block';
    await _loadProducts();
    var order = await _ensureDraft();
    _renderCart(order);
  }

  function _resetSaleForm() {
    var t = document.getElementById('sell-tendered'); if (t) t.value = '';
    var d = document.getElementById('sell-discount'); if (d) d.value = '0';
    var c = document.getElementById('sell-customer'); if (c) c.value = '';
  }

  function _wire() {
    var searchEl = document.getElementById('sell-search');
    if (searchEl) searchEl.addEventListener('input', function() { _search = searchEl.value; _loadProducts(); });

    var chipsEl = document.getElementById('sell-cat-chips');
    if (chipsEl) chipsEl.addEventListener('click', function(e) {
      var chip = e.target.closest('.sell-cat-chip');
      if (chip) { _category = chip.dataset.cat || ''; _loadProducts(); }
    });

    var gridEl = document.getElementById('sell-product-grid');
    if (gridEl) gridEl.addEventListener('click', async function(e) {
      var btn = e.target.closest('.sell-product-btn');
      if (!btn) return;
      var prodR = await window.INFINICUS.ops.product.get(btn.dataset.id);
      if (!prodR.product) return;
      var order = await _ensureDraft();
      if (!order) return;
      var r = await window.INFINICUS.ops.order.addItem(order.orderId, prodR.product, 1);
      if (r.ok) _renderCart(r.order);
    });

    var cartItemsEl = document.getElementById('sell-cart-items');
    if (cartItemsEl) cartItemsEl.addEventListener('click', async function(e) {
      var incBtn = e.target.closest('.sell-qty-inc');
      var decBtn = e.target.closest('.sell-qty-dec');
      if (!incBtn && !decBtn) return;
      if (!_currentOrderId || !_lastOrder) return;
      var pid = (incBtn || decBtn).dataset.id;
      var item = _lastOrder.items.filter(function(it) { return it.productId === pid; })[0];
      if (!item) return;
      var newQty = item.quantity + (incBtn ? 1 : -1);
      var r = await window.INFINICUS.ops.order.updateItemQty(_currentOrderId, pid, newQty);
      if (r.ok) _renderCart(r.order);
    });

    var clearBtn = document.getElementById('sell-clear-cart');
    if (clearBtn) clearBtn.addEventListener('click', async function() {
      if (!_currentOrderId) return;
      if (!confirm('Clear the current sale?')) return;
      await window.INFINICUS.ops.order.cancel(_currentOrderId, 'cleared by cashier');
      _currentOrderId = null;
      _resetSaleForm();
      var order = await _ensureDraft();
      _renderCart(order);
    });

    var customerEl = document.getElementById('sell-customer');
    if (customerEl) customerEl.addEventListener('change', async function() {
      if (!_currentOrderId) return;
      await window.INFINICUS.ops.order.setCustomer(_currentOrderId, customerEl.value);
    });

    var discountEl = document.getElementById('sell-discount');
    if (discountEl) discountEl.addEventListener('change', async function() {
      if (!_currentOrderId) return;
      var r = await window.INFINICUS.ops.order.applyDiscount(_currentOrderId, discountEl.value);
      if (r.ok) _renderCart(r.order);
    });

    var methodEl = document.getElementById('sell-method');
    if (methodEl) methodEl.addEventListener('change', _updateChangeDisplay);

    var tenderedEl = document.getElementById('sell-tendered');
    if (tenderedEl) tenderedEl.addEventListener('input', _updateChangeDisplay);

    var completeBtn = document.getElementById('sell-complete');
    if (completeBtn) completeBtn.addEventListener('click', async function() {
      if (!_currentOrderId) return;
      var fb = document.getElementById('sell-fb');
      completeBtn.disabled = true;
      var method = (document.getElementById('sell-method') || {}).value || 'cash';
      var tenderedRaw = (document.getElementById('sell-tendered') || {}).value;
      var payload = { method: method };
      if (tenderedRaw !== '' && tenderedRaw != null) payload.tenderedAmount = +tenderedRaw;

      var r = await window.INFINICUS.ops.order.complete(_currentOrderId, payload);
      if (r.ok) {
        if (fb) { fb.style.color = 'var(--accent)'; fb.textContent = '✓ Sale complete — ' + r.order.currency + ' ' + r.order.total.toFixed(2) + (r.payment.changeGiven ? ' · change ' + r.payment.changeGiven.toFixed(2) : ''); }
        _currentOrderId = null;
        _resetSaleForm();
        setTimeout(async function() {
          var order = await _ensureDraft();
          _renderCart(order);
          if (fb) fb.textContent = '';
        }, 2200);
      } else {
        if (fb) { fb.style.color = 'var(--red)'; fb.textContent = r.error || 'Could not complete sale'; }
        completeBtn.disabled = false;
      }
    });
  }

  bus.on('dal.business.selected', function() { _currentOrderId = null; _sync(); });
  bus.on('ops.branch.selected',   function() { _currentOrderId = null; _sync(); });
  bus.on('ops.product.created',   _loadProducts);
  bus.on('ops.product.updated',   _loadProducts);

  window.INFINICUS.ops.sellView = { refresh: _sync };
  window.__opsSellInit = function() { _mount(); _wire(); _sync(); };

<!-- ── 7A · Payment Manager ─────────────────────────────────────── -->
<script>
'use strict';

(function OperationsPaymentModule() {

  var bus = window.INFINICUS.bus;

  function round2(n) { return Math.round(((+n || 0) + Number.EPSILON) * 100) / 100; }

  var paymentApi = {

    list: async function(opts) {
      opts = opts || {};
      var ctx = window.INFINICUS.ops.workspace.getContext();
      var businessId = opts.businessId || ctx.businessId;
      if (!businessId) return { ok: true, payments: [] };

      var r = await bus.call('ops.storage.payments.list', { indexName: 'by_business', keyVal: businessId });
      var payments = r.records || [];
      if (opts.method)  payments = payments.filter(function(p) { return p.method === opts.method; });
      if (opts.orderId) payments = payments.filter(function(p) { return p.orderId === opts.orderId; });
      payments.sort(function(a, b) { return (b.occurredAt || b.createdAt || '') > (a.occurredAt || a.createdAt || '') ? 1 : -1; });
      return { ok: true, payments: payments };
    },

    get: async function(paymentId) {
      var r = await bus.call('ops.storage.payments.get', { id: paymentId });
      return { ok: r.ok, payment: r.record };
    },

    /** All payment records tied to one order — the original completion
     *  payment plus any later refund record(s), oldest first. */
    getByOrder: async function(orderId) {
      var r = await bus.call('ops.storage.payments.list', { indexName: 'by_order', keyVal: orderId });
      var payments = (r.records || []).sort(function(a, b) { return (a.occurredAt || '') > (b.occurredAt || '') ? 1 : -1; });
      return { ok: true, payments: payments };
    },

    /** Aggregate for the Payments view's stat tiles — collected
     *  (positive, non-refund) vs refunded, plus a per-method split. */
    summarize: async function(businessId) {
      var r = await paymentApi.list({ businessId: businessId });
      var collected = 0, refunded = 0, byMethod = {};
      (r.payments || []).forEach(function(p) {
        var amt = +p.amount || 0;
        if (p.isRefund || amt < 0) { refunded += Math.abs(amt); }
        else { collected += amt; byMethod[p.method] = round2((byMethod[p.method] || 0) + amt); }
      });
      return { ok: true, collected: round2(collected), refunded: round2(refunded), byMethod: byMethod, count: (r.payments || []).length };
    }
  };

  window.INFINICUS.ops.payment = paymentApi;

  bus.register('operations.payment.list',       function(p) { return paymentApi.list(p); });
  bus.register('operations.payment.get',        function(p) { return paymentApi.get(p.paymentId); });
  bus.register('operations.payment.getByOrder', function(p) { return paymentApi.getByOrder(p.orderId); });

})(); // OperationsPaymentModule
</script>
